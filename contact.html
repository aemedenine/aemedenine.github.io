<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio Code | Atelier Électronique Médenine</title>

<link rel="icon" href="images/favicon.png">
<link rel="stylesheet" href="css/style.css">

<style>

/* ================= RADIO PAGE ================= */

body{
background:#0f172a;
color:white;
font-family:Arial, Helvetica, sans-serif;
}

/* CONTAINER */

.radio-container{
padding:120px 8%;
max-width:700px;
margin:auto;
}

.radio-container h2{
font-size:40px;
text-align:center;
margin-bottom:50px;
}

/* FORM */

.radio-form{
display:flex;
flex-direction:column;
gap:20px;
background:rgba(255,255,255,0.05);
padding:35px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.1);
}

.field-wrapper{
position:relative;
}

.field-wrapper span{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
font-size:18px;
color:#94a3b8;
}

.radio-form input{
width:100%;
padding:14px 14px 14px 40px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.15);
background:rgba(255,255,255,0.05);
color:white;
font-size:16px;
}

.radio-form input:focus{
outline:none;
border-color:#38bdf8;
}

.radio-form button{
padding:14px;
border:none;
border-radius:30px;
background:#38bdf8;
color:white;
font-weight:600;
font-size:17px;
cursor:pointer;
transition:0.3s;
}

.radio-form button:hover{
background:#0ea5e9;
transform:translateY(-2px);
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal.active{
display:flex;
}

.modal-content{
background:#111827;
padding:35px;
border-radius:18px;
text-align:center;
max-width:400px;
width:90%;
}

.modal-content h2{
color:#38bdf8;
margin-bottom:20px;
}

.modal-content strong{
font-size:30px;
letter-spacing:4px;
}

.modal-content button{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:30px;
background:#38bdf8;
color:white;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.radio-container h2{
font-size:32px;
}

}

</style>

</head>

<body>

<!-- ================= HEADER (SAME AS CONTACT) ================= -->

<header class="header">

<div class="logo">
<img src="images/logo.png" alt="Logo" class="logo-img">
<h1>Atelier Électronique Médenine</h1>
</div>

<nav class="nav">
<a href="index.html">Home</a>
<a href="index.html#services">Services</a>
<a href="contact.html">Contact</a>
<button class="login-btn">Login</button>
</nav>

</header>

<!-- ================= RADIO ================= -->

<section class="radio-container">

<h2>Déverrouillage Code Radio</h2>

<div class="radio-form">

<div class="field-wrapper">
<span>🚗</span>
<input type="text" id="car-brand" placeholder="Marque voiture (Renault / Dacia)">
</div>

<div class="field-wrapper">
<span>🔢</span>
<input type="text" id="precode" placeholder="Précode radio (ex: A123)" maxlength="4">
</div>

<button onclick="generateCode()">Calculer le Code</button>

</div>

</section>

<!-- ================= RESULT MODAL ================= -->

<div class="modal" id="result-modal">

<div class="modal-content">

<h2>Votre Code Radio</h2>

<p>Précode: <strong id="modal-precode"></strong></p>

<p>Code: <strong id="modal-code"></strong></p>

<button onclick="closeModal()">Fermer</button>

</div>

</div>

<!-- ================= FOOTER ================= -->

<footer style="text-align:center;margin-top:60px;padding:30px;color:#94a3b8;">
<p>© 2026 Atelier Électronique Médenine</p>
</footer>

<!-- ================= JS ================= -->

<script>

function generateCode(){

const brand=document.getElementById('car-brand').value.trim();
const precode=document.getElementById('precode').value.trim().toUpperCase();

if(!brand.toLowerCase().includes('renault') && !brand.toLowerCase().includes('dacia')){
alert("Algo pour Renault / Dacia seulement.");
return;
}

if(!precode || precode.length!==4 || !/^[A-Z]\d{3}$/.test(precode)){
alert("Précode invalide ! Exemple A123.");
return;
}

/* ALGORITHM */

let x = precode.charCodeAt(1) + precode.charCodeAt(0) * 10 - 698;
let y = precode.charCodeAt(3) + precode.charCodeAt(2) * 10 + x - 528;
let z = (y * 7) % 100;
let codeNum = Math.floor(z / 10) + (z % 10) * 10 + ((259 % x) % 100) * 100;

const codeStr = codeNum.toString().padStart(4,'0');

document.getElementById('modal-precode').textContent=precode;
document.getElementById('modal-code').textContent=codeStr;

document.getElementById('result-modal').classList.add('active');

}

function closeModal(){
document.getElementById('result-modal').classList.remove('active');
}

</script>

</body>
</html>
```
