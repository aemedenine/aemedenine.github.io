<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Electronique Medenine</title>
<link rel="icon" href="images/favicon.png">
<link rel="stylesheet" href="css/style.css">
<style>
/* ====== Contact Page 2026 ====== */
.contact-page{
  padding:50px 20px;
  text-align:center;
  min-height:80vh;
  background:#0f172a;
  color:white;
}
.contact-page img{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #38bdf8;
  margin-bottom:15px;
}
.contact-page h2{
  font-size:32px;
  margin-bottom:20px;
  color:#38bdf8;
}
.contact-page h3{
  font-size:24px;
  margin-bottom:10px;
}
.contact-page p{
  font-size:18px;
  margin:5px 0;
}
.btn-back{
  margin-top:25px;
  display:inline-block;
  padding:10px 25px;
  border-radius:40px;
  background:#38bdf8;
  color:#000;
  font-weight:600;
  text-decoration:none;
  transition:0.3s;
}
.btn-back:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}
/* Mobile */
@media(max-width:768px){
  .contact-page h2{ font-size:28px; }
  .contact-page h3{ font-size:20px; }
  .contact-page p{ font-size:16px; }
  .contact-page img{ width:100px; height:100px; }
}
</style>
</head>
<body>

<header class="header">
<div class="logo">
  <img src="images/logo.png" alt="Logo" class="logo-img">
  <h1>Electronique Medenine</h1>
</div>
<nav class="nav">
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="contact.html">Contact</a>
  <button class="login-btn">Login</button>
</nav>
</header>

<section class="contact-page">
  <h2>📇 My Profile Info</h2>
  <img id="contactAvatar" src="">
  <h3 id="contactName">User</h3>
  <p>Email: <span id="contactEmail">user@example.com</span></p>
  <p>⭐ Rank: <span id="contactRank">Member</span></p>
  <p>👁 Visits: <span id="contactVisits">0</span></p>
  <a href="index.html" class="btn-back">⬅ Back to Home</a>
</section>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
  authDomain: "atelier-electronique-mednine.firebaseapp.com",
  projectId: "atelier-electronique-mednine",
  storageBucket: "atelier-electronique-mednine.firebasestorage.app",
  messagingSenderId: "547430908384",
  appId: "1:547430908384:web:4caa4cf3869491bd14eb85",
  databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Display user info
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("contactAvatar").src = user.photoURL;
    document.getElementById("contactName").innerText = user.displayName;
    document.getElementById("contactEmail").innerText = user.email;

    const userRef = firebase.database().ref("users/"+user.uid);
    userRef.once("value").then(snapshot=>{
      const data = snapshot.val();
      document.getElementById("contactRank").innerText = data ? data.rank : "Member";
      document.getElementById("contactVisits").innerText = data ? data.visits : 0;
    });
  } else {
    alert("Please login first!");
    window.location.href = "index.html";
  }
});
</script>

</body>
</html>
