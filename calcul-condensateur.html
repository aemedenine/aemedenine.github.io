<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcul Condensateur | Atelier Électronique Médenine</title>
  <link rel="icon" href="images/favicon.png">
  <link rel="stylesheet" href="css/style.css"> <!-- si 3andek css commun -->

  <style>
    /* ================= GLOBAL ================= */
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
      margin: 0;
    }

    /* ================= HEADER ( نفس اللي في contact.html ) ================= */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: #0f172a;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-img {
      width: 65px;
      height: 65px;
      object-fit: contain;
    }

    .logo h1 {
      font-size: 26px;
      margin: 0;
      color: white;
      font-weight: 600;
    }

    .nav {
      display: flex;
      gap: 35px;
    }

    .nav a {
      color: #cbd5f5;
      text-decoration: none;
      font-size: 17px;
      transition: 0.3s;
    }

    .nav a:hover {
      color: #38bdf8;
    }

    /* ================= MAIN CONTENT ================= */
    .calc-container {
      padding: 100px 8% 80px;
      max-width: 1100px;
      margin: auto;
    }

    .calc-container h2 {
      font-size: 38px;
      text-align: center;
      color: #38bdf8;
      margin-bottom: 60px;
    }

    /* BOXES */
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 30px;
    }

    .cap-box {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(56, 189, 248, 0.15);
      border-radius: 16px;
      padding: 35px 30px;
      transition: all 0.35s;
    }

    .cap-box:hover {
      transform: translateY(-8px);
      border-color: #38bdf8;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    .cap-box h3 {
      color: #38bdf8;
      font-size: 22px;
      margin-bottom: 20px;
      text-align: center;
    }

    .cap-box input {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.7);
      color: white;
      text-align: center;
      margin-bottom: 15px;
    }

    .cap-box button {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      font-weight: 600;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
    }

    .cap-box button:hover {
      background: #0ea5e9;
      transform: translateY(-2px);
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: 600;
      color: #a5b4fc;
      text-align: center;
      min-height: 30px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 15px;
        padding: 15px 5%;
      }
      .nav {
        gap: 20px;
        font-size: 15px;
      }
      .calc-container {
        padding: 80px 5% 60px;
      }
      .calc-container h2 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>

<!-- ================= HEADER ( نفس متا3 contact.html ) ================= -->
<header class="header">
  <div class="logo">
    <div class="logo-img">
      <img src="images/logo.png" alt="Logo Atelier Électronique Médenine">
    </div>
    <h1>Atelier Électronique Médenine</h1>
  </div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="index.html#services">Services</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- ================= CALCUL ================= -->
<section class="calc-container">
  <h2>Calcul Condensateur SMD</h2>

  <div class="calc-grid">

    <!-- EIA 3 chiffres -->
    <div class="cap-box">
      <h3>EIA 3 chiffres</h3>
      <input type="text" id="code3" placeholder="Ex: 104 , 225 , 472">
      <button onclick="calc3()">Calculer</button>
      <div class="result" id="res3">Capacité : —</div>
    </div>

    <!-- EIA 4 chiffres -->
    <div class="cap-box">
      <h3>EIA 4 chiffres</h3>
      <input type="text" id="code4" placeholder="Ex: 1001 , 4752 , 2263">
      <button onclick="calc4()">Calculer</button>
      <div class="result" id="res4">Capacité : —</div>
    </div>

    <!-- EIA-198 (lettre + chiffre) -->
    <div class="cap-box">
      <h3>EIA-198</h3>
      <input type="text" id="code198" placeholder="Ex: D3 , S4 , R5">
      <button onclick="calc198()">Calculer</button>
      <div class="result" id="res198">Capacité : —</div>
    </div>

    <!-- Code avec R (décimal) -->
    <div class="cap-box">
      <h3>Code avec R (décimal)</h3>
      <input type="text" id="codeR" placeholder="Ex: 4R7 , R47 , 2R2 , 10R">
      <button onclick="calcR()">Calculer</button>
      <div class="result" id="resR">Capacité : —</div>
    </div>

  </div>
</section>

<!-- ================= JAVASCRIPT ================= -->
<script>
// Format la valeur en pF / nF / µF
function formatCap(pf) {
  if (pf >= 1000000) return (pf / 1000000).toFixed(2) + " µF";
  if (pf >= 1000)    return (pf / 1000).toFixed(2) + " nF";
  return pf + " pF";
}

// EIA 3 chiffres (ex: 104 → 100 nF)
function calc3() {
  let code = document.getElementById("code3").value.trim();
  if (!/^\d{3}$/.test(code)) {
    document.getElementById("res3").innerText = "Code invalide (3 chiffres)";
    return;
  }
  let x1 = parseInt(code[0]);
  let x2 = parseInt(code[1]);
  let x3 = parseInt(code[2]);
  let pf = (x1 * 10 + x2) * Math.pow(10, x3);
  document.getElementById("res3").innerText = "Capacité : " + formatCap(pf);
}

// EIA 4 chiffres (ex: 4752 → 4.7 nF)
function calc4() {
  let code = document.getElementById("code4").value.trim();
  if (!/^\d{4}$/.test(code)) {
    document.getElementById("res4").innerText = "Code invalide (4 chiffres)";
    return;
  }
  let num = parseInt(code.slice(0,3));
  let mult = parseInt(code[3]);
  let pf = num * Math.pow(10, mult);
  document.getElementById("res4").innerText = "Capacité : " + formatCap(pf);
}

// EIA-198 (ex: S4 → 4.7 nF)
const table198 = {
  A:1.0, B:1.1, C:1.2, D:1.3, E:1.5, F:1.6, G:1.8, H:2.0,
  J:2.2, K:2.4, L:2.7, M:3.0, N:3.3, P:3.6, Q:3.9, R:4.3,
  S:4.7, T:5.1, U:5.6, V:6.2, W:6.8, X:7.5, Y:8.2, Z:9.1
};

function calc198() {
  let code = document.getElementById("code198").value.trim().toUpperCase();
  if (!/^[A-Z]\d$/.test(code)) {
    document.getElementById("res198").innerText = "Code invalide (Lettre + chiffre)";
    return;
  }
  let letter = code[0];
  let exp = parseInt(code[1]);
  if (!table198[letter]) {
    document.getElementById("res198").innerText = "Lettre non reconnue";
    return;
  }
  let pf = table198[letter] * Math.pow(10, exp);
  document.getElementById("res198").innerText = "Capacité : " + formatCap(pf * 1000000); // pF base
}

// Code R (ex: 4R7 → 4.7 pF)
function calcR() {
  let code = document.getElementById("codeR").value.trim().toUpperCase();
  if (!code.includes("R")) {
    document.getElementById("resR").innerText = "Code invalide (manque R)";
    return;
  }
  let parts = code.split("R");
  let value;
  if (parts[0] === "") {
    value = parseFloat("0." + parts[1]);
  } else if (parts[1] === "") {
    value = parseFloat(parts[0]);
  } else {
    value = parseFloat(parts[0] + "." + parts[1]);
  }
  if (isNaN(value)) {
    document.getElementById("resR").innerText = "Format incorrect";
    return;
  }
  document.getElementById("resR").innerText = "Capacité : " + value + " pF";
}
</script>

</body>
</html>
