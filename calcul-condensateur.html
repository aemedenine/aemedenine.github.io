<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcul Condensateur | Atelier Électronique Médenine</title>
<link rel="icon" href="images/favicon.png">

<style>

/* ================= RESET ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0f172a;color:white;line-height:1.6;}

/* ================= HEADER ================= */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo-img{
width:60px;
height:60px;
border-radius:50%;
border:3px solid #38bdf8;
padding:5px;
background:rgba(255,255,255,0.05);
box-shadow:0 4px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

.logo-img:hover{
transform:scale(1.1);
box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

.logo h1{
font-size:24px;
font-weight:700;
color:#fff;
letter-spacing:1px;
}

.nav{
display:flex;
align-items:center;
gap:25px;
}

.nav a{
color:white;
text-decoration:none;
font-weight:500;
transition:0.3s;
}

.nav a:hover{
color:#38bdf8;
}

/* ================= PAGE ================= */

.calc-cap{
padding:80px 8%;
text-align:center;
}

.calc-cap h2{
font-size:36px;
color:#38bdf8;
margin-bottom:40px;
}

/* ================= BOX ================= */

.cap-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(8px);
border-radius:20px;
padding:30px;
max-width:500px;
margin:30px auto;
position:relative;
overflow:hidden;
transition:transform 0.4s, box-shadow 0.4s;
}

.cap-box::before{
content:'';
position:absolute;
top:0;
left:-75%;
width:50%;
height:100%;
background:linear-gradient(120deg, rgba(255,255,255,0.15), rgba(255,255,255,0));
transform:skewX(-20deg);
transition:0.5s;
}

.cap-box:hover::before{
left:125%;
}

.cap-box:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 15px 35px rgba(56,189,248,0.7),
0 0 20px rgba(56,189,248,0.5) inset;
}

.cap-box h3{
margin-bottom:10px;
}

.cap-box input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
background:rgba(255,255,255,0.1);
color:white;
}

.cap-box button{
margin-top:15px;
padding:12px;
border:none;
border-radius:50px;
background:#38bdf8;
color:black;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.cap-box button:hover{
box-shadow:0 8px 20px rgba(56,189,248,0.6);
}

.result{
margin-top:20px;
font-size:20px;
color:#38bdf8;
font-weight:600;
}

</style>
</head>


<body>

<header class="header">

<div class="logo">
<img src="images/logo.png" class="logo-img">
<h1>Atelier Électronique Médenine</h1>
</div>

<nav class="nav">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<section class="calc-cap">

<h2>Calcul Condensateur SMD</h2>


<!-- ===== EIA 3 ===== -->

<div class="cap-box">

<h3>EIA 3 chiffres</h3>

<input type="text" id="code3" placeholder="Ex: 104 , 472">

<button onclick="calc3()">Calculer</button>

<div class="result" id="res3">Capacité: —</div>

</div>



<!-- ===== EIA 4 ===== -->

<div class="cap-box">

<h3>EIA 4 chiffres</h3>

<input type="text" id="code4" placeholder="Ex: 1001 , 2202">

<button onclick="calc4()">Calculer</button>

<div class="result" id="res4">Capacité: —</div>

</div>



<!-- ===== EIA198 ===== -->

<div class="cap-box">

<h3>EIA-198</h3>

<input type="text" id="code198" placeholder="Ex: D3 , S4">

<button onclick="calc198()">Calculer</button>

<div class="result" id="res198">Capacité: —</div>

</div>

<div class="cap-box">

<h3>Code Condensateur avec R</h3>

<input type="text" id="codeR" placeholder="Ex: 4R7 , R47 , 2R2">

<button onclick="calcR()">Calculer</button>

<div class="result" id="resR">Capacité: —</div>

</div>
</section>
  
<script>

/* ===== CONVERSION ===== */

function formatCap(pf){

if(pf>=1000000)
return (pf/1000000).toFixed(2)+" µF";

if(pf>=1000)
return (pf/1000).toFixed(2)+" nF";

return pf+" pF";

}


/* ===== EIA 3 ===== */

function calc3(){

let code=document.getElementById("code3").value;

if(!/^\d{3}$/.test(code)){
document.getElementById("res3").innerText="Code invalide";
return;
}

let x1=parseInt(code[0]);
let x2=parseInt(code[1]);
let x3=parseInt(code[2]);

let pf=(x1*10+x2)*Math.pow(10,x3);

document.getElementById("res3").innerText="Capacité: "+formatCap(pf);

}


/* ===== EIA 4 ===== */

function calc4(){

let code=document.getElementById("code4").value;

if(!/^\d{4}$/.test(code)){
document.getElementById("res4").innerText="Code invalide";
return;
}

let num=parseInt(code.slice(0,3));
let mult=parseInt(code[3]);

let pf=num*Math.pow(10,mult);

document.getElementById("res4").innerText="Capacité: "+formatCap(pf);

}


/* ===== EIA198 ===== */

const table={
A:1.0,B:1.1,C:1.2,D:1.3,E:1.5,
F:1.6,G:1.8,H:2.0,J:2.2,K:2.4,
L:2.7,M:3.0,N:3.3,P:3.6,Q:3.9,
R:4.3,S:4.7,T:5.1,U:5.6,V:6.2
};

function calc198(){

let code=document.getElementById("code198").value.toUpperCase();

if(!/^[A-Z]\d$/.test(code)){
document.getElementById("res198").innerText="Code invalide";
return;
}

let letter=code[0];
let exp=parseInt(code[1]);

let pf=table[letter]*Math.pow(10,exp);

document.getElementById("res198").innerText="Capacité: "+formatCap(pf);

}
function calcR(){

let code=document.getElementById("codeR").value.toUpperCase();

if(!code.includes("R")){
document.getElementById("resR").innerText="Code invalide";
return;
}

let parts=code.split("R");

let value;

if(parts[0]===""){

value=parseFloat("0."+parts[1]);

}

else if(parts[1]===""){

value=parseFloat(parts[0]);

}

else{

value=parseFloat(parts[0]+"."+parts[1]);

}

document.getElementById("resR").innerText="Capacité: "+value+" pF";

}
</script>

</body>
</html>
