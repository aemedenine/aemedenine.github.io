<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcul Condensateur | Atelier Électronique Médenine</title>

<style>

/* ===== PAGE ===== */

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.calc-cap{
padding:80px 8%;
text-align:center;
}

.calc-cap h2{
font-size:36px;
color:#38bdf8;
margin-bottom:40px;
}

/* ===== BOX ===== */

.cap-box{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:30px;
max-width:500px;
margin:30px auto;
backdrop-filter:blur(8px);
}

.cap-box h3{
margin-bottom:10px;
}

.cap-box input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
background:rgba(255,255,255,0.1);
color:white;
}

.cap-box button{
margin-top:15px;
padding:12px;
border:none;
border-radius:50px;
background:#38bdf8;
color:black;
font-weight:600;
cursor:pointer;
}

.cap-box button:hover{
box-shadow:0 8px 20px rgba(56,189,248,0.6);
}

.result{
margin-top:20px;
font-size:20px;
color:#38bdf8;
}

</style>
</head>


<body>

<section class="calc-cap">

<h2>Calcul Condensateur SMD</h2>

<!-- ================= EIA 3 ================= -->

<div class="cap-box">

<h3>EIA 3 chiffres</h3>

<input type="text" id="code3" placeholder="Ex: 104 , 472">

<button onclick="calc3()">Calculer</button>

<div class="result" id="res3">Résultat: —</div>

</div>


<!-- ================= EIA 4 ================= -->

<div class="cap-box">

<h3>EIA 4 chiffres</h3>

<input type="text" id="code4" placeholder="Ex: 1001 , 2202">

<button onclick="calc4()">Calculer</button>

<div class="result" id="res4">Résultat: —</div>

</div>


<!-- ================= EIA198 ================= -->

<div class="cap-box">

<h3>EIA-198</h3>

<input type="text" id="code198" placeholder="Ex: D3 , S4">

<button onclick="calc198()">Calculer</button>

<div class="result" id="res198">Résultat: —</div>

</div>

</section>


<script>

/* ===== CONVERSION ===== */

function formatCap(pf){

if(pf>=1000000)
return (pf/1000000).toFixed(2)+" µF";

if(pf>=1000)
return (pf/1000).toFixed(2)+" nF";

return pf+" pF";

}


/* ===== EIA 3 ===== */

function calc3(){

let code=document.getElementById("code3").value;

if(!/^\d{3}$/.test(code)){

document.getElementById("res3").innerText="Code invalide";
return;

}

let x1=parseInt(code[0]);
let x2=parseInt(code[1]);
let x3=parseInt(code[2]);

let pf=(x1*10+x2)*Math.pow(10,x3);

document.getElementById("res3").innerText="Capacité: "+formatCap(pf);

}


/* ===== EIA 4 ===== */

function calc4(){

let code=document.getElementById("code4").value;

if(!/^\d{4}$/.test(code)){

document.getElementById("res4").innerText="Code invalide";
return;

}

let num=parseInt(code.slice(0,3));
let mult=parseInt(code[3]);

let pf=num*Math.pow(10,mult);

document.getElementById("res4").innerText="Capacité: "+formatCap(pf);

}


/* ===== EIA198 ===== */

const table={
A:1.0,B:1.1,C:1.2,D:1.3,E:1.5,
F:1.6,G:1.8,H:2.0,J:2.2,K:2.4,
L:2.7,M:3.0,N:3.3,P:3.6,Q:3.9,
R:4.3,S:4.7,T:5.1,U:5.6,V:6.2
};

function calc198(){

let code=document.getElementById("code198").value.toUpperCase();

if(!/^[A-Z]\d$/.test(code)){

document.getElementById("res198").innerText="Code invalide";
return;

}

let letter=code[0];
let exp=parseInt(code[1]);

let pf=table[letter]*Math.pow(10,exp);

document.getElementById("res198").innerText="Capacité: "+formatCap(pf);

}

</script>

</body>
</html>
