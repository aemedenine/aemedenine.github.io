<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcul Condensateur | Atelier Électronique Médenine</title>
  <link rel="icon" href="images/favicon.png">
  <style>
    /* ================= GLOBAL ( نفس contact ) ================= */
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      line-height: 1.6;
    }

    /* ================= HEADER (copie exacte mta3 contact) ================= */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: #0f172a;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-img {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }

    .logo h1 {
      font-size: 28px;
      margin: 0;
      color: white;
      font-weight: 600;
    }

    .nav {
      display: flex;
      gap: 40px;
    }

    .nav a {
      color: #cbd5f5;
      text-decoration: none;
      font-size: 17px;
      transition: 0.3s;
    }

    .nav a:hover {
      color: #38bdf8;
    }

    /* ================= MAIN CONTENT ================= */
    .calc-container {
      padding: 100px 8% 100px;
      max-width: 1100px;
      margin: auto;
    }

    .calc-container h2 {
      font-size: 40px;
      text-align: center;
      margin-bottom: 60px;
      color: #38bdf8;
    }

    .calc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 30px;
    }

    .cap-box {
      padding: 30px 25px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      transition: 0.35s;
      background: rgba(15, 23, 42, 0.4);
      border-radius: 12px;
    }

    .cap-box:hover {
      transform: translateX(10px);
      border-color: #38bdf8;
    }

    .cap-box h3 {
      color: #38bdf8;
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .cap-box input {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(30,41,59,0.6);
      color: white;
      text-align: center;
      margin-bottom: 15px;
    }

    .cap-box button {
      width: 100%;
      padding: 14px;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .cap-box button:hover {
      background: #0ea5e9;
    }

    .result {
      margin-top: 18px;
      font-size: 19px;
      font-weight: 600;
      color: #a5b4fc;
      text-align: center;
      min-height: 28px;
    }

    /* ================= FOOTER ( نفس contact ) ================= */
    footer {
      text-align: center;
      margin-top: 80px;
      padding: 30px;
      color: #94a3b8;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    /* ================= WHATSAPP FLOAT ( نفس contact ) ================= */
    .whatsapp-btn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 60px;
      height: 60px;
      background: #25D366;
      color: white;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: 0.3s;
      z-index: 1000;
    }

    .whatsapp-btn:hover {
      transform: scale(1.1);
    }

    /* Mobile adjust */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 15px;
        padding: 15px 6%;
      }
      .nav {
        gap: 25px;
        font-size: 15px;
      }
      .calc-container {
        padding: 80px 6% 80px;
      }
      .calc-container h2 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>

<!-- HEADER identique à contact.html -->
<header class="header">
  <div class="logo">
    <div class="logo-img">
      <img src="images/logo.png" alt="Logo">
    </div>
    <h1>Atelier Électronique Médenine</h1>
  </div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="index.html#services">Services</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- CALCUL SECTION -->
<section class="calc-container">
  <h2>Calcul Condensateur SMD</h2>

  <div class="calc-grid">

    <div class="cap-box">
      <h3>EIA 3 chiffres</h3>
      <input type="text" id="code3" placeholder="Ex: 104 , 225 , 472">
      <button onclick="calc3()">Calculer</button>
      <div class="result" id="res3">Capacité : —</div>
    </div>

    <div class="cap-box">
      <h3>EIA 4 chiffres</h3>
      <input type="text" id="code4" placeholder="Ex: 1001 , 4752 , 2263">
      <button onclick="calc4()">Calculer</button>
      <div class="result" id="res4">Capacité : —</div>
    </div>

    <div class="cap-box">
      <h3>EIA-198 (lettre + chiffre)</h3>
      <input type="text" id="code198" placeholder="Ex: D3 , S4 , R5">
      <button onclick="calc198()">Calculer</button>
      <div class="result" id="res198">Capacité : —</div>
    </div>

    <div class="cap-box">
      <h3>Code avec R (décimal)</h3>
      <input type="text" id="codeR" placeholder="Ex: 4R7 , R47 , 2R2 , 10R">
      <button onclick="calcR()">Calculer</button>
      <div class="result" id="resR">Capacité : —</div>
    </div>

  </div>
</section>

<!-- FOOTER identique style & contenu -->
<footer>
  <p>© 2026 Atelier Électronique Médenine</p>
</footer>

<!-- WhatsApp flottant identique -->
<a href="https://wa.me/21698192103" class="whatsapp-btn" target="_blank">
  💬
</a>

<script>
// Format capacitances
function formatCap(pf) {
  if (pf >= 1000000) return (pf / 1000000).toFixed(2) + " µF";
  if (pf >= 1000)    return (pf / 1000).toFixed(2) + " nF";
  return pf + " pF";
}

// EIA-3
function calc3() {
  const code = document.getElementById("code3").value.trim();
  if (!/^\d{3}$/.test(code)) {
    document.getElementById("res3").innerText = "Code invalide (3 chiffres requis)";
    return;
  }
  const base = parseInt(code[0] + code[1]);
  const mult = parseInt(code[2]);
  const pf = base * Math.pow(10, mult);
  document.getElementById("res3").innerText = "Capacité : " + formatCap(pf);
}

// EIA-4
function calc4() {
  const code = document.getElementById("code4").value.trim();
  if (!/^\d{4}$/.test(code)) {
    document.getElementById("res4").innerText = "Code invalide (4 chiffres requis)";
    return;
  }
  const num = parseInt(code.slice(0,3));
  const mult = parseInt(code[3]);
  const pf = num * Math.pow(10, mult);
  document.getElementById("res4").innerText = "Capacité : " + formatCap(pf);
}

// EIA-198
const table = {A:1.0,B:1.1,C:1.2,D:1.3,E:1.5,F:1.6,G:1.8,H:2.0,J:2.2,K:2.4,L:2.7,M:3.0,N:3.3,P:3.6,Q:3.9,R:4.3,S:4.7,T:5.1,U:5.6,V:6.2};
function calc198() {
  const code = document.getElementById("code198").value.trim().toUpperCase();
  if (!/^[A-Z]\d$/.test(code) || !table[code[0]]) {
    document.getElementById("res198").innerText = "Code invalide (ex: S4)";
    return;
  }
  const base = table[code[0]];
  const mult = parseInt(code[1]);
  const pf = base * Math.pow(10, mult) * 1000000; // pF
  document.getElementById("res198").innerText = "Capacité : " + formatCap(pf);
}

// Code R
function calcR() {
  let code = document.getElementById("codeR").value.trim().toUpperCase().replace(/\s/g,'');
  if (!code.includes("R")) {
    document.getElementById("resR").innerText = "Manque le 'R'";
    return;
  }
  const parts = code.split("R");
  let val;
  if (parts[0] === "") val = parseFloat("0." + parts[1]);
  else if (parts[1] === "") val = parseFloat(parts[0]);
  else val = parseFloat(parts[0] + "." + parts[1]);
  
  if (isNaN(val) || val <= 0) {
    document.getElementById("resR").innerText = "Format incorrect";
    return;
  }
  document.getElementById("resR").innerText = "Capacité : " + val.toFixed(2).replace(/\.?0+$/, "") + " pF";
}
</script>

</body>
</html>
