<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcul Condensateur | Atelier Électronique Médenine</title>
<link rel="stylesheet" href="css/style.css">

<style>

/* ===== CALCUL CONDENSATEUR ===== */

.calc-cap{
  padding:80px 8%;
  text-align:center;
}

.calc-cap h2{
  font-size:36px;
  color:#38bdf8;
  margin-bottom:40px;
}

.cap-box{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(8px);
  border-radius:20px;
  padding:30px;
  max-width:500px;
  margin:auto;
}

.cap-box label{
  display:block;
  text-align:left;
  margin:15px 0 5px;
  font-weight:500;
  color:#cbd5f5;
}

.cap-box input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:white;
  font-size:16px;
}

.cap-box button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:50px;
  background:#38bdf8;
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.cap-box button:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 25px rgba(56,189,248,0.5);
}

.result{
  margin-top:20px;
  font-size:20px;
  color:#38bdf8;
  font-weight:600;
}

.small{
  font-size:14px;
  color:#cbd5f5;
}

/* ===== ANIMATION BOX ===== */

.cap-box{
  position:relative;
  overflow:hidden;
  transition: transform 0.4s, box-shadow 0.4s;
}

.cap-box::before{
  content:'';
  position:absolute;
  top:0;
  left:-75%;
  width:50%;
  height:100%;
  background:linear-gradient(120deg, rgba(255,255,255,0.15), rgba(255,255,255,0));
  transform:skewX(-20deg);
  transition:0.5s;
}

.cap-box:hover::before{
  left:125%;
}

.cap-box:hover{
  transform:translateY(-5px) scale(1.05);
  box-shadow:
  0 15px 35px rgba(56,189,248,0.7),
  0 0 20px rgba(56,189,248,0.5) inset;
}

</style>
</head>

<body>

<header class="header">
  <div class="logo">
    <img src="images/logo.png" alt="Logo" class="logo-img">
    <h1>Atelier Électronique Médenine</h1>
  </div>

  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>


<section class="calc-cap">

<h2>Calcul Condensateur SMD / CMS</h2>

<div class="cap-box">

<label>Code Condensateur:</label>

<input type="text" id="code" placeholder="Ex: 104 , 4R7 , D3 , 475K">

<button onclick="decode()">Calculer</button>

<div class="result" id="result">Capacité: —</div>

<div class="small">
Exemples :<br>
104 = 100 nF<br>
105 = 1 µF<br>
4R7 = 4.7 pF<br>
D3 = 1.3 nF<br>
475K = 4.7 µF
</div>

</div>

</section>


<script>

/* ===== TABLE EIA198 ===== */

const eia198Table = {
A:1.0,B:1.1,C:1.2,D:1.3,E:1.5,
F:1.6,G:1.8,H:2.0,J:2.2,K:2.4,
L:2.7,M:3.0,N:3.3,P:3.6,Q:3.9,
R:4.3,S:4.7,T:5.1,U:5.6,V:6.2,
W:6.8,X:7.5,Y:8.2,Z:9.1
};

const toleranceTable={
B:'±0.1pF',C:'±0.25pF',D:'±0.5pF',
F:'±1%',G:'±2%',J:'±5%',
K:'±10%',M:'±20%',Z:'+80/-20%'
};


/* ===== FORMAT VALUE ===== */

function formatValue(pf){

if(pf>=1000000) return (pf/1000000).toFixed(3)+' µF';
if(pf>=1000) return (pf/1000).toFixed(2)+' nF';
return pf.toFixed(2)+' pF';

}


/* ===== DECODE ===== */

function decode(){

let code=document.getElementById("code").value.toUpperCase().trim();

if(!code){
document.getElementById("result").innerHTML="Capacité: —";
return;
}

let valuePf=null;
let tolerance="";


/* 4R7 format */

if(code.includes('R')){

let parts=code.split('R');

let left=parts[0]||"0";
let right=parts[1]||"0";

valuePf=parseFloat(left+"."+right);

}


/* EIA198 */

else if(code.length==2 && isNaN(code[0]) && !isNaN(code[1])){

let letter=code[0];
let exp=parseInt(code[1]);

if(eia198Table[letter])
valuePf=eia198Table[letter]*Math.pow(10,exp);

}


/* 104 format */

else if(/^\d{3,4}$/.test(code)){

let num=code.slice(0,-1);
let exp=parseInt(code.slice(-1));

valuePf=parseInt(num)*Math.pow(10,exp);

}


/* tolerance */

let last=code.slice(-1);

if(toleranceTable[last]){

tolerance=" ±"+toleranceTable[last];

}


/* result */

if(!valuePf){

document.getElementById("result").innerHTML="Code non reconnu";
return;

}

let result=formatValue(valuePf);

document.getElementById("result").innerHTML=
"Capacité: "+result+tolerance;

}

</script>

</body>
</html>
