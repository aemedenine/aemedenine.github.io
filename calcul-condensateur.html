  <!-- Style spécifique page calcul (gardé léger + compatible avec ton style.css) -->
  <style>
    .calc-container {
      padding: 120px 8% 100px;
      max-width: 1100px;
      margin: auto;
    }
    .calc-container h2 {
      font-size: 40px;
      text-align: center;
      margin-bottom: 60px;
      color: #38bdf8;
    }
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 30px;
    }
    .cap-box {
      background: rgba(30,41,59,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 16px;
      padding: 32px 28px;
      transition: all 0.4s;
    }
    .cap-box:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(56,189,248,0.35);
      border-color: #38bdf8;
    }
    .cap-box h3 {
      color: #38bdf8;
      font-size: 22px;
      margin-bottom: 20px;
      text-align: center;
    }
    .cap-box input {
      width: 100%;
      padding: 14px 16px;
      font-size: 17px;
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: white;
      text-align: center;
      margin-bottom: 16px;
    }
    .cap-box button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #0ea5e9, #38bdf8);
      color: #000;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .cap-box button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(56,189,248,0.5);
    }
    .result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: 600;
      color: #a5b4fc;
      text-align: center;
      min-height: 30px;
    }
    @media (max-width: 768px) {
      .calc-container { padding: 90px 6% 70px; }
      .calc-container h2 { font-size: 32px; }
    }
  </style>
</head>

<!-- ================= CALCULATEUR JS (gardé tel quel) ================= -->
<script>
// tes fonctions calc3, calc4, calc198, calcR, formatCap ...
function formatCap(pf) {
  if (pf >= 1000000) return (pf / 1000000).toFixed(2) + " µF";
  if (pf >= 1000)    return (pf / 1000).toFixed(2) + " nF";
  return pf + " pF";
}

function calc3() {
  const code = document.getElementById("code3").value.trim();
  if (!/^\d{3}$/.test(code)) {
    document.getElementById("res3").innerText = "Code invalide (3 chiffres requis)";
    return;
  }
  const base = parseInt(code[0] + code[1]);
  const mult = parseInt(code[2]);
  const pf = base * Math.pow(10, mult);
  document.getElementById("res3").innerText = "Capacité : " + formatCap(pf);
}

// ... les autres fonctions calc4, calc198, calcR identiques à ce que t'as déjà
</script>
