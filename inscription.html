<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar">
<div class="container nav-wrapper">

<div class="logo">
<img src="photos/logo.png" class="logo-img">
<span class="logo-text">Atelier Électronique Médenine</span>
</div>

</div>
</nav>

<section class="hero">

<div class="container hero-container">

<div class="hero-text">

<h1>Créer un</h1>
<h1 class="green">compte</h1>

<p>Inscrivez-vous pour accéder aux services de l'atelier.</p>

<form id="registerForm">

<input type="text" id="name" placeholder="Nom complet" required>
<br><br>

<input type="email" id="email" placeholder="Email" required>
<br><br>

<input type="password" id="password" placeholder="Mot de passe" required>
<br><br>

<button type="submit" class="cta">
Créer compte
</button>

</form>

<br>

<button id="googleRegister" class="cta">
Inscription avec Google
</button>

</div>

</div>

</section>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
authDomain: "atelier-electronique-mednine.firebaseapp.com",
projectId: "atelier-electronique-mednine",
storageBucket: "atelier-electronique-mednine.firebasestorage.app",
messagingSenderId: "547430908384",
appId: "1:547430908384:web:4caa4cf3869491bd14eb85",
databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();


// inscription email
document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email,password)

.then(()=>{
alert("Compte créé avec succès");
window.location.href="index.html";
})

.catch((error)=>{
alert(error.message);
});

});


// inscription google
document.getElementById("googleRegister").onclick=function(){

const provider=new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider)

.then(()=>{
window.location.href="index.html";
})

.catch((error)=>{
alert(error.message);
});

};

</script>

</body>
</html>
