<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar">
<div class="container nav-wrapper">

<div class="logo">
<img src="photos/logo.png" class="logo-img">
<span class="logo-text">Atelier Électronique Médenine</span>
</div>

</div>
</nav>

<section class="hero">

<div class="container hero-container">

<div class="hero-text">

<h1>Créer un</h1>
<h1 class="green">compte</h1>

<p>Inscrivez-vous pour accéder aux services de l'atelier.</p>

<form id="registerForm">

<input type="text" id="name" placeholder="Nom complet" required>
<br><br>

<input type="email" id="email" placeholder="Email" required>
<br><br>

<input type="password" id="password" placeholder="Mot de passe" required>
<br><br>

<button type="submit" class="cta">
Créer compte
</button>

</form>

<br>

<button id="googleRegister" class="cta">
Inscription avec Google
</button>

</div>

</div>

</section>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="register.js"></script>

</body>
</html>
