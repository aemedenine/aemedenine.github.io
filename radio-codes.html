<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Code | Atelier Électronique Médenine</title>
<link rel="icon" href="images/favicon.png">

<style>

/* ================= BASE ================= */
body{
  background:#0f172a;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  margin:0;
  padding:0;
}

/* ================= HEADER ================= */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 8%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:1000;
}

/* ================= LOGO ================= */
.logo{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-img{
  width:44px;
  height:44px;
  border-radius:50%;
  border:3px solid #38bdf8;
  padding:5px;
  background:rgba(255,255,255,0.05);
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
  transition:0.3s;
}

.logo-img:hover{
  transform:scale(1.1);
}

.logo h1{
  font-size:24px;
  font-weight:700;
}

/* ================= NAV ================= */
.nav{
  display:flex;
  gap:25px;
  align-items:center;
}

.nav a{
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.nav a:hover{
  color:#38bdf8;
}

.login-btn{
  padding:8px 18px;
  border:none;
  border-radius:30px;
  background:#38bdf8;
  font-weight:600;
  cursor:pointer;
}

/* ================= FORM ================= */
.radio-container{
  padding:120px 8%;
  max-width:700px;
  margin:auto;
}

.radio-container h2{
  text-align:center;
  font-size:36px;
}

.radio-form{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:18px;
  margin-top:25px;
}

.radio-form input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:white;
}

.radio-form button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:30px;
  background:#38bdf8;
  font-weight:600;
  cursor:pointer;
}

/* ================= MODAL ================= */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.modal.active{
  display:flex;
}

.modal-content{
  background:#111827;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

.modal-content strong{
  font-size:30px;
  letter-spacing:3px;
}

.modal-content button{
  margin-top:15px;
  padding:10px 25px;
  border:none;
  border-radius:25px;
  background:#38bdf8;
  cursor:pointer;
}

/* ================= FOOTER ================= */
footer{
  text-align:center;
  padding:25px;
  color:#94a3b8;
}

</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="images/logo.png" class="logo-img">
    <h1>Atelier Électronique Médenine</h1>
  </div>

  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="index.html#services">Services</a>
    <a href="contact.html">Contact</a>
    <button class="login-btn">Login</button>
  </nav>
</header>

<section class="radio-container">
  <h2>Déverrouillage Code Radio</h2>

  <div class="radio-form">
    <input type="text" id="car-brand" placeholder="Marque voiture (ex: Renault)">
    <input type="text" id="serial-number" placeholder="Précode radio (ex: A123)">
    <button onclick="generateCode()">Calculer le Code</button>
  </div>

</section>

<div class="modal" id="result-modal">
  <div class="modal-content">

    <h2>Votre Code Radio</h2>

    <p>Marque: <strong id="modal-brand"></strong></p>

    <p>Précode: <strong id="modal-serial"></strong></p>

    <p>Code: <strong id="modal-code"></strong></p>

    <button onclick="closeModal()">Fermer</button>

  </div>
</div>

<footer>
© 2026 Atelier Électronique Médenine
</footer>

<script>

/* ================= RENAULT ALGORITHM ================= */

function calculateRenaultCode(precode){

  precode = precode.toUpperCase().trim();

  if (!/^[A-Z]\d{3}$/.test(precode) || precode.startsWith('A0')){
    return "0000";
  }

  const letter = precode.charAt(0);
  const n1 = parseInt(precode.charAt(1));
  const n2 = parseInt(precode.charAt(2));
  const n3 = parseInt(precode.charAt(3));

  let x = (letter.charCodeAt(0) * 10) + n1 - 698;

  let y = (n3 + (n2 * 10)) + x - 528;

  let code = (y * 9) % 10000;

  return code.toString().padStart(4,'0');
}

/* ================= GENERATE ================= */

function generateCode(){

  const brand = document.getElementById("car-brand").value;

  const serial = document.getElementById("serial-number").value;

  if(!brand || !serial){
    alert("Entrez la marque et le précode !");
    return;
  }

  const code = calculateRenaultCode(serial);

  document.getElementById("modal-brand").textContent = brand;

  document.getElementById("modal-serial").textContent = serial;

  document.getElementById("modal-code").textContent = code;

  document.getElementById("result-modal").classList.add("active");

}

function closeModal(){
  document.getElementById("result-modal").classList.remove("active");
}

</script>

</body>
</html>
