<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Déverrouillage Code Radio | Atelier Électronique Médenine</title>
  <link rel="icon" href="images/favicon.png">
  
  <style>
    /* ================= RESET ================= */
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Arial',sans-serif; }
    body { background:#0f172a; color:white; line-height:1.6; }

    /* ================= HEADER ================= */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 5%;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #38bdf8;
      padding: 4px;
    }
    .logo h1 {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
    }

    /* Hamburger (mobile only) */
    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      z-index: 1100;
    }
    .hamburger span {
      width: 25px;
      height: 3px;
      background: white;
      border-radius: 3px;
      transition: 0.4s;
    }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -6px); }

    /* Nav links - BLANC fixe */
    .nav {
      display: none;
      align-items: center;
      gap: 25px;
    }
    .nav a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: 0.3s;
    }
    .nav a:hover {
      color: white;
      text-decoration: underline;
      transform: scale(1.03);
    }

    /* Mobile menu */
    .mobile-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background: rgba(15,23,42,0.98);
      backdrop-filter: blur(10px);
      flex-direction: column;
      align-items: center;
      padding: 25px 0;
      gap: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
    .mobile-menu a {
      color: white;
      text-decoration: none;
      font-size: 17px;
      padding: 12px 30px;
      width: 85%;
      text-align: center;
      border-radius: 10px;
      transition: 0.3s;
    }
    .mobile-menu a:hover {
      background: rgba(56,189,248,0.15);
    }

    /* ================= MAIN CONTENT ================= */
    .radio-container {
      padding: 100px 5% 80px;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }
    .radio-container h2 {
      font-size: 28px;
      margin-bottom: 40px;
      color: #38bdf8;
    }

    .radio-form {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .field-wrapper {
      position: relative;
    }
    .field-wrapper span {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: #94a3b8;
    }
    input {
      width: 100%;
      padding: 12px 12px 12px 45px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      border: 1px solid #38bdf8;
      box-shadow: 0 0 15px rgba(56,189,248,0.3);
    }

    .calc-btn {
      padding: 12px;
      border: none;
      border-radius: 50px;
      background: #38bdf8;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .calc-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(56,189,248,0.5);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 25px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    .modal-content h2 { color: #38bdf8; margin-bottom: 15px; font-size: 24px; }
    .modal-actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .modal-btn {
      padding: 10px 22px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .close-btn { background: #4b5563; color: white; }
    .copy-btn { background: #38bdf8; color: #000; }

    /* WhatsApp btn */
    .whatsapp-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      background: #25D366;
      color: white;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      z-index: 1000;
      transition: 0.3s;
    }
    .whatsapp-btn:hover { transform: scale(1.1); }

    /* Footer */
    footer {
      background: #020617;
      color: #94a3b8;
      padding: 20px;
      text-align: center;
      font-size: 13px;
      margin-top: 40px;
    }

    /* ================= DESKTOP ================= */
    @media (min-width: 768px) {
      .header { padding: 15px 8%; }
      .logo-img { width: 60px; height: 60px; }
      .logo h1 { font-size: 22px; }
      .hamburger { display: none; }
      .nav { display: flex; gap: 30px; }
      .radio-container { padding: 140px 8% 100px; }
      .radio-container h2 { font-size: 36px; }
      .radio-form { padding: 35px; }
      .modal-content { max-width: 500px; padding: 35px; }
    }
  </style>
</head>
<body>

  <!-- ================= HEADER ================= -->
  <header class="header">
    <div class="logo">
      <img src="images/logo.png" alt="Logo" class="logo-img">
      <h1>Atelier Électronique Médenine</h1>
    </div>

    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <nav class="nav">
      <a href="index.html">Accueil</a>
      <a href="services.html">Services</a>
      <a href="radio-codes.html">Code Radio</a>
      <a href="contact.html">Contact</a>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html">Accueil</a>
      <a href="services.html">Services</a>
      <a href="radio-codes.html">Code Radio</a>
      <a href="contact.html">Contact</a>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <section class="radio-container">
    <h2>Déverrouillage Code Radio</h2>
    
    <div class="radio-form">
      <div class="field-wrapper">
        <span>🚗</span>
        <input type="text" id="car-brand" placeholder="Marque voiture (Renault)">
      </div>
      <div class="field-wrapper">
        <span>🔢</span>
        <input type="text" id="precode" placeholder="Précode radio (ex: A123)" maxlength="4">
      </div>
      <button class="calc-btn" onclick="generateCode()">Calculer le Code</button>
    </div>
  </section>

  <!-- RESULT MODAL -->
  <div class="modal" id="result-modal">
    <div class="modal-content">
      <h2>Votre Code Radio</h2>
      <p>Marque: <strong id="modal-brand">—</strong></p>
      <p>Précode: <strong id="modal-precode">—</strong></p>
      <p>Code: <strong id="modal-code">🔒 Paiement requis (10 DT)</strong></p>
      <div class="modal-actions" style="margin-top:20px;">
        <button class="modal-btn copy-btn" onclick="openClientForm()">Payer 10 DT via WhatsApp</button>
        <button class="modal-btn close-btn" onclick="closeModal()">Fermer</button>
      </div>
    </div>
  </div>

  <!-- CLIENT FORM MODAL -->
  <div class="modal" id="client-form">
    <div class="modal-content">
      <h2>Demande Code Radio</h2>
      <input type="text" id="client-name" placeholder="Nom complet">
      <input type="tel" id="client-phone" placeholder="Numéro téléphone (ex: 98 192 103)">
      <div class="modal-actions" style="margin-top:25px;">
        <button class="modal-btn copy-btn" onclick="sendWhatsApp()">Envoyer</button>
        <button class="modal-btn close-btn" onclick="closeForm()">Fermer</button>
      </div>
    </div>
  </div>

  <!-- WhatsApp floating -->
  <a href="https://wa.me/21698192103" class="whatsapp-btn" target="_blank">💬</a>

  <footer>
    <p>© 2026 Atelier Électronique Médenine</p>
  </footer>

  <script>
    // Hamburger
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      mobileMenu.style.display = mobileMenu.style.display === 'flex' ? 'none' : 'flex';
    });

    document.querySelectorAll('.mobile-menu a').forEach(el => {
      el.addEventListener('click', () => {
        hamburger.classList.remove('active');
        mobileMenu.style.display = 'none';
      });
    });

    // Code logic
    let savedBrand = "", savedPrecode = "";

    function generateCode() {
      let brand = document.getElementById("car-brand").value.trim();
      let precode = document.getElementById("precode").value.trim().toUpperCase();

      if (!brand || !precode) return alert("Remplissez tous les champs");
      if (!brand.toLowerCase().includes("renault")) return alert("Outil optimisé pour Renault seulement");
      if (!/^[A-Z]\d{3}$/.test(precode)) return alert("Précode invalide (ex: A123)");

      savedBrand = brand;
      savedPrecode = precode;

      document.getElementById("modal-brand").textContent = brand;
      document.getElementById("modal-precode").textContent = precode;
      document.getElementById("result-modal").classList.add("active");
    }

    function closeModal() { document.getElementById("result-modal").classList.remove("active"); }
    function openClientForm() { document.getElementById("client-form").classList.add("active"); }
    function closeForm() { document.getElementById("client-form").classList.remove("active"); }

    function sendWhatsApp() {
      let name = document.getElementById("client-name").value.trim();
      let phone = document.getElementById("client-phone").value.trim();

      if (!name || !phone) return alert("Remplissez nom et téléphone");

      let p = savedPrecode;
      let x = p.charCodeAt(1) + p.charCodeAt(0)*10 - 698;
      let y = p.charCodeAt(3) + p.charCodeAt(2)*10 + x - 528;
      let z = (y*7) % 100;
      if (z < 0) z += 100;
      let codeNum = Math.floor(z/10) + (z%10)*10 + ((259 % Math.abs(x)) % 100)*100;
      let code = codeNum.toString().padStart(4,'0');

      let message = `Demande Code Radio\nNom: ${name}\nTéléphone: ${phone}\nVoiture: ${savedBrand}\nPrécode: ${savedPrecode}\nPrix: 10 DT\n#REF-${code}`;

      window.open(`https://wa.me/21698192103?text=${encodeURIComponent(message)}`, "_blank");
      closeForm();
      closeModal();
    }
  </script>
</body>
</html>
