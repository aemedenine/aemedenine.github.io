<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Déverrouillage Code Radio | Atelier Électronique Médenine</title>
<link rel="icon" href="images/favicon.png">
<link rel="stylesheet" href="css/style.css">

<style>

.radio-container{
padding:140px 8% 100px;
max-width:800px;
margin:auto;
}

.radio-container h2{
text-align:center;
font-size:36px;
margin-bottom:40px;
}

.radio-form{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:30px;
display:flex;
flex-direction:column;
gap:20px;
}

.field-wrapper{
position:relative;
}

.field-wrapper span{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
font-size:20px;
color:#94a3b8;
}

input{
width:100%;
padding:12px 12px 12px 45px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.05);
color:white;
font-size:16px;
margin-top:10px;
}

button.calc-btn{
padding:12px;
border:none;
border-radius:50px;
background:#38bdf8;
color:#000;
font-weight:600;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal.active{
display:flex;
}

.modal-content{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:30px;
max-width:500px;
width:90%;
text-align:center;
}

.modal-actions{
margin-top:20px;
display:flex;
gap:10px;
justify-content:center;
}

.modal-btn{
padding:10px 20px;
border-radius:50px;
font-weight:600;
cursor:pointer;
}

.copy-btn{
background:#38bdf8;
color:#000;
}

.close-btn{
background:#4b5563;
color:white;
}

</style>
</head>

<body>

<header class="header">
<div class="logo">
<img src="images/logo.png" class="logo-img">
<h1>Atelier Électronique Médenine</h1>
</div>

<nav class="nav">
<a href="index.html">Home</a>
<a href="index.html#services">Services</a>
<a href="radio-codes.html">Code Radio</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="radio-container">

<h2>Déverrouillage Code Radio</h2>

<div class="radio-form">

<div class="field-wrapper">
<span>🚗</span>
<input type="text" id="car-brand" placeholder="Marque voiture (Renault)">
</div>

<div class="field-wrapper">
<span>🔢</span>
<input type="text" id="precode" placeholder="Précode radio (ex: A123)" maxlength="4">
</div>

<button class="calc-btn" onclick="generateCode()">Calculer le Code</button>

</div>
</section>

<!-- RESULT MODAL -->

<div class="modal" id="result-modal">

<div class="modal-content">

<h2>Votre Code Radio</h2>

<p>Marque: <strong id="modal-brand">—</strong></p>
<p>Précode: <strong id="modal-precode">—</strong></p>

<p>Code: <strong>🔒 Paiement requis</strong></p>

<div class="modal-actions">

<button class="modal-btn copy-btn" onclick="openForm()">Payer 10DT</button>

<button class="modal-btn close-btn" onclick="closeModal()">Fermer</button>

</div>

</div>
</div>

<!-- CLIENT FORM -->

<div class="modal" id="client-form">

<div class="modal-content">

<h2>Demande Code Radio</h2>

<form action="http://localhost:3000/send" method="POST">

<input type="text" name="name" placeholder="Nom complet" required>

<input type="text" name="phone" placeholder="Numéro téléphone" required>

<input type="hidden" name="brand" id="brandField">
<input type="hidden" name="precode" id="precodeField">

<div class="modal-actions">

<button class="modal-btn copy-btn">Envoyer</button>

<button type="button" class="modal-btn close-btn" onclick="closeForm()">Fermer</button>

</div>

</form>

</div>
</div>

<footer>
<p>© 2026 Atelier Électronique Médenine</p>
</footer>

<script>

function generateCode(){

const brand=document.getElementById('car-brand').value
const precode=document.getElementById('precode').value

if(!brand || !precode){

alert("Entrer marque et précode")

return

}

document.getElementById('modal-brand').textContent=brand
document.getElementById('modal-precode').textContent=precode

document.getElementById('result-modal').classList.add("active")

}

function openForm(){

document.getElementById("brandField").value =
document.getElementById("car-brand").value

document.getElementById("precodeField").value =
document.getElementById("precode").value

document.getElementById("client-form").classList.add("active")

}

function closeForm(){

document.getElementById("client-form").classList.remove("active")

}

function closeModal(){

document.getElementById("result-modal").classList.remove("active")

}

</script>

</body>
</html>
