<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Radio | Atelier Électronique Médenine</title>
<link rel="icon" href="images/favicon.png">

<style>
/* ================= BODY ================= */
body{
  background:#0f172a;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  margin:0;
}

/* ================= HEADER exactement comme contact.html ================= */
.header{
  position:fixed;
  top:0; left:0; right:0;
  padding:1.4rem 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
  background:rgba(15,23,42,0.95);
  backdrop-filter:blur(15px);
}
.logo{
  display:flex;
  align-items:center;
  gap:1rem;
}
.logo-img{height:45px;width:auto;}
.logo h1{font-size:1.6rem;}
.nav{display:flex;gap:2rem;align-items:center;}
.nav a{
  color:white;
  text-decoration:none;
  font-weight:500;
}
.nav a:hover{color:#38bdf8;}
.login-btn{
  padding:0.6rem 1.5rem;
  background:#38bdf8;
  border:none;
  border-radius:30px;
  color:white;
  font-weight:600;
  cursor:pointer;
}
.login-btn:hover{background:#0ea5e9;}

/* ================= PAGE CONTENT ================= */
.page-container{
  padding:160px 8% 100px;
  max-width:900px;
  margin:auto;
}
.page-container h2{
  font-size:40px;
  text-align:center;
  margin-bottom:40px;
}

/* ================= FORM ================= */
.form-card{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:18px;
  max-width:600px;
  margin:auto;
}
.form-card input{
  width:100%;
  padding:12px 15px;
  margin:12px 0;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.07);
  color:white;
}
.form-card button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  background:#38bdf8;
  color:white;
  font-weight:600;
  cursor:pointer;
  margin-top:12px;
}
.form-card button:hover{background:#0ea5e9;}

/* ================= MODAL ================= */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:2000;
}
.modal.active{opacity:1;pointer-events:auto;}
.modal-content{
  background:rgba(20,28,55,0.8);
  padding:2rem;
  border-radius:18px;
  max-width:450px;
  text-align:center;
  color:white;
}
.modal-content button{
  margin-top:20px;
  padding:10px 25px;
  background:#38bdf8;
  border:none;
  border-radius:30px;
  color:white;
  font-weight:600;
  cursor:pointer;
}
.modal-content button:hover{background:#0ea5e9;}

/* ================= FOOTER ================= */
footer{
  text-align:center;
  margin-top:60px;
  padding:30px;
  color:#94a3b8;
}
</style>
</head>
<body>

<!-- ================= HEADER EXACTEMENT COMME CONTACT ================= -->
<header class="header">
  <div class="logo">
    <img src="images/logo.png" alt="Logo" class="logo-img">
    <h1>Atelier Électronique Médenine</h1>
  </div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="index.html#services">Services</a>
    <a href="contact.html">Contact</a>
    <button class="login-btn">Login</button>
  </nav>
</header>

<!-- ================= PAGE CONTENT ================= -->
<section class="page-container">
  <h2>Code Radio Voiture</h2>
  <div class="form-card">
    <input type="text" id="car-brand" placeholder="Marque de voiture">
    <input type="text" id="serial-number" placeholder="Numéro de série / Précode">
    <button onclick="generateCode()">Calculer le Code</button>
  </div>
</section>

<!-- ================= MODAL ================= -->
<div class="modal" id="result-modal">
  <div class="modal-content">
    <h2>Votre Code Radio</h2>
    <p>Marque: <strong id="modal-brand">—</strong></p>
    <p>Numéro de série: <strong id="modal-serial">—</strong></p>
    <p>Code: <strong id="modal-code" style="letter-spacing:4px;font-size:1.5rem;">—</strong></p>
    <button onclick="closeModal()">Fermer</button>
  </div>
</div>

<!-- ================= FOOTER ================= -->
<footer>
  <p>© 2026 Atelier Électronique Médenine</p>
</footer>

<script>
// Fill modal with demo code
function generateCode(){
  const brand = document.getElementById('car-brand').value.trim();
  const serial = document.getElementById('serial-number').value.trim();
  if(!brand || !serial){alert("Remplissez tous les champs !"); return;}
  let hash = 0;
  for(let i=0;i<serial.length;i++){hash=(hash*31+serial.charCodeAt(i))%100000;}
  const code = String(hash).padStart(5,'0').slice(-5);
  document.getElementById('modal-brand').textContent = brand;
  document.getElementById('modal-serial').textContent = serial;
  document.getElementById('modal-code').textContent = code;
  document.getElementById('result-modal').classList.add('active');
}
function closeModal(){document.getElementById('result-modal').classList.remove('active');}
</script>

</body>
</html>
