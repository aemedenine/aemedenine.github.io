<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Déverrouillage Code Radio | Atelier Électronique Médenine</title>
<link rel="icon" href="images/favicon.png">
<link rel="stylesheet" href="css/style.css">

<style>

.radio-container{
padding:140px 8% 100px;
max-width:800px;
margin:auto;
}

.radio-container h2{
text-align:center;
font-size:36px;
margin-bottom:40px;
}

.radio-form{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:30px;
display:flex;
flex-direction:column;
gap:20px;
}

.field-wrapper{
position:relative;
}

.field-wrapper span{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
font-size:20px;
color:#94a3b8;
}

input{
width:100%;
padding:12px 12px 12px 45px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.05);
color:white;
font-size:16px;
margin-top:10px;
}

input:focus{
outline:none;
border:1px solid #38bdf8;
box-shadow:0 0 15px rgba(56,189,248,0.3);
}

button.calc-btn{
padding:12px;
border:none;
border-radius:50px;
background:#38bdf8;
color:#000;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button.calc-btn:hover{
transform:translateY(-3px);
box-shadow:0 8px 25px rgba(56,189,248,0.5);
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(8px);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal.active{
display:flex;
}

.modal-content{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:30px;
max-width:500px;
width:90%;
text-align:center;
}

.modal-content h2{
color:#38bdf8;
margin-bottom:15px;
}

.modal-actions{
margin-top:20px;
display:flex;
gap:10px;
justify-content:center;
}

.modal-btn{
padding:10px 20px;
border-radius:50px;
font-weight:600;
cursor:pointer;
}

.close-btn{
background:#4b5563;
color:white;
}

.copy-btn{
background:#38bdf8;
color:#000;
}

.whatsapp-btn{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#25D366;
color:white;
font-size:28px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
text-decoration:none;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
z-index:1000;
}

.whatsapp-btn:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<header class="header">
<div class="logo">
<img src="images/logo.png" class="logo-img">
<h1>Atelier Électronique Médenine</h1>
</div>

<nav class="nav">
<a href="index.html">Home</a>
<a href="index.html#services">Services</a>
<a href="radio-codes.html">Code Radio</a>
<a href="contact.html">Contact</a>
<button class="login-btn">Login</button>
</nav>
</header>

<section class="radio-container">

<h2>Déverrouillage Code Radio</h2>

<div class="radio-form">

<div class="field-wrapper">
<span>🚗</span>
<input type="text" id="car-brand" placeholder="Marque voiture (Renault)">
</div>

<div class="field-wrapper">
<span>🔢</span>
<input type="text" id="precode" placeholder="Précode radio (ex: A123)" maxlength="4">
</div>

<button class="calc-btn" onclick="generateCode()">Calculer le Code</button>

</div>
</section>

<div class="modal" id="result-modal">

<div class="modal-content">

<h2>Votre Code Radio</h2>

<p>Marque: <strong id="modal-brand">—</strong></p>
<p>Précode: <strong id="modal-precode">—</strong></p>
<p>Code: <strong id="modal-code">🔒 Paiement requis</strong></p>

<div id="pay-section">

<p>Paiement requis : <strong>10 DT</strong></p>

<button class="modal-btn copy-btn" onclick="openForm()">Payer 10DT</button>

</div>

<div class="modal-actions">
<button class="modal-btn close-btn" onclick="closeModal()">Fermer</button>
</div>

</div>
</div>

<!-- CLIENT FORM -->

<div class="modal" id="client-form">

<div class="modal-content">

<h2>Demande Code Radio</h2>

<input type="text" id="client-name" placeholder="Nom complet">

<input type="text" id="client-phone" placeholder="Numéro téléphone">

<div class="modal-actions">

<button class="modal-btn copy-btn" onclick="sendWhatsApp()">Envoyer</button>

<button class="modal-btn close-btn" onclick="closeForm()">Fermer</button>

</div>

</div>

</div>

<a href="https://wa.me/21698192103" class="whatsapp-btn" target="_blank">💬</a>

<footer>
<p>© 2026 Atelier Électronique Médenine</p>
</footer>

<script>

let savedCode=""

function generateCode(){

const brand=document.getElementById('car-brand').value.trim()
const precode=document.getElementById('precode').value.trim().toUpperCase()

if(!brand.toLowerCase().includes('renault')){
alert("Algorithme optimisé pour Renault seulement.")
return
}

if(!precode || precode.length!==4 || !/^[A-Z]\d{3}$/.test(precode)){
alert("Précode invalide ! Exemple: A123.")
return
}

let x=precode.charCodeAt(1)+precode.charCodeAt(0)*10-698
let y=precode.charCodeAt(3)+precode.charCodeAt(2)*10+x-528
let z=(y*7)%100
if(z<0) z+=100

let codeNum=Math.floor(z/10)+(z%10)*10+((259%Math.abs(x))%100)*100

savedCode=codeNum.toString().padStart(4,'0')

document.getElementById('modal-brand').textContent=brand
document.getElementById('modal-precode').textContent=precode

document.getElementById('result-modal').classList.add('active')

}

function openForm(){
document.getElementById("client-form").classList.add("active")
}

function closeForm(){
document.getElementById("client-form").classList.remove("active")
}

function closeModal(){
document.getElementById("result-modal").classList.remove("active")
}

function sendWhatsApp(){

let name=document.getElementById("client-name").value
let phone=document.getElementById("client-phone").value
let brand=document.getElementById("car-brand").value
let precode=document.getElementById("precode").value
let code=savedCode

if(name=="" || phone==""){
alert("Remplir toutes les informations")
return
}

let message=`Demande Code Radio

Nom: ${name}
Téléphone: ${phone}
Voiture: ${brand}
Précode: ${precode}
Code: ${code}

Prix: 10DT`

let url=`https://wa.me/21698192103?text=${encodeURIComponent(message)}`

window.open(url,"_blank")

}
</script>

</body>
</html>
