<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Code | Electronique Medenine</title>
<link rel="icon" href="images/favicon.png">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

/* Header */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 8%;
  background:#020617;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-img{
  width:40px;
}

.nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
}

.login-btn{
  background:#38bdf8;
  border:none;
  padding:8px 18px;
  border-radius:20px;
  cursor:pointer;
}

/* Page */
.radio-container{
  max-width:1200px;
  margin:auto;
  padding:80px 8%;
  position:relative;
  z-index:1;
}

/* Background Animation */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: linear-gradient(45deg, #0f172a, #1e293b, #0f172a);
  background-size:400% 400%;
  animation: gradientAnim 15s ease infinite;
  z-index:-1;
}

@keyframes gradientAnim{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Title */
.radio-title{
  text-align:center;
  margin-bottom:50px;
}

.radio-title h2{
  font-size:40px;
}

.radio-title p{
  color:#94a3b8;
}

/* Brand Grid */
.brand-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:20px;
  margin-top:40px;
}

.brand-card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  position:relative;
}

.brand-card img{
  width:40px;
  margin-bottom:10px;
}

.brand-card:hover{
  background:#1e293b;
  transform:translateY(-6px);
  box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.brand-card h3{
  margin:0;
  font-size:18px;
  color:#38bdf8;
}

/* Form */
.radio-form{
  margin-top:60px;
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:15px;
}

.radio-form input{
  width:100%;
  padding:12px;
  margin-top:10px;
  margin-bottom:15px;
  border:none;
  border-radius:8px;
}

.radio-form button{
  background:#38bdf8;
  border:none;
  padding:12px 25px;
  border-radius:25px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.radio-form button:hover{
  background:#0ea5e9;
}

/* Modal */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.modal-content{
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  max-width:500px;
  text-align:center;
}

.modal-content h2{
  margin-bottom:15px;
  color:#38bdf8;
}

.modal-content button{
  margin-top:15px;
}
</style>
</head>

<body>

<header class="header">
<div class="logo">
<img src="images/logo.png" class="logo-img">
<h2>Electronique Medenine</h2>
</div>

<nav class="nav">
<a href="index.html">Home</a>
<a href="index.html#services">Services</a>
<a href="contact.html">Contact</a>
<button class="login-btn">Login</button>
</nav>
</header>

<section class="radio-container">

<div class="radio-title">
<h2>Car Radio Code Unlock</h2>
<p>Choisissez la marque de votre voiture</p>
</div>

<div class="brand-grid">
  <!-- Example card with icon -->
  <div class="brand-card" data-brand="Renault"><img src="images/renault.png"><h3>Renault</h3></div>
  <div class="brand-card" data-brand="Ford"><img src="images/ford.png"><h3>Ford</h3></div>
  <div class="brand-card" data-brand="Volkswagen"><img src="images/vw.png"><h3>Volkswagen</h3></div>
  <div class="brand-card" data-brand="Audi"><img src="images/audi.png"><h3>Audi</h3></div>
  <div class="brand-card" data-brand="BMW"><img src="images/bmw.png"><h3>BMW</h3></div>
</div>

<div class="radio-form">
<h3>Demander votre code radio</h3>
<input type="text" id="car-brand" placeholder="Marque de voiture">
<input type="text" placeholder="Numéro de série de la radio" id="serial-number">
<input type="email" placeholder="Votre email">
<button onclick="generateCode()">Envoyer</button>
</div>

</section>

<!-- Modal -->
<div class="modal" id="brand-modal">
  <div class="modal-content">
    <h2 id="modal-brand">Brand</h2>
    <p>Numéro de série: <span id="modal-serial"></span></p>
    <p>Code radio (demo): <span id="modal-code"></span></p>
    <button onclick="closeModal()">Fermer</button>
  </div>
</div>

<footer>
© 2026 Atelier Electronique Medenine
</footer>

<script>
// Brand click -> fill input + open modal demo
const brandCards = document.querySelectorAll('.brand-card');
const brandInput = document.getElementById('car-brand');

const modal = document.getElementById('brand-modal');
const modalBrand = document.getElementById('modal-brand');
const modalSerial = document.getElementById('modal-serial');
const modalCode = document.getElementById('modal-code');

brandCards.forEach(card=>{
  card.addEventListener('click',()=>{
    const brand = card.dataset.brand;
    brandInput.value = brand;
    brandInput.focus();
  });
});

// Generate code demo
function generateCode(){
  const brand = brandInput.value;
  const serial = document.getElementById('serial-number').value;
  
  if(!brand || !serial){
    alert("Veuillez remplir la marque et le numéro de série !");
    return;
  }

  const code = serial.split('').reduce((a,b)=> a+b.charCodeAt(0),0)%10000;

  // Fill modal
  modalBrand.textContent = brand;
  modalSerial.textContent = serial;
  modalCode.textContent = code;

  modal.classList.add('active');
}

// Close modal
function closeModal(){
  modal.classList.remove('active');
}
</script>

</body>
</html>
