<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio Code | Atelier Électronique Médenine</title>

<link rel="icon" href="images/favicon.png">

<style>

/* ===== BASE ===== */

body{
background:#0f172a;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
padding:0;
}


/* ===== HEADER ===== */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo-img{
width:60px;
height:60px;
border-radius:50%;
border:3px solid #38bdf8;
padding:5px;
background:rgba(255,255,255,0.05);
box-shadow:0 4px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

.logo-img:hover{
transform:scale(1.1);
}

.logo h1{
font-size:24px;
font-weight:700;
}

.nav{
display:flex;
gap:25px;
align-items:center;
}

.nav a{
text-decoration:none;
color:white;
transition:0.3s;
}

.nav a:hover{
color:#38bdf8;
}

.login-btn{
padding:8px 18px;
border:none;
border-radius:30px;
background:#38bdf8;
color:black;
font-weight:600;
cursor:pointer;
}


/* ===== RADIO FORM ===== */

.radio-container{
padding:120px 8%;
max-width:700px;
margin:auto;
}

.radio-container h2{
text-align:center;
font-size:36px;
margin-bottom:25px;
}

.radio-form{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.1);
display:flex;
flex-direction:column;
gap:18px;
}

.field-wrapper{
position:relative;
}

.field-wrapper span{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
font-size:18px;
}

.radio-form input{
width:100%;
padding:12px 12px 12px 40px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.05);
color:white;
font-size:16px;
}

.radio-form input:focus{
outline:none;
box-shadow:0 0 10px #38bdf8;
}

.radio-form button{
padding:12px;
border:none;
border-radius:30px;
background:#38bdf8;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.radio-form button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px #38bdf8;
}


/* ===== MODAL ===== */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal.active{
display:flex;
}

.modal-content{
background:#111827;
padding:30px;
border-radius:18px;
text-align:center;
}

.modal-content h2{
color:#38bdf8;
}

.modal-content strong{
font-size:28px;
letter-spacing:3px;
}

.modal-content button{
margin-top:15px;
padding:10px 25px;
border:none;
border-radius:25px;
background:#38bdf8;
cursor:pointer;
}


/* ===== FOOTER ===== */

footer{
text-align:center;
padding:25px;
color:#94a3b8;
margin-top:40px;
}

</style>

</head>

<body>


<header class="header">

<div class="logo">

<img src="images/logo.png" class="logo-img">

<h1>Atelier Électronique Médenine</h1>

</div>

<nav class="nav">

<a href="index.html">Home</a>

<a href="index.html#services">Services</a>

<a href="contact.html">Contact</a>

<button class="login-btn">Login</button>

</nav>

</header>


<section class="radio-container">

<h2>Déverrouillage Code Radio</h2>

<div class="radio-form">

<div class="field-wrapper">
<span>🚗</span>
<input type="text" id="car-brand" placeholder="Marque voiture (Renault / Dacia)">
</div>

<div class="field-wrapper">
<span>🔢</span>
<input type="text" id="serial-number" placeholder="Précode radio (ex: A123)">
</div>

<button onclick="generateCode()">Calculer le Code</button>

</div>

</section>


<!-- ===== MODAL ===== -->

<div class="modal" id="result-modal">

<div class="modal-content">

<h2>Votre Code Radio</h2>

<p>Marque: <strong id="modal-brand"></strong></p>

<p>Précode: <strong id="modal-serial"></strong></p>

<p>Code: <strong id="modal-code"></strong></p>

<button onclick="closeModal()">Fermer</button>

</div>

</div>


<footer>

© 2026 Atelier Électronique Médenine

</footer>


<script>

/* ===== GENERATE CODE ===== */

function generateCode(){

const brandInput=document.getElementById('car-brand');
const brand=brandInput.value.trim();

const precodeInput=document.getElementById('serial-number');
const precode=precodeInput.value.trim().toUpperCase();


if(!brand.toLowerCase().includes('renault') && !brand.toLowerCase().includes('dacia')){

alert("Cet algo est pour Renault / Dacia seulement");

return;

}


if(!precode || !/^[A-Y]\d{3}$/.test(precode)){

alert("Entrez un précode valide (ex: A123)");

return;

}


/* ===== CALCUL RENAULT ===== */

const letter=precode.charAt(0);
const n1=parseInt(precode.charAt(1));
const n2=parseInt(precode.charAt(2));
const n3=parseInt(precode.charAt(3));

let x=(letter.charCodeAt(0)*10)+n1-698;
let y=(n3+(n2*10))+x-528;
let code=(y*9)%10000;

const codeStr=code.toString().padStart(4,'0');


/* ===== MODAL ===== */

document.getElementById("modal-brand").textContent=brand;
document.getElementById("modal-serial").textContent=precode;
document.getElementById("modal-code").textContent=codeStr;

document.getElementById("result-modal").classList.add("active");

}


/* ===== CLOSE MODAL ===== */

function closeModal(){

document.getElementById("result-modal").classList.remove("active");

}

</script>

</body>
</html>
