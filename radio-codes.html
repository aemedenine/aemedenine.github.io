  <style>
    /* ================= PAGE CODE RADIO ================= */
    .radio-container {
      padding: 120px 6% 100px;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }
    .radio-container h2 {
      font-size: 38px;
      color: #38bdf8;
      margin-bottom: 50px;
    }
    .radio-form {
      background: rgba(30,41,59,0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 16px;
      padding: 40px 35px;
      display: flex;
      flex-direction: column;
      gap: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transition: all 0.4s;
    }
    .radio-form:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 40px rgba(56,189,248,0.35);
    }
    .field-wrapper {
      position: relative;
    }
    .field-wrapper span {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
      color: #94a3b8;
    }
    .radio-form input {
      width: 100%;
      padding: 14px 14px 14px 50px;
      font-size: 17px;
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: white;
      transition: border-color 0.3s;
    }
    .radio-form input:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }
    .calc-btn {
      padding: 14px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(90deg, #0ea5e9, #38bdf8);
      background-size: 200% 100%;
      color: #000;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.35s;
      animation: gradientFlow 5s linear infinite;
    }
    .calc-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(56,189,248,0.5);
    }

    /* Modal (inchangé) */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 2000; }
    .modal.active { display: flex; }
    .modal-content { background: rgba(30,41,59,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(56,189,248,0.3); border-radius: 16px; padding: 35px; max-width: 520px; width: 92%; text-align: center; }
    .modal-content h2 { color: #38bdf8; margin-bottom: 20px; font-size: 26px; }
    .modal-content p { font-size: 17px; color: #cbd5f5; margin: 12px 0; }
    .modal-content strong { color: white; font-size: 20px; }
    .modal-actions { margin-top: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    .modal-btn { padding: 12px 28px; border-radius: 50px; font-weight: 700; cursor: pointer; border: none; transition: all 0.3s; }
    .close-btn { background: #4b5563; color: white; }
    .copy-btn { background: #38bdf8; color: #000; }

    @media (max-width: 768px) {
      .radio-container { padding: 100px 5% 80px; }
      .radio-container h2 { font-size: 32px; }
      .radio-form { padding: 30px 25px; }
      .modal-content { padding: 25px; }
    }
  </style>

<!-- ================= SCRIPT CODE RADIO ================= -->
<script>
// Hamburger toggle (mobile only)
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');
hamburger?.addEventListener('click', () => {
  hamburger.classList.toggle('active');
  mobileMenu.style.display = mobileMenu.style.display === 'flex' ? 'none' : 'flex';
});

// Close mobile menu on link click
document.querySelectorAll('.mobile-menu a, .mobile-menu .login-btn')?.forEach(el => {
  el.addEventListener('click', () => {
    hamburger.classList.remove('active');
    mobileMenu.style.display = 'none';
  });
});

// Code logic (inchangé)
let savedBrand = "", savedPrecode = "";
function generateCode() {
  let brand = document.getElementById("car-brand").value.trim();
  let precode = document.getElementById("precode").value.trim().toUpperCase();
  
  if (!brand || !precode) return alert("Remplissez tous les champs");
  if (!brand.toLowerCase().includes("renault")) return alert("Outil optimisé pour Renault seulement");
  if (!/^[A-Z]\d{3}$/.test(precode)) return alert("Précode invalide (ex: A123)");

  savedBrand = brand;
  savedPrecode = precode;

  document.getElementById("modal-brand").textContent = brand;
  document.getElementById("modal-precode").textContent = precode;
  document.getElementById("result-modal").classList.add("active");
}

function closeModal() { document.getElementById("result-modal").classList.remove("active"); }
function openClientForm() { document.getElementById("client-form").classList.add("active"); }
function closeForm() { document.getElementById("client-form").classList.remove("active"); }

function sendWhatsApp() {
  let name = document.getElementById("client-name").value.trim();
  let phone = document.getElementById("client-phone").value.trim();
  
  if (!name || !phone) return alert("Remplissez nom et téléphone");

  let p = savedPrecode;
  let x = p.charCodeAt(1) + p.charCodeAt(0)*10 - 698;
  let y = p.charCodeAt(3) + p.charCodeAt(2)*10 + x - 528;
  let z = (y*7) % 100;
  if (z < 0) z += 100;
  let codeNum = Math.floor(z/10) + (z%10)*10 + ((259 % Math.abs(x)) % 100)*100;
  let code = codeNum.toString().padStart(4,'0');

  let message = `Demande Code Radio\nNom: ${name}\nTéléphone: ${phone}\nVoiture: ${savedBrand}\nPrécode: ${savedPrecode}\nPrix: 10 DT\n#REF-${code}`;
  window.open(`https://wa.me/21698192103?text=${encodeURIComponent(message)}`, "_blank");

  closeForm();
  closeModal();
}
</script>
