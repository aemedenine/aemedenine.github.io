<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Déverrouillage Code Radio | Atelier Électronique Médenine</title>

<link rel="icon" href="images/favicon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0f172a;
--card:rgba(30,41,59,0.65);
--glass:rgba(255,255,255,0.08);
--border:rgba(255,255,255,0.12);
--accent:#38bdf8;
--glow:rgba(56,189,248,0.4);
--text:#e2e8f0;
--muted:#94a3b8;
--radius:20px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Inter',sans-serif;
min-height:100vh;
}


/* HEADER */

.header{
position:sticky;
top:0;
backdrop-filter:blur(16px);
background:rgba(15,23,42,0.85);
border-bottom:1px solid var(--border);
padding:1rem 8%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
transition:0.3s;
}

.header.scrolled{
background:rgba(15,23,42,0.95);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.logo{
display:flex;
align-items:center;
gap:1rem;
}

.logo-img{
width:55px;
height:55px;
border-radius:50%;
border:2px solid var(--accent);
padding:4px;
background:rgba(255,255,255,0.05);
transition:0.3s;
}

.logo-img:hover{
transform:scale(1.08);
}

.logo h1{
font-family:'Orbitron',monospace;
font-size:1.5rem;
background:linear-gradient(90deg,var(--accent),#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav{
display:flex;
gap:2rem;
align-items:center;
}

.nav a{
color:var(--muted);
text-decoration:none;
font-weight:500;
transition:0.3s;
}

.nav a:hover{
color:white;
}

.login-btn{
padding:0.6rem 1.5rem;
background:var(--accent);
border:none;
border-radius:50px;
color:#000;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px var(--glow);
}


/* PAGE */

.radio-container{
padding:140px 8% 100px;
max-width:800px;
margin:auto;
}

h2{
text-align:center;
font-family:'Orbitron',monospace;
font-size:3rem;
margin-bottom:3rem;
background:linear-gradient(90deg,var(--accent),#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.radio-form{
background:var(--card);
backdrop-filter:blur(20px);
border:1px solid var(--border);
border-radius:var(--radius);
padding:2.5rem;
display:flex;
flex-direction:column;
gap:1.5rem;
}

.field-wrapper{
position:relative;
}

.field-wrapper span{
position:absolute;
left:1rem;
top:50%;
transform:translateY(-50%);
font-size:1.4rem;
color:var(--muted);
}

input{
width:100%;
padding:1rem 1rem 1rem 3rem;
background:rgba(255,255,255,0.05);
border:1px solid var(--border);
border-radius:12px;
color:white;
font-size:1.1rem;
transition:0.3s;
}

input:focus{
outline:none;
border-color:var(--accent);
box-shadow:0 0 15px rgba(56,189,248,0.3);
}

button{
padding:1rem;
background:linear-gradient(135deg,var(--accent),#60a5fa);
border:none;
border-radius:50px;
color:#000;
font-size:1.2rem;
font-weight:600;
cursor:pointer;
transition:0.4s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 30px rgba(56,189,248,0.5);
}


/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(8px);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal.active{
display:flex;
}

.modal-content{
background:var(--card);
backdrop-filter:blur(20px);
border:1px solid var(--border);
border-radius:var(--radius);
padding:2.5rem;
max-width:500px;
width:90%;
text-align:center;
}

.modal-content h2{
color:var(--accent);
margin-bottom:1.5rem;
}

.modal-content p{
margin:1rem 0;
font-size:1.2rem;
}

.modal-content strong{
font-size:2.2rem;
letter-spacing:5px;
}

.modal-actions{
margin-top:2rem;
display:flex;
gap:1rem;
justify-content:center;
}

.modal-btn{
padding:0.8rem 2rem;
border-radius:50px;
font-weight:600;
cursor:pointer;
}

.close-btn{
background:#4b5563;
color:white;
}

.copy-btn{
background:var(--accent);
color:#000;
}

footer{
text-align:center;
padding:3rem 0;
color:var(--muted);
border-top:1px solid var(--border);
}

</style>
</head>


<body>


<header class="header" id="header">

<div class="logo">
<img src="images/logo.png" alt="Logo" class="logo-img">
<h1>Atelier Électronique Médenine</h1>
</div>

<nav class="nav">

<a href="index.html">Home</a>

<a href="index.html#services">Services</a>

<a href="radio-code.html">Code Radio</a>

<a href="contact.html">Contact</a>

<button class="login-btn">Login</button>

</nav>

</header>



<section class="radio-container">

<h2>Déverrouillage Code Radio</h2>

<div class="radio-form">

<input type="text" id="car-brand" placeholder="Marque voiture (Renault / Dacia)" />
</div>

<input type="text" id="precode" placeholder="Précode radio (ex: A123)" maxlength="4"/>
</div>

<button onclick="generateCode()">Calculer le Code</button>

</div>

</section>



<div class="modal" id="result-modal">

<div class="modal-content">

<h2>Votre Code Radio</h2>

<p>Marque: <strong id="modal-brand">—</strong></p>

<p>Précode: <strong id="modal-precode">—</strong></p>

<p>Code: <strong id="modal-code">—</strong></p>

<div class="modal-actions">

<button class="modal-btn copy-btn" id="copy-btn">Copier Code</button>

<button class="modal-btn close-btn" onclick="closeModal()">Fermer</button>

</div>

</div>

</div>



<footer>

© 2026 Atelier Électronique Médenine — Service Professionnel Code Radio

</footer>



<script>

window.addEventListener('scroll', () => {
document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
});


function generateCode(){

const brand=document.getElementById('car-brand').value.trim();

const precodeInput=document.getElementById('precode');

const precode=precodeInput.value.trim().toUpperCase();


if(!brand.toLowerCase().includes('renault') && !brand.toLowerCase().includes('dacia')){

alert("Algo pour Renault / Dacia seulement.");

return;

}


if(!precode || precode.length!==4 || !/^[A-Z]\d{3}$/.test(precode) || precode.startsWith('A0')){

alert("Précode invalide ! Exemple A123.");

return;

}


/* ALGORITHM */

let x = precode.charCodeAt(1) + precode.charCodeAt(0) * 10 - 698;

let y = precode.charCodeAt(3) + precode.charCodeAt(2) * 10 + x - 528;

let z = (y * 7) % 100;

let codeNum = Math.floor(z / 10) + (z % 10) * 10 + ((259 % x) % 100) * 100;

const codeStr = codeNum.toString().padStart(4,'0');


document.getElementById('modal-brand').textContent = brand || 'Renault/Dacia';

document.getElementById('modal-precode').textContent = precode;

document.getElementById('modal-code').textContent = codeStr;


const copyBtn=document.getElementById('copy-btn');

copyBtn.onclick=()=>{

navigator.clipboard.writeText(codeStr).then(()=>{

copyBtn.textContent='Copié !';

setTimeout(()=>copyBtn.textContent='Copier Code',2000);

});

};


document.getElementById('result-modal').classList.add('active');

}


function closeModal(){

document.getElementById('result-modal').classList.remove('active');

}

</script>


</body>
</html>
