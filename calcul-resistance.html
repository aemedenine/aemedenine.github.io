<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcul Résistance | Atelier Électronique Médenine</title>
<link rel="icon" href="images/favicon.png">
<style>
/* =============================== RESET =============================== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0f172a;color:white;line-height:1.6;}

/* ================= HEADER ================= */
.header{display:flex;justify-content:space-between;align-items:center;padding:15px 8%;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);position:sticky;top:0;z-index:1000;}
.logo{display:flex;align-items:center;gap:15px;}
.logo-img{width:60px;height:60px;border-radius:50%;border:3px solid #38bdf8;padding:5px;background:rgba(255,255,255,0.05);box-shadow:0 4px 15px rgba(0,0,0,0.3);transition:0.3s;}
.logo-img:hover{transform:scale(1.1);box-shadow:0 8px 25px rgba(0,0,0,0.5);}
.logo h1{font-size:24px;font-weight:700;color:#fff;letter-spacing:1px;}
.nav{display:flex;align-items:center;gap:25px;}
.nav a{color:white;text-decoration:none;font-weight:500;transition:0.3s;}
.nav a:hover{color:#38bdf8;}

/* ================= CALCUL RESISTANCE ================= */
.calc-resistance{padding:80px 8%;text-align:center;}
.calc-resistance h2{font-size:36px;color:#38bdf8;margin-bottom:40px;}
.res-box{background:rgba(255,255,255,0.05);backdrop-filter:blur(8px);border-radius:20px;padding:30px;max-width:500px;margin:auto;position:relative;overflow:hidden;transition: transform 0.4s, box-shadow 0.4s;}
.res-box::before{content:'';position:absolute;top:0;left:-75%;width:50%;height:100%;background:linear-gradient(120deg, rgba(255,255,255,0.15), rgba(255,255,255,0), rgba(255,255,255,0.15));transform:skewX(-20deg);transition:0.5s;}
.res-box:hover::before{left:125%;}
.res-box:hover{transform:translateY(-5px) scale(1.05);box-shadow:0 15px 35px rgba(56,189,248,0.7),0 0 20px rgba(56,189,248,0.5) inset,0 0 25px rgba(56,189,248,0.3);}
.res-box label{display:block;text-align:left;margin:15px 0 5px;font-weight:500;color:#cbd5f5;}
.res-box select, .res-box input{width:100%;padding:10px;border-radius:10px;border:none;background:rgba(255,255,255,0.05);color:white;font-size:16px;margin-bottom:10px;}
.res-box button{padding:12px;border:none;border-radius:50px;background:#38bdf8;color:#000;font-weight:600;cursor:pointer;transition:0.3s;position:relative;z-index:1;}
.res-box button::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(45deg, #38bdf8, #0ea5e9, #06b6d4, #38bdf8);filter:blur(10px);opacity:0;transition:0.3s;border-radius:50px;z-index:-1;}
.res-box button:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(56,189,248,0.5);}
.res-box button:hover::after{opacity:0.7;}
.result{margin-top:20px;font-size:20px;color:#38bdf8;font-weight:600;}
.smd-expl{margin-top:15px;font-size:14px;color:#cbd5f5;}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="images/logo.png" alt="Logo" class="logo-img">
    <h1>Atelier Électronique Médenine</h1>
  </div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="calc-resistance">
  <h2>Calcul Résistance 4-bandes & SMD</h2>

  <!-- 4 BAND RESISTANCE -->
  <div class="res-box">
    <h3>4-Band Resistor</h3>
    <label>Couleur 1 (x1):</label>
    <select id="band1">
      <option value="0">Noir 0</option>
      <option value="1">Marron 1</option>
      <option value="2">Rouge 2</option>
      <option value="3">Orange 3</option>
      <option value="4">Jaune 4</option>
      <option value="5">Vert 5</option>
      <option value="6">Bleu 6</option>
      <option value="7">Violet 7</option>
      <option value="8">Gris 8</option>
      <option value="9">Blanc 9</option>
    </select>

    <label>Couleur 2 (x2):</label>
    <select id="band2">
      <option value="0">Noir 0</option>
      <option value="1">Marron 1</option>
      <option value="2">Rouge 2</option>
      <option value="3">Orange 3</option>
      <option value="4">Jaune 4</option>
      <option value="5">Vert 5</option>
      <option value="6">Bleu 6</option>
      <option value="7">Violet 7</option>
      <option value="8">Gris 8</option>
      <option value="9">Blanc 9</option>
    </select>

    <label>Multiplicateur (x10^n):</label>
    <select id="multiplier">
      <option value="1">Noir x1</option>
      <option value="10">Marron x10</option>
      <option value="100">Rouge x100</option>
      <option value="1000">Orange x1k</option>
      <option value="10000">Jaune x10k</option>
      <option value="100000">Vert x100k</option>
      <option value="1000000">Bleu x1M</option>
    </select>

    <label>Tolérance:</label>
    <select id="tolerance">
      <option value="1%">±1%</option>
      <option value="2%">±2%</option>
      <option value="5%">±5%</option>
      <option value="10%">±10%</option>
    </select>

    <button onclick="calculate4Band()">Calculer Résistance</button>
    <div class="result" id="result4band">Résistance: —</div>
  </div>

  <!-- SMD RESISTANCE -->
  <div class="res-box" style="margin-top:40px;">
    <h3>SMD Resistor Code</h3>
    <label>Code SMD:</label>
    <input type="text" id="smdCode" placeholder="Ex: 2R3, 5k2, 5M2">
    <button onclick="calculateSMD()">Calculer Résistance</button>
    <div class="result" id="resultSMD">Résistance: —</div>
    <div class="smd-expl">
      Exemples: 2R3 = 2.3 kΩ, R23 = 0.23 kΩ, 23R = 23 kΩ, 5k2 = 5.2 kΩ, 5M2 = 5200 kΩ
    </div>
  </div>
</section>

<script>
/* ======================= 4 BAND ======================= */
function calculate4Band(){
  let b1 = document.getElementById('band1').value;
  let b2 = document.getElementById('band2').value;
  let mult = document.getElementById('multiplier').value;
  let tol = document.getElementById('tolerance').value;

  let resistance = ((+b1*10)+(+b2))*(+mult);
  let display = (resistance/1000).toFixed(2) + ' kΩ'; // force kΩ
  document.getElementById('result4band').textContent = `Résistance: ${display} ${tol}`;
}

/* ======================= SMD ======================= */
function calculateSMD(){
  let code = document.getElementById('smdCode').value.toUpperCase().trim();
  if(!code){document.getElementById('resultSMD').textContent='Résistance: —'; return;}

  let val;
  // 2R3 => 2.3, R23=>0.23, 23R=>23
  if(code.includes('R')){
    let parts = code.split('R');
    if(parts[0]==='') val = parseFloat('0.' + parts[1]);
    else if(parts[1]==='') val = parseFloat(parts[0]);
    else val = parseFloat(parts[0]+'.'+parts[1]);
  } else if(code.includes('K')){
    let parts = code.split('K');
    if(parts[1]==='') val = parseFloat(parts[0]);
    else val = parseFloat(parts[0]+'.'+parts[1]);
    val = val; // already kΩ
  } else if(code.includes('M')){
    let parts = code.split('M');
    if(parts[1]==='') val = parseFloat(parts[0])*1000; // MΩ -> kΩ
    else val = parseFloat(parts[0]+'.'+parts[1])*1000; // MΩ -> kΩ
  } else {
    val = parseFloat(code)/1000; // force kΩ
  }

  let display = val.toFixed(2) + ' kΩ'; // always kΩ
  document.getElementById('resultSMD').textContent='Résistance: '+display;
}
</script>

</body>
</html>
