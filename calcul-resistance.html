<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcul Résistance | Atelier Électronique Médenine</title>
<link rel="icon" href="images/favicon.png">
<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  color:white;
  margin:0; padding:0;
}
.container{
  max-width:900px;
  margin:50px auto;
  padding:20px;
}
h1,h2{color:#38bdf8;text-align:center;margin-bottom:30px;}
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(8px);
  border-radius:15px;
  padding:25px;
  margin-bottom:30px;
  text-align:center;
  box-shadow:0 0 15px rgba(56,189,248,0.2);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 0 25px rgba(56,189,248,0.4);
}
input, select{
  padding:10px;
  margin:10px 5px;
  border-radius:10px;
  border:none;
  width:80px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  color:white;
}
.result{
  margin-top:20px;
  font-size:20px;
  color:#38bdf8;
  font-weight:600;
}
</style>
</head>
<body>
<div class="container">
<h1>Calcul Résistance</h1>

<!-- 4 couleurs -->
<div class="card">
<h2>Résistance 4 Couleurs</h2>
<div>
  <select id="x1">
    <option value="0">0</option><option value="1">1</option><option value="2">2</option>
    <option value="3">3</option><option value="4">4</option><option value="5">5</option>
    <option value="6">6</option><option value="7">7</option><option value="8">8</option>
    <option value="9">9</option>
  </select>
  <select id="x2">
    <option value="0">0</option><option value="1">1</option><option value="2">2</option>
    <option value="3">3</option><option value="4">4</option><option value="5">5</option>
    <option value="6">6</option><option value="7">7</option><option value="8">8</option>
    <option value="9">9</option>
  </select>
  <select id="x3">
    <option value="1">×1</option>
    <option value="10">×10</option>
    <option value="100">×100</option>
    <option value="1000">×1k</option>
    <option value="10000">×10k</option>
    <option value="100000">×100k</option>
    <option value="1000000">×1M</option>
  </select>
</div>
<button onclick="calcColors()">Calculer</button>
<div class="result" id="resColor">—</div>
</div>

<!-- SMD -->
<div class="card">
<h2>Résistance SMD</h2>
<input type="text" id="smdInput" placeholder="Ex: 103, 5M2, 2R3">
<button onclick="calcSMD()">Calculer</button>
<div class="result" id="resSMD">—</div>
</div>
</div>

<script>
// ================= 4 couleurs =================
function calcColors(){
  let x1 = document.getElementById("x1").value;
  let x2 = document.getElementById("x2").value;
  let x3 = parseInt(document.getElementById("x3").value);
  let value = ((x1+x2)*1)*x3; // combine digits puis multiplier
  // convertir en kΩ si >=1000
  let display = value>=1000 ? (value/1000)+' kΩ' : value+' Ω';
  document.getElementById("resColor").textContent = display;
}

// ================= SMD =================
function calcSMD(){
  let val = document.getElementById("smdInput").value.toUpperCase().trim();
  let result = "";
  
  if(/^\d{3,}$/.test(val)){ // 3 chiffres type 103
    let x1 = parseInt(val[0]);
    let x2 = parseInt(val[1]);
    let mult = parseInt(val.slice(2));
    let ohm = (x1*10 + x2)*Math.pow(10,mult);
    result = formatUnit(ohm);
  }
  else if(val.includes('R')){ // 2R3 => 2.3Ω
    result = formatUnit(parseFloat(val.replace('R','.')));
  }
  else if(val.includes('M')){ // 5M2 => 5.2 MΩ
    result = formatUnit(parseFloat(val.replace('M','.'))*1000000);
  }
  else if(val.includes('K')){ // 5K2 => 5.2 kΩ
    result = formatUnit(parseFloat(val.replace('K','.'))*1000);
  }
  else result = "Code invalide";
  
  document.getElementById("resSMD").textContent = result;
}

// ================= format unités =================
function formatUnit(ohm){
  if(ohm>=1000000) return (ohm/1000000)+' MΩ';
  else if(ohm>=1000) return (ohm/1000)+' kΩ';
  else return ohm+' Ω';
}
</script>
</body>
</html>
