<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum Live 2026 | Atelier Électronique Médenine</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:#e2e8f0;
height:100vh;
display:flex;
overflow:hidden;
}

/* HEADER */

header{
padding:14px;
text-align:center;
font-size:20px;
font-weight:600;
background:rgba(2,6,23,0.9);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(56,189,248,0.25);
letter-spacing:1px;
}

/* SIDEBAR */

#sidebar{
width:210px;
background:rgba(15,23,42,0.55);
backdrop-filter:blur(10px);
padding:16px;
border-right:1px solid rgba(56,189,248,0.15);
}

#sidebar h3{
color:#38bdf8;
font-size:15px;
margin-bottom:10px;
}

.online-user{
display:flex;
align-items:center;
gap:8px;
padding:6px;
border-radius:8px;
font-size:13px;
transition:0.2s;
}

.online-user:hover{
background:rgba(56,189,248,0.1);
}

.status-dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
}

/* CHAT */

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

/* MESSAGE BUBBLE */

.message{
display:flex;
gap:10px;
max-width:65%;
padding:8px 12px;
background:rgba(30,41,59,0.65);
border-radius:14px;
border:1px solid rgba(56,189,248,0.15);
font-size:13px;
animation:fadeIn .25s ease;
position:relative;
}

.message.me{
margin-left:auto;
background:linear-gradient(135deg,#38bdf8,#0ea5e9);
color:#022c43;
border:none;
}

/* AVATAR */

.avatar{
width:30px;
height:30px;
border-radius:50%;
background:linear-gradient(45deg,#38bdf8,#0ea5e9);
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
font-weight:bold;
color:white;
}

/* TEXT */

.text b{
font-size:12px;
color:#38bdf8;
}

.text small{
font-size:10px;
color:#94a3b8;
}

/* IMAGE */

.message img{
max-width:180px;
border-radius:10px;
margin-top:6px;
}

/* ACTIONS */

.message-actions{
position:absolute;
top:-6px;
right:-6px;
display:flex;
gap:6px;
opacity:0;
transition:.2s;
}

.message:hover .message-actions{
opacity:1;
}

.edit-btn,
.delete-btn{
background:#020617;
padding:4px 6px;
border-radius:6px;
font-size:12px;
cursor:pointer;
}

.edit-btn{
color:#fbbf24;
}

.delete-btn{
color:#ef4444;
}

/* REACTIONS */

.reactions{
margin-top:4px;
display:flex;
gap:4px;
}

.reaction{
font-size:12px;
background:rgba(255,255,255,0.15);
padding:2px 6px;
border-radius:12px;
cursor:pointer;
}

/* INPUT AREA */

.chat-input{
display:flex;
align-items:center;
gap:8px;
padding:12px;
background:rgba(2,6,23,0.9);
border-top:1px solid rgba(56,189,248,0.15);
}

/* INPUT */

.chat-input input{
flex:1;
padding:10px 16px;
border-radius:20px;
border:none;
background:#0f172a;
color:white;
font-size:14px;
outline:none;
}

.chat-input input::placeholder{
color:#64748b;
}

/* BUTTONS */

#send-btn{
padding:9px 18px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#38bdf8,#0ea5e9);
color:white;
font-weight:600;
cursor:pointer;
transition:0.2s;
box-shadow:0 0 10px rgba(56,189,248,0.4);
}

#send-btn:hover{
transform:scale(1.05);
box-shadow:0 0 18px rgba(56,189,248,0.8);
}

/* EMOJI + PHOTO */

.emoji-btn,
.photo-btn{
font-size:20px;
cursor:pointer;
transition:0.2s;
}

.emoji-btn:hover,
.photo-btn:hover{
transform:scale(1.2);
}

/* SCROLLBAR */

#messages::-webkit-scrollbar{
width:6px;
}

#messages::-webkit-scrollbar-thumb{
background:#38bdf8;
border-radius:6px;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:768px){

#sidebar{
display:none;
}

.message{
max-width:85%;
}

header{
font-size:17px;
}

}

</style>
</head>
<body>
<div style="display:flex;height:100vh;">
  <div id="sidebar">
    <h3>Online (🟢)</h3>
    <div id="online-users"></div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;">
    <header>💬 Forum Live – AÉM <span id="notif-badge" class="notification-badge">0</span></header>
    <div id="chat">
      <div id="messages"></div>
      <div class="chat-input">
        <input id="msg" placeholder="Écris un message... 😏🔥" autocomplete="off">
        <span class="emoji-btn" onclick="toggleEmojiPicker()">😊</span>
        <span class="photo-btn" onclick="document.getElementById('photo-input').click()">📷</span>
        <input type="file" id="photo-input" accept="image/*" style="display:none;">
        <div id="preview-container"><img id="preview-img" src="" alt="Prévisualisation"></div>
        <button id="send-btn">Envoyer</button>
      </div>
    </div>
  </div>
</div>

<emoji-picker id="emoji-picker" skin-tone-emoji="👍"></emoji-picker>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script type="module">
  import 'https://cdn.jsdelivr.net/npm/emoji-picker-element@1.29.1/index.js';
</script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
  authDomain: "atelier-electronique-mednine.firebaseapp.com",
  projectId: "atelier-electronique-mednine",
  storageBucket: "atelier-electronique-mednine.firebasestorage.app",
  messagingSenderId: "547430908384",
  appId: "1:547430908384:web:4caa4cf3869491bd14eb85",
  databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

let currentUser = null;
let typingTimeout = null;
let selectedImage = null;
let isSending = false;
let replyToKey = null;
let notifCount = 0;

// Login
function login() {
  auth.signOut().then(() => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => console.error("Login error:", err));
  });
}

// Auth state
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.querySelector(".login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    listenMessages();
    listenOnlineUsers();
    listenTyping();
    setPresence(true);
  } else {
    currentUser = null;
    document.querySelector(".login").style.display = "block";
    document.getElementById("chat").style.display = "none";
    setPresence(false);
  }
});

// Presence
function setPresence(online) {
  if (!currentUser) return;
  db.ref(`presence/${currentUser.uid}`).set({online, name: currentUser.displayName || "Anonyme", lastSeen: Date.now()});
}

// Typing
const msgInput = document.getElementById("msg");
msgInput.addEventListener("input", () => {
  if (!currentUser) return;
  db.ref(`typing/${currentUser.uid}`).set(true);
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => db.ref(`typing/${currentUser.uid}`).remove(), 2500);
});

function listenTyping() {
  db.ref("typing").on("child_added", snap => {
    if (snap.key !== currentUser?.uid) showTyping(snap.key);
  });
  db.ref("typing").on("child_removed", snap => removeTyping(snap.key));
}

function showTyping(uid) {
  db.ref(`presence/${uid}`).once("value", snap => {
    const name = snap.val()?.name || "Quelqu'un";
    const div = document.createElement("div");
    div.className = "typing";
    div.textContent = `${name} est en train d'écrire... ✍️`;
    document.getElementById("messages").appendChild(div);
    scrollToBottom();
  });
}

function removeTyping(uid) {
  const el = document.getElementById(`typing-${uid}`);
  if (el) el.remove();
}

// Online users
function listenOnlineUsers() {
  db.ref("presence").orderByChild("online").equalTo(true).on("value", snap => {
    const list = document.getElementById("online-users");
    list.innerHTML = "";
    snap.forEach(child => {
      const data = child.val();
      if (data.online) {
        const div = document.createElement("div");
        div.className = "online-user";
        div.innerHTML = `<span class="status-dot"></span> ${data.name || "Anonyme"}`;
        list.appendChild(div);
      }
    });
  });
}

// Scroll
function scrollToBottom() {
  const messages = document.getElementById("messages");
  messages.scrollTop = messages.scrollHeight;
}

// Emoji
function toggleEmojiPicker() {
  const picker = document.getElementById("emoji-picker");
  picker.style.display = picker.style.display === "block" ? "none" : "block";
}

document.getElementById("emoji-picker").addEventListener("emoji-click", e => {
  const emoji = e.detail.unicode;
  const pos = msgInput.selectionStart;
  msgInput.value = msgInput.value.slice(0, pos) + emoji + msgInput.value.slice(pos);
  msgInput.focus();
  msgInput.selectionStart = msgInput.selectionEnd = pos + emoji.length;
  toggleEmojiPicker();
});

// Photo preview
document.getElementById("photo-input").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file || !file.type.startsWith("image/")) return alert("Image valide!");
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById("preview-img").src = ev.target.result;
    document.getElementById("preview-container").style.display = "block";
    selectedImage = file; // file object for upload
  };
  reader.readAsDataURL(file);
});

// Send
async function send() {
  if (!currentUser || isSending) return;
  isSending = true;
  const text = msgInput.value.trim();
  if (!text && !selectedImage) { isSending = false; return; }

  let imageUrl = null;
  if (selectedImage) {
    const ref = storage.ref(`messages/${Date.now()}_${selectedImage.name}`);
    try {
      await ref.put(selectedImage);
      imageUrl = await ref.getDownloadURL();
    } catch (err) {
      console.error("Upload error:", err);
      alert("Erreur upload");
      isSending = false;
      return;
    }
  }

  const msgData = {
    text: text || "",
    uid: currentUser.uid,
    name: currentUser.displayName || "Anonyme",
    photoURL: currentUser.photoURL || "",
    time: Date.now(),
    reactions: {},
    image: imageUrl,
    replyTo: replyToKey ? {key: replyToKey} : null
  };

  db.ref("messages").push(msgData).then(() => {
    msgInput.value = "";
    selectedImage = null;
    document.getElementById("preview-container").style.display = "none";
    replyToKey = null;
    msgInput.placeholder = "Écris un message... 😏🔥";
    db.ref(`typing/${currentUser.uid}`).remove();
  }).catch(err => alert("Erreur: " + err.message))
  .finally(() => isSending = false);
}

// Listen messages
function listenMessages() {
  db.ref("messages").orderByChild("time").on("child_added", snap => {
    const msg = snap.val();
    const key = snap.key;
    const div = document.createElement("div");
    div.className = `message ${msg.uid === currentUser?.uid ? "me" : ""}`;
    div.id = `msg-${key}`;

    let html = `
      <div class="avatar">${(msg.name || "?").charAt(0)}</div>
      <div class="text">
        <b>${msg.name || "Inconnu"} <span class="status-dot"></span></b>
        <small>${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</small><br>
    `;
    if (msg.replyTo) html += `<div class="reply-to">Réponse à un message</div>`;
    html += msg.text;
    if (msg.image) html += `<br><img src="${msg.image}" alt="Image">`;
    html += `
        <div class="reactions" id="reac-${key}"></div>
        <div class="message-actions">
          ${msg.uid === currentUser?.uid ? `<span class="edit-btn" onclick="editMessage('${key}', '${msg.text.replace(/'/g,"\\'")}')">✏️</span>` : ''}
          ${msg.uid === currentUser?.uid ? `<span class="delete-btn" onclick="deleteMessage('${key}')">🗑️</span>` : ''}
          <span onclick="setReply('${key}')">💬</span>
        </div>
      </div>
    `;
    div.innerHTML = html;
    document.getElementById("messages").appendChild(div);
    scrollToBottom();

    if (msg.uid !== currentUser?.uid) {
      notifCount++;
      document.getElementById("notif-badge").textContent = notifCount;
      document.getElementById("notif-badge").style.display = "inline";
    }

    div.addEventListener("dblclick", () => addReaction(key, "❤️"));
  });

  db.ref("messages").on("child_changed", snap => {
    const msg = snap.val();
    const key = snap.key;
    const reacDiv = document.getElementById(`reac-${key}`);
    if (reacDiv) reacDiv.innerHTML = Object.values(msg.reactions || {}).map(r => `<span class="reaction">${r}</span>`).join("");
  });
}

function addReaction(key, emoji) {
  if (!currentUser) return;
  db.ref(`messages/${key}/reactions/${currentUser.uid}`).set(emoji);
}

function editMessage(key, oldText) {
  const newText = prompt("Édite:", oldText);
  if (newText && newText.trim()) db.ref(`messages/${key}/text`).set(newText.trim());
}

function deleteMessage(key) {
  if (confirm("Supprimer ?")) db.ref(`messages/${key}`).remove();
}

function setReply(key) {
  replyToKey = key;
  msgInput.placeholder = "Répondre...";
  msgInput.focus();
}

// Events
document.getElementById("send-btn").addEventListener("click", send);
msgInput.addEventListener("keypress", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// Init
listenMessages();

// Cleanup
window.addEventListener("beforeunload", () => {
  if (currentUser) setPresence(false);
});
</script>
</body>
</html>
