<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum Live 2026 | Atelier Électronique Médenine</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#020617,#0f172a,#020617);color:#e2e8f0;height:100vh;display:flex;overflow:hidden;}
header{padding:16px;text-align:center;font-size:24px;font-weight:600;background:rgba(2,6,23,0.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(56,189,248,0.2);position:relative;}
.notification-badge{position:absolute;top:10px;right:20px;background:#ef4444;color:white;border-radius:50%;padding:4px 8px;font-size:12px;display:none;}
#sidebar{width:220px;background:rgba(15,23,42,0.6);backdrop-filter:blur(8px);padding:16px;overflow-y:auto;border-right:1px solid rgba(56,189,248,0.2);}
#chat{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:rgba(15,23,42,0.4);}
.message{display:flex;gap:12px;max-width:80%;background:rgba(30,41,59,0.7);backdrop-filter:blur(12px);padding:12px 16px;border-radius:18px;border:1px solid rgba(56,189,248,0.15);animation:fadeIn 0.4s ease;position:relative;}
.reply-to{font-size:11px;color:#38bdf8;margin-bottom:4px;}
.message-actions{position:absolute;top:8px;right:8px;display:flex;gap:8px;opacity:0;transition:0.2s;}
.message:hover .message-actions{opacity:1;}
.edit-btn,.delete-btn{cursor:pointer;font-size:16px;}
.edit-btn{color:#fbbf24;}
.delete-btn{color:#ef4444;}
/* ... (style précédent pour avatar, text, me, reactions, typing, etc.) */
.online-user{display:flex;align-items:center;gap:8px;padding:8px;border-bottom:1px solid rgba(56,189,248,0.1);}
.online-user .status-dot{margin:0;}
#chat-input{display:flex;align-items:center;padding:16px;background:rgba(2,6,23,0.9);backdrop-filter:blur(10px);border-top:1px solid rgba(56,189,248,0.2);}
</style>
</head>
<body>
<div style="display:flex;height:100vh;">
  <div id="sidebar">
    <h3 style="margin-bottom:12px;">Online (🟢)</h3>
    <div id="online-users"></div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;">
    <header>💬 Forum Live – AÉM <span id="notif-badge" class="notification-badge">0</span></header>
    <div id="chat">
      <div id="messages"></div>
      <div class="chat-input" id="chat-input">
        <input id="msg" placeholder="Écris un message... 😏🔥" autocomplete="off">
        <span class="emoji-btn" onclick="toggleEmojiPicker()">😊</span>
        <span class="photo-btn" onclick="document.getElementById('photo-input').click()">📷</span>
        <input type="file" id="photo-input" accept="image/*" style="display:none;">
        <div id="preview-container"><img id="preview-img" src="" alt="Prévisualisation"></div>
        <button id="send-btn">Envoyer</button>
      </div>
    </div>
  </div>
</div>

<!-- Emoji Picker -->
<emoji-picker id="emoji-picker" skin-tone-emoji="👍"></emoji-picker>

<!-- Firebase Compat -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script type="module">
  import 'https://cdn.jsdelivr.net/npm/emoji-picker-element@1.29.1/index.js';
</script>

<script>
// Config
const firebaseConfig = { /* ton config */ };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

let currentUser = null;
let typingTimeout = null;
let selectedImage = null;
let isSending = false;
let replyToKey = null; // Pour reply
let notifCount = 0;

// ... (login, auth.onAuthStateChanged, setPresence, typing functions kif 9bal – zidna juste online list)

function listenOnlineUsers() {
  db.ref("presence").orderByChild("online").equalTo(true).on("value", snap => {
    const list = document.getElementById("online-users");
    list.innerHTML = "";
    snap.forEach(child => {
      const data = child.val();
      if (data.online) {
        const div = document.createElement("div");
        div.className = "online-user";
        div.innerHTML = `<span class="status-dot online"></span> ${data.name || "Anonyme"}`;
        list.appendChild(div);
      }
    });
  });
}

// Send with reply & storage upload
async function send() {
  if (!currentUser || isSending) return;
  isSending = true;

  const text = document.getElementById("msg").value.trim();
  if (!text && !selectedImage) { isSending = false; return; }

  let imageUrl = null;
  if (selectedImage) {
    const file = document.getElementById("photo-input").files[0];
    const ref = storage.ref(`messages/${Date.now()}_${file.name}`);
    try {
      await ref.put(file);
      imageUrl = await ref.getDownloadURL();
    } catch (err) {
      console.error("Upload error:", err);
      alert("Erreur upload image");
      isSending = false;
      return;
    }
  }

  const msgData = {
    text: text || "",
    uid: currentUser.uid,
    name: currentUser.displayName || "Anonyme",
    photoURL: currentUser.photoURL || "",
    time: Date.now(),
    reactions: {},
    image: imageUrl,
    replyTo: replyToKey ? { key: replyToKey, text: "..." } : null  // zid full quote ba3d
  };

  db.ref("messages").push(msgData).then(() => {
    document.getElementById("msg").value = "";
    selectedImage = null;
    document.getElementById("preview-container").style.display = "none";
    replyToKey = null;
    document.getElementById("msg").placeholder = "Écris un message... 😏🔥";
    db.ref(`typing/${currentUser.uid}`).remove();
  }).catch(err => alert("Erreur: " + err.message))
  .finally(() => isSending = false);
}

// Listen messages + edit/delete/reply UI
function listenMessages() {
  db.ref("messages").orderByChild("time").on("child_added", snap => {
    const msg = snap.val();
    const key = snap.key;
    const div = document.createElement("div");
    div.className = `message ${msg.uid === currentUser?.uid ? "me" : ""}`;
    div.id = `msg-${key}`;

    let html = `
      <div class="avatar">${(msg.name || "?").charAt(0)}</div>
      <div class="text">
        <b>${msg.name} <span class="status-dot"></span></b>
        <small>${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</small><br>
    `;
    if (msg.replyTo) html += `<div class="reply-to">Réponse à : ${msg.replyTo.text.substring(0,50)}...</div>`;
    html += `${msg.text}`;
    if (msg.image) html += `<br><img src="${msg.image}" alt="Image">`;
    html += `
        <div class="reactions" id="reac-${key}"></div>
        <div class="message-actions">
          ${msg.uid === currentUser?.uid ? `<span class="edit-btn" onclick="editMessage('${key}', '${msg.text.replace(/'/g,"\\\'")}')">✏️</span>` : ''}
          ${msg.uid === currentUser?.uid ? `<span class="delete-btn" onclick="deleteMessage('${key}')">🗑️</span>` : ''}
          <span onclick="setReply('${key}')">💬</span>
        </div>
      </div>
    `;
    div.innerHTML = html;
    document.getElementById("messages").appendChild(div);
    scrollToBottom();

    // Notif simple si pas moi
    if (msg.uid !== currentUser?.uid) {
      notifCount++;
      const badge = document.getElementById("notif-badge");
      badge.textContent = notifCount;
      badge.style.display = "inline";
    }

    div.addEventListener("dblclick", () => addReaction(key, "❤️"));
  });

  // ... (reactions child_changed kif 9bal)
}

function editMessage(key, oldText) {
  const newText = prompt("Édite ton message:", oldText);
  if (newText !== null && newText.trim() !== "") {
    db.ref(`messages/${key}/text`).set(newText.trim());
  }
}

function deleteMessage(key) {
  if (confirm("Supprimer ce message ?")) {
    db.ref(`messages/${key}`).remove();
  }
}

function setReply(key) {
  replyToKey = key;
  document.getElementById("msg").placeholder = "Répondre au message...";
  document.getElementById("msg").focus();
}

// Events & init
document.getElementById("send-btn").addEventListener("click", send);
msgInput.addEventListener("keypress", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    // hide login, show chat
    listenMessages();
    listenOnlineUsers();
    listenTyping();
    setPresence(true);
  }
});

// ... (autres functions kif 9bal: emoji, photo preview, presence cleanup, etc.)
</script>
</body>
</html>
