<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum Live 2026 | Atelier Électronique Médenine</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#020617,#0f172a,#020617);color:#e2e8f0;height:100vh;display:flex;overflow:hidden;}
header{padding:14px 16px;text-align:center;font-size:22px;font-weight:600;background:rgba(2,6,23,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(56,189,248,0.25);position:relative;}
.notification-badge{position:absolute;top:8px;right:16px;background:#ef4444;color:white;border-radius:50%;padding:4px 8px;font-size:11px;font-weight:500;display:none;}

/* SIDEBAR ONLINE */
#sidebar{width:240px;background:rgba(15,23,42,0.7);backdrop-filter:blur(12px);padding:16px;overflow-y:auto;border-right:1px solid rgba(56,189,248,0.18);}
#sidebar h3{margin-bottom:14px;font-size:15px;color:#38bdf8;letter-spacing:0.5px;}
.online-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;transition:0.25s;}
.online-user:hover{background:rgba(56,189,248,0.12);}
.status-dot{width:10px;height:10px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px #22c55e;}

/* CHAT */
#chat{flex:1;display:flex;flex-direction:column;}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:rgba(15,23,42,0.35);}
.message{display:flex;gap:12px;max-width:82%;background:rgba(30,41,59,0.75);backdrop-filter:blur(14px);padding:12px 16px;border-radius:20px;border:1px solid rgba(56,189,248,0.2);animation:fadeIn 0.4s ease;position:relative;}
.message.me{margin-left:auto;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:white;border:none;}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(45deg,#38bdf8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-weight:600;color:white;font-size:16px;box-shadow:0 2px 10px rgba(14,165,233,0.4);}
.text{flex:1;font-size:15px;line-height:1.45;}
.text b{color:#38bdf8;font-size:14px;}
.text small{color:#94a3b8;font-size:11px;opacity:0.9;margin-left:8px;}
.message img{max-width:240px;border-radius:12px;margin-top:8px;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.reactions{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;}
.reaction{background:rgba(255,255,255,0.12);padding:5px 10px;border-radius:20px;font-size:15px;cursor:pointer;transition:0.2s;}
.reaction:hover{background:rgba(255,255,255,0.25);}
.message-actions{position:absolute;top:8px;right:12px;display:flex;gap:10px;opacity:0;transition:0.25s;}
.message:hover .message-actions{opacity:1;}
.edit-btn,.delete-btn,.reply-btn{cursor:pointer;font-size:16px;}
.edit-btn{color:#fbbf24;}
.delete-btn{color:#ef4444;}
.reply-btn{color:#38bdf8;}

/* INPUT AREA - 2026 STYLE */
.chat-input{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(2,6,23,0.95);backdrop-filter:blur(14px);border-top:1px solid rgba(56,189,248,0.25);}
.chat-input input{flex:1;padding:14px 18px;border:none;border-radius:30px;background:rgba(30,41,59,0.8);color:white;font-size:15px;outline:none;transition:0.25s;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.chat-input input:focus{box-shadow:0 0 0 3px rgba(56,189,248,0.4);background:rgba(30,41,59,0.95);}
.emoji-btn,.photo-btn{font-size:26px;cursor:pointer;transition:0.25s;padding:8px;border-radius:50%;}
.emoji-btn:hover,.photo-btn:hover{background:rgba(56,189,248,0.15);transform:scale(1.15);}
#preview-container{display:none;margin-left:8px;}
#preview-img{max-width:70px;border-radius:12px;border:2px solid #38bdf8;box-shadow:0 4px 12px rgba(14,165,233,0.3);}
#send-btn{padding:14px 28px;border:none;border-radius:30px;background:linear-gradient(45deg,#38bdf8,#0ea5e9);color:white;font-weight:600;font-size:15px;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 16px rgba(14,165,233,0.4);}
#send-btn:hover{transform:scale(1.08);box-shadow:0 8px 24px rgba(14,165,233,0.6);}
#send-btn:active{transform:scale(0.96);}

/* EMOJI PICKER */
#emoji-picker{display:none;position:absolute;bottom:80px;right:16px;z-index:100;width:340px;height:420px;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.6);}

/* SCROLLBAR */
#messages::-webkit-scrollbar{width:5px;}
#messages::-webkit-scrollbar-thumb{background:#38bdf8;border-radius:10px;}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* MOBILE OPTIMISATION 2026 */
@media (max-width: 768px){
  body{flex-direction:column;}
  #sidebar{display:none;}
  header{font-size:20px;padding:12px;}
  #messages{padding:12px;gap:10px;}
  .message{max-width:94%;padding:10px 14px;border-radius:16px;}
  .avatar{width:36px;height:36px;font-size:15px;}
  .text{font-size:14px;}
  .text b{font-size:13px;}
  .text small{font-size:10px;}
  .message img{max-width:200px;}
  .chat-input{padding:10px 12px;gap:8px;}
  .chat-input input{padding:12px 16px;font-size:14px;border-radius:26px;}
  .emoji-btn,.photo-btn{font-size:24px;padding:6px;}
  #send-btn{padding:12px 24px;font-size:14px;border-radius:26px;}
  #preview-img{max-width:60px;}
  #emoji-picker{width:100%;right:0;bottom:70px;height:360px;border-radius:16px 16px 0 0;}
}
</style>
</head>
<body>
<div style="display:flex;height:100vh;">
  <div id="sidebar">
    <h3>Online (🟢)</h3>
    <div id="online-users"></div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;">
    <header>💬 Forum Live – AÉM <span id="notif-badge" class="notification-badge">0</span></header>
    <div id="chat">
      <div id="messages"></div>
      <div class="chat-input">
        <input id="msg" placeholder="Écris un message... 😏🔥" autocomplete="off">
        <span class="emoji-btn" onclick="toggleEmojiPicker()">😊</span>
        <span class="photo-btn" onclick="document.getElementById('photo-input').click()">📷</span>
        <input type="file" id="photo-input" accept="image/*" style="display:none;">
        <div id="preview-container"><img id="preview-img" src="" alt="Prévisualisation"></div>
        <button id="send-btn">Envoyer</button>
      </div>
    </div>
  </div>
</div>

<emoji-picker id="emoji-picker" skin-tone-emoji="👍"></emoji-picker>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script type="module">
  import 'https://cdn.jsdelivr.net/npm/emoji-picker-element@1.29.1/index.js';
</script>

</body>
</html>
