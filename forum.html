<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Salon Chat | Atelier Électronique Médenine</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{padding:14px;text-align:center;font-size:20px;font-weight:600;background:rgba(2,6,23,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(56,189,248,0.2);z-index:10;}
.login{text-align:center;margin:auto;padding:40px 20px;max-width:360px;}
.login button{background:linear-gradient(45deg,#38bdf8,#0ea5e9);border:none;padding:16px 40px;border-radius:50px;color:white;font-weight:600;cursor:pointer;box-shadow:0 6px 20px rgba(14,165,233,0.5);transition:all 0.3s;}
.login button:hover{transform:scale(1.05);}
#messages{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:12px;background:#0f172a;}
.message{display:flex;gap:10px;max-width:80%;margin-bottom:4px;}
.message.me{flex-direction:row-reverse;}
.bubble{max-width:100%;padding:12px 16px;border-radius:20px;line-height:1.4;font-size:15px;position:relative;}
.bubble:not(.me){background:#1e293b;border-bottom-left-radius:4px;}
.bubble.me{background:linear-gradient(135deg,#38bdf8,#0ea5e9);color:#0f172a;border-bottom-right-radius:4px;}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(45deg,#38bdf8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-weight:600;color:white;font-size:15px;flex-shrink:0;}
.avatar.me{background:linear-gradient(45deg,#0ea5e9,#0284c7);}
.text b{color:#38bdf8;}
.text small{font-size:11px;color:#94a3b8;margin-left:8px;opacity:0.9;}
.chat-input{position:relative;padding:12px 12px;background:rgba(15,23,42,0.95);backdrop-filter:blur(12px);border-top:1px solid rgba(56,189,248,0.25);z-index:10;}
.input-container{display:flex;align-items:center;gap:8px;background:rgba(30,41,59,0.85);border-radius:999px;padding:8px 12px;box-shadow:inset 0 2px 8px rgba(0,0,0,0.4);}
#msg{flex:1;background:transparent;border:none;outline:none;color:white;font-size:15px;padding:10px 12px;}
#msg::placeholder{color:#94a3b8;}
.action-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(56,189,248,0.2);color:white;font-size:22px;cursor:pointer;transition:all 0.25s;}
.action-btn:hover{background:rgba(56,189,248,0.4);transform:scale(1.12);}
.action-btn:active{transform:scale(0.9);}
#send-btn{width:44px;height:44px;border:none;border-radius:50%;background:linear-gradient(45deg,#38bdf8,#0ea5e9);color:white;font-size:18px;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 16px rgba(14,165,233,0.4);}
#send-btn:hover{transform:scale(1.12);box-shadow:0 8px 24px rgba(14,165,233,0.6);}
#preview-container{display:none;position:absolute;bottom:80px;left:16px;}
#preview-img{max-width:80px;border-radius:12px;border:2px solid #38bdf8;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
#emoji-picker{display:none;position:absolute;bottom:80px;right:16px;z-index:100;width:100%;max-width:360px;height:420px;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,0.6);}
#messages::-webkit-scrollbar{width:4px;}
#messages::-webkit-scrollbar-thumb{background:#38bdf8;border-radius:10px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
@media (max-width: 768px){
  header{font-size:18px;padding:12px;}
  #messages{padding:12px 8px;}
  .message{max-width:90%;}
  .bubble{padding:10px 14px;font-size:14px;}
  .avatar{width:32px;height:32px;font-size:14px;}
  .chat-input{padding:10px 8px;}
  .input-container{padding:6px 10px;}
  #msg{font-size:14px;padding:8px 10px;}
  .action-btn{width:38px;height:38px;font-size:20px;}
  #send-btn{width:42px;height:42px;}
  #emoji-picker{height:380px;}
}
</style>
</head>
<body>
<header>💬 Salon Chat – AÉM</header>

<div class="login">
  <button onclick="login()">🔐 Login avec Google</button>
</div>

<div id="chat" style="display:none;">
  <div id="messages"></div>
</div>

<div class="chat-input">
  <div class="input-container">
    <input id="msg" placeholder="Message..." autocomplete="off">
    <span class="action-btn emoji-btn" onclick="toggleEmojiPicker()">😊</span>
    <span class="action-btn photo-btn" onclick="document.getElementById('photo-input').click()">📷</span>
    <input type="file" id="photo-input" accept="image/*" style="display:none;">
    <div id="preview-container"><img id="preview-img" src="" alt="Prévisualisation"></div>
  </div>
  <button id="send-btn">➤</button>
</div>

<emoji-picker id="emoji-picker" skin-tone-emoji="👍"></emoji-picker>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script type="module">
  import 'https://cdn.jsdelivr.net/npm/emoji-picker-element@1.29.1/index.js';
</script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
  authDomain: "atelier-electronique-mednine.firebaseapp.com",
  projectId: "atelier-electronique-mednine",
  storageBucket: "atelier-electronique-mednine.firebasestorage.app",
  messagingSenderId: "547430908384",
  appId: "1:547430908384:web:4caa4cf3869491bd14eb85",
  databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
const msgInput = document.getElementById("msg");

// Login
function login() {
  auth.signOut().then(() => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => console.error("Login error:", err));
  });
}

// Auth state
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.querySelector(".login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    listenMessages();
  } else {
    currentUser = null;
    document.querySelector(".login").style.display = "block";
    document.getElementById("chat").style.display = "none";
  }
});

// Send
function send() {
  if (!currentUser) return alert("Login awla!");
  const text = msgInput.value.trim();
  if (!text) return;

  db.ref("messages").push({
    text,
    uid: currentUser.uid,
    name: currentUser.displayName || "Anonyme",
    time: Date.now()
  }).then(() => {
    msgInput.value = "";
  }).catch(err => console.error("Send error:", err));
}

// Listen
function listenMessages() {
  db.ref("messages").orderByChild("time").on("child_added", snap => {
    const msg = snap.val();
    const div = document.createElement("div");
    div.className = `message ${msg.uid === currentUser?.uid ? "me" : ""}`;
    div.innerHTML = `
      <div class="avatar">${(msg.name || "?").charAt(0)}</div>
      <div class="bubble ${msg.uid === currentUser?.uid ? "me" : ""}">
        <div class="text">
          <b>${msg.name || "Inconnu"}</b> <small>${new Date(msg.time).toLocaleTimeString()}</small><br>
          ${msg.text}
        </div>
      </div>
    `;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
  });
}

// Emoji fix
function toggleEmojiPicker() {
  const picker = document.getElementById("emoji-picker");
  picker.style.display = picker.style.display === "block" ? "none" : "block";
  if (picker.style.display === "block") msgInput.focus();
}

document.getElementById("emoji-picker").addEventListener("emoji-click", e => {
  const emoji = e.detail.unicode;
  msgInput.focus();
  const start = msgInput.selectionStart ?? msgInput.value.length;
  msgInput.value = msgInput.value.substring(0, start) + emoji + msgInput.value.substring(start);
  msgInput.setSelectionRange(start + emoji.length, start + emoji.length);
  document.getElementById("emoji-picker").style.display = "none";
});

// Events
document.getElementById("send-btn").addEventListener("click", send);
msgInput.addEventListener("keypress", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>
</body>
</html>
