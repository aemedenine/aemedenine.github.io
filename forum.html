<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum Live 2026 | Atelier Électronique Médenine</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#020617,#0f172a,#020617);color:#e2e8f0;height:100vh;display:flex;overflow:hidden;}
header{padding:14px;text-align:center;font-size:22px;font-weight:600;background:rgba(2,6,23,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(56,189,248,0.25);}
.login{text-align:center;margin:100px auto;max-width:360px;}
.login button{background:linear-gradient(45deg,#38bdf8,#0ea5e9);border:none;padding:16px 40px;border-radius:50px;color:white;font-weight:600;cursor:pointer;box-shadow:0 6px 20px rgba(14,165,233,0.5);transition:all 0.3s;}
.login button:hover{transform:scale(1.06);box-shadow:0 10px 30px rgba(14,165,233,0.7);}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:rgba(15,23,42,0.4);}
.message{display:flex;gap:12px;max-width:80%;background:rgba(30,41,59,0.75);backdrop-filter:blur(14px);padding:12px 16px;border-radius:20px;border:1px solid rgba(56,189,248,0.2);animation:fadeIn 0.4s;}
.message.me{margin-left:auto;background:linear-gradient(135deg,#38bdf8,#0ea5e9);color:#0f172a;}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(45deg,#38bdf8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-weight:600;color:white;font-size:16px;}
.text{flex:1;}
.text b{color:#38bdf8;font-size:14px;}
.text small{color:#94a3b8;font-size:11px;margin-left:8px;}
.chat-input{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(2,6,23,0.95);backdrop-filter:blur(14px);border-top:1px solid rgba(56,189,248,0.25);}
.chat-input input{flex:1;padding:14px 18px;border:none;border-radius:999px;background:rgba(30,41,59,0.85);color:white;font-size:15px;outline:none;transition:0.3s;box-shadow:inset 0 2px 8px rgba(0,0,0,0.3);}
.chat-input input:focus{box-shadow:0 0 0 3px rgba(56,189,248,0.5);}
.action-btn{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:rgba(56,189,248,0.15);color:white;font-size:22px;cursor:pointer;transition:all 0.25s;}
.action-btn:hover{background:rgba(56,189,248,0.35);transform:scale(1.15);}
.action-btn:active{transform:scale(0.92);}
#send-btn{padding:14px 32px;border:none;border-radius:999px;background:linear-gradient(90deg,#38bdf8,#0ea5e9);color:white;font-weight:600;font-size:15px;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 16px rgba(14,165,233,0.5);}
#send-btn:hover{transform:scale(1.08);box-shadow:0 8px 24px rgba(14,165,233,0.7);}
#send-btn:active{transform:scale(0.96);}
#preview-container{display:none;margin-left:8px;}
#preview-img{max-width:64px;border-radius:12px;border:2px solid #38bdf8;}
#emoji-picker{display:none;position:absolute;bottom:80px;right:16px;z-index:100;width:340px;height:420px;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,0.6);}
#messages::-webkit-scrollbar{width:5px;}
#messages::-webkit-scrollbar-thumb{background:#38bdf8;border-radius:10px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@media (max-width: 768px){
  #chat{padding:12px;}
  .message{max-width:94%;padding:10px 14px;border-radius:16px;}
  .avatar{width:36px;height:36px;font-size:15px;}
  .chat-input{gap:8px;padding:10px 12px;}
  .chat-input input{padding:12px 16px;font-size:14px;}
  .action-btn{width:40px;height:40px;font-size:20px;}
  #send-btn{padding:12px 24px;font-size:14px;}
  #emoji-picker{width:100%;right:0;bottom:70px;height:360px;border-radius:16px 16px 0 0;}
}
</style>
</head>
<body>
<header>💬 Forum Live – AÉM</header>

<div class="login">
  <button onclick="login()">🔐 Login avec Google</button>
</div>

<div id="chat" style="display:none;">
  <div id="messages"></div>
</div>

<div class="chat-input">
  <input id="msg" placeholder="Écris un message... 😏🔥" autocomplete="off">
  <span class="action-btn emoji-btn" onclick="toggleEmojiPicker()">😊</span>
  <span class="action-btn photo-btn" onclick="document.getElementById('photo-input').click()">📷</span>
  <input type="file" id="photo-input" accept="image/*" style="display:none;">
  <div id="preview-container"><img id="preview-img" src="" alt="Prévisualisation"></div>
  <button id="send-btn">Envoyer</button>
</div>

<emoji-picker id="emoji-picker" skin-tone-emoji="👍"></emoji-picker>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script type="module">
  import 'https://cdn.jsdelivr.net/npm/emoji-picker-element@1.29.1/index.js';
</script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
  authDomain: "atelier-electronique-mednine.firebaseapp.com",
  projectId: "atelier-electronique-mednine",
  storageBucket: "atelier-electronique-mednine.firebasestorage.app",
  messagingSenderId: "547430908384",
  appId: "1:547430908384:web:4caa4cf3869491bd14eb85",
  databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

let currentUser = null;
let typingTimeout = null;
let selectedImage = null;
let isSending = false;

// Login
function login() {
  auth.signOut().then(() => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => console.error("Login error:", err));
  });
}

// Auth state
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.querySelector(".login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    listenMessages();
    setPresence(true);
  } else {
    currentUser = null;
    document.querySelector(".login").style.display = "block";
    document.getElementById("chat").style.display = "none";
    setPresence(false);
  }
});

// Presence (simplifié pour test)
function setPresence(online) {
  if (!currentUser) return;
  db.ref(`presence/${currentUser.uid}`).set({online, name: currentUser.displayName || "Anonyme"});
}

// Send (avec fix)
const msgInput = document.getElementById("msg");
function send() {
  if (!currentUser || isSending) return;
  isSending = true;
  const text = msgInput.value.trim();
  if (!text && !selectedImage) { isSending = false; return; }

  const msgData = {
    text: text || "[Image]",
    uid: currentUser.uid,
    name: currentUser.displayName || "Anonyme",
    time: Date.now()
  };

  db.ref("messages").push(msgData).then(() => {
    msgInput.value = "";
    selectedImage = null;
    document.getElementById("preview-container").style.display = "none";
  }).catch(err => {
    console.error("Send error:", err);
    alert("Erreur envoi: " + err.message);
  }).finally(() => isSending = false);
}

// Listen messages (basique pour test)
function listenMessages() {
  db.ref("messages").orderByChild("time").on("child_added", snap => {
    const msg = snap.val();
    const div = document.createElement("div");
    div.className = `message ${msg.uid === currentUser?.uid ? "me" : ""}`;
    div.innerHTML = `
      <div class="avatar">${(msg.name || "?").charAt(0)}</div>
      <div class="text">
        <b>${msg.name || "Inconnu"}</b> <small>${new Date(msg.time).toLocaleTimeString()}</small><br>
        ${msg.text}
      </div>
    `;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
  });
}

// Events
document.getElementById("send-btn").addEventListener("click", send);
msgInput.addEventListener("keypress", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// Photo preview (simplifié)
document.getElementById("photo-input").addEventListener("change", e => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById("preview-img").src = ev.target.result;
      document.getElementById("preview-container").style.display = "block";
      selectedImage = true;
    };
    reader.readAsDataURL(file);
  }
});

// Emoji picker (simplifié)
function toggleEmojiPicker() {
  const picker = document.getElementById("emoji-picker");
  picker.style.display = picker.style.display === "block" ? "none" : "block";
}
</script>
</body>
</html>
