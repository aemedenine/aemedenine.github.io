<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Salon Live • Atelier Électronique Médenine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f1a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 14px 16px;
      background: rgba(2,6,23,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(56,189,248,0.18);
      text-align: center;
      font-size: 1.35rem;
      font-weight: 700;
      color: #38bdf8;
      letter-spacing: 0.5px;
      z-index: 20;
    }

    .login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-btn {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: white;
      border: none;
      padding: 18px 48px;
      font-size: 1.15rem;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(14,165,233,0.45);
      transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
    }

    .login-btn:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 15px 40px rgba(14,165,233,0.6);
    }

    #chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: linear-gradient(to bottom, #0a0f1a, #0f172a);
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      opacity: 0;
      transform: translateY(20px);
      animation: messageIn 0.4s forwards;
    }

    .message.me { flex-direction: row-reverse; }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: white;
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      box-shadow: 0 4px 12px rgba(56,189,248,0.4);
    }

    .message.me .avatar {
      background: linear-gradient(135deg, #0284c7, #0ea5e9);
    }

    .bubble {
      padding: 12px 18px;
      border-radius: 20px;
      line-height: 1.45;
      font-size: 0.98rem;
      position: relative;
      word-break: break-word;
    }

    .bubble:not(.me) {
      background: #1e293b;
      border-bottom-left-radius: 6px;
    }

    .bubble.me {
      background: linear-gradient(135deg, #38bdf8, #60a5fa);
      color: #0f172a;
      border-bottom-right-radius: 6px;
    }

    .bubble .sender {
      font-weight: 600;
      color: #38bdf8;
      margin-bottom: 4px;
      display: block;
    }

    .bubble .time {
      font-size: 0.78rem;
      color: rgba(226,232,240,0.6);
      margin-left: 8px;
    }

    .chat-input-area {
      padding: 12px 16px;
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(56,189,248,0.2);
      z-index: 15;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(30,41,59,0.9);
      border-radius: 999px;
      padding: 8px 12px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.35);
    }

    #message-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 1rem;
      padding: 10px 0;
    }

    #message-input::placeholder { color: #94a3b8; }

    .action-icon {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(56,189,248,0.18);
      color: #38bdf8;
      font-size: 1.35rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    .action-icon:hover { background: rgba(56,189,248,0.35); transform: scale(1.15); }

    #send-button {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(45deg, #38bdf8, #0ea5e9);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(14,165,233,0.45);
      transition: all 0.3s;
    }

    #send-button:hover { transform: scale(1.12); box-shadow: 0 10px 30px rgba(14,165,233,0.6); }

    #preview-area {
      display: none;
      position: absolute;
      bottom: 90px;
      left: 20px;
      background: rgba(30,41,59,0.9);
      padding: 6px;
      border-radius: 12px;
      border: 2px solid #38bdf8;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }

    #preview-img { max-width: 90px; border-radius: 8px; }

    emoji-picker {
      position: absolute;
      bottom: 90px;
      right: 20px;
      z-index: 100;
      width: 100%;
      max-width: 380px;
      height: 420px;
      --emoji-size: 1.8rem;
      border-radius: 16px;
      box-shadow: 0 12px 50px rgba(0,0,0,0.7);
      background: #1e293b;
      border: 1px solid rgba(56,189,248,0.3);
    }

    @keyframes messageIn {
      to { opacity: 1; transform: translateY(0); }
    }

    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }

    @media (max-width: 768px) {
      header { font-size: 1.25rem; padding: 12px; }
      .message { max-width: 92%; }
      .bubble { padding: 10px 14px; font-size: 0.94rem; }
      .avatar { width: 38px; height: 38px; font-size: 1rem; }
      .input-wrapper { padding: 7px 10px; }
      #message-input { font-size: 0.96rem; }
      .action-icon { width: 40px; height: 40px; font-size: 1.25rem; }
      #send-button { width: 46px; height: 46px; }
      emoji-picker { max-width: 100%; height: 380px; bottom: 80px; }
    }
  </style>
</head>
<body>
  <header>💬 Salon Live – AÉM</header>

  <div class="login-screen" id="loginScreen">
    <button class="login-btn" onclick="signInWithGoogle()">Se connecter avec Google</button>
  </div>

  <div id="chatContainer" style="display:none;">
    <div id="messages"></div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <input id="messageInput" placeholder="Écris ton message..." autocomplete="off">
        <span class="action-icon" onclick="toggleEmoji()">😄</span>
        <span class="action-icon" onclick="document.getElementById('imageInput').click()">📸</span>
        <input type="file" id="imageInput" accept="image/*" style="display:none;">
        <div id="previewArea"><img id="previewImg" src="" alt=""></div>
      </div>
      <button id="sendButton">➤</button>
    </div>

    <emoji-picker id="emojiPicker"></emoji-picker>
  </div>

  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.29.1/index.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
      authDomain: "atelier-electronique-mednine.firebaseapp.com",
      databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "atelier-electronique-mednine",
      storageBucket: "atelier-electronique-mednine.firebasestorage.app",
      messagingSenderId: "547430908384",
      appId: "1:547430908384:web:4caa4cf3869491bd14eb85"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null;
    const messagesRef = db.ref('liveChat');

    // Auth
    function signInWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err => console.error(err));
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('chatContainer').style.display = 'flex';
        loadMessages();
      } else {
        currentUser = null;
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('chatContainer').style.display = 'none';
      }
    });

    // Send message
    function sendMessage() {
      if (!currentUser) return alert("Connecte-toi d'abord !");
      const text = document.getElementById('messageInput').value.trim();
      if (!text) return;

      messagesRef.push({
        text,
        uid: currentUser.uid,
        name: currentUser.displayName || currentUser.email.split('@')[0],
        photo: currentUser.photoURL || '',
        timestamp: firebase.database.ServerValue.TIMESTAMP
      });

      document.getElementById('messageInput').value = '';
    }

    // Load messages
    function loadMessages() {
      messagesRef.orderByChild('timestamp').on('child_added', snap => {
        const msg = snap.val();
        const isMe = msg.uid === currentUser?.uid;

        const div = document.createElement('div');
        div.className = `message ${isMe ? 'me' : ''}`;
        
        div.innerHTML = `
          <div class="avatar" style="${msg.photo ? `background-image:url(${msg.photo});background-size:cover;` : ''}">
            ${!msg.photo ? (msg.name?.[0] || '?') : ''}
          </div>
          <div class="bubble ${isMe ? 'me' : ''}">
            <span class="sender">${msg.name || 'Anonyme'}</span>
            <span class="time">${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
            <div>${msg.text}</div>
          </div>
        `;

        document.getElementById('messages').appendChild(div);
        div.scrollIntoView({ behavior: 'smooth' });
      });
    }

    // Events
    document.getElementById('sendButton').onclick = sendMessage;
    document.getElementById('messageInput').onkeypress = e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    };

    // Emoji
    function toggleEmoji() {
      const picker = document.getElementById('emojiPicker');
      picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
      if (picker.style.display === 'block') document.getElementById('messageInput').focus();
    }

    document.getElementById('emojiPicker').addEventListener('emoji-click', e => {
      const input = document.getElementById('messageInput');
      const emoji = e.detail.unicode;
      const pos = input.selectionStart || input.value.length;
      input.value = input.value.substring(0, pos) + emoji + input.value.substring(pos);
      input.focus();
      input.setSelectionRange(pos + emoji.length, pos + emoji.length);
      document.getElementById('emojiPicker').style.display = 'none';
    });

    // Photo preview (local only for now)
    document.getElementById('imageInput').onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('previewImg').src = ev.target.result;
        document.getElementById('previewArea').style.display = 'block';
      };
      reader.readAsDataURL(file);
    };
  </script>
</body>
</html>
