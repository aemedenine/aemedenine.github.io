<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum Live 2026 | Atelier Électronique Médenine</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#020617,#0f172a,#020617);color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{padding:16px;text-align:center;font-size:24px;font-weight:600;background:rgba(2,6,23,0.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(56,189,248,0.2);}
.login{text-align:center;margin:80px auto;max-width:400px;}
.login button{background:linear-gradient(45deg,#38bdf8,#0ea5e9);border:none;padding:14px 40px;border-radius:50px;color:white;font-weight:600;cursor:pointer;box-shadow:0 4px 15px rgba(14,165,233,0.4);}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:rgba(15,23,42,0.4);}
.message{display:flex;gap:12px;max-width:80%;background:rgba(30,41,59,0.7);padding:12px 16px;border-radius:18px;}
.avatar{width:42px;height:42px;border-radius:50%;background:#38bdf8;display:flex;align-items:center;justify-content:center;font-weight:bold;color:white;}
.text b{color:#38bdf8;font-size:14px;}
.text small{color:#94a3b8;font-size:11px;}
.me{margin-left:auto;background:#38bdf8;color:#0f172a;}
.chat-input{display:flex;padding:16px;background:#020617;}
.chat-input input{flex:1;padding:12px;border-radius:30px;border:none;background:#1e293b;color:white;}
.chat-input button{margin-left:10px;padding:12px 24px;border:none;border-radius:30px;background:#38bdf8;color:white;cursor:pointer;}
.message img{max-width:200px;border-radius:10px;margin-top:8px;}
</style>
</head>

<body>

<header>💬 Forum Live 2026 – Atelier Électronique Médenine</header>

<div class="login">
<button onclick="login()">🔐 Login avec Google</button>
</div>

<div id="chat" style="display:none;"></div>

<div class="chat-input">
<input id="msg" placeholder="Écris un message... 😏🔥">
<button id="send-btn">Envoyer</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>

let currentUser=null;
let isSending=false;
let messagesLoaded=false;

const firebaseConfig = {
apiKey:"AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
authDomain:"atelier-electronique-mednine.firebaseapp.com",
projectId:"atelier-electronique-mednine",
databaseURL:"https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.database();

function login(){

const provider=new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider)
.catch(e=>alert(e.message));

}

auth.onAuthStateChanged(user=>{

if(user){

currentUser=user;

document.querySelector(".login").style.display="none";
document.getElementById("chat").style.display="flex";

listenMessages();

}

});

function send(){

if(!currentUser)return;

if(isSending)return;

isSending=true;

const text=document.getElementById("msg").value.trim();

if(!text){

isSending=false;
return;

}

db.ref("messages").push({

text:text,
uid:currentUser.uid,
name:currentUser.displayName,
time:Date.now(),
reactions:{}

}).then(()=>{

document.getElementById("msg").value="";

}).finally(()=>{

isSending=false;

});

}

function listenMessages(){

if(messagesLoaded) return;
messagesLoaded=true;

db.ref("messages").orderByChild("time")
.on("child_added",snap=>{

const msg=snap.val();
const key=snap.key;

const div=document.createElement("div");

div.className=`message ${msg.uid===currentUser.uid?"me":""}`;

div.innerHTML=`

<div class="avatar">${msg.name.charAt(0)}</div>

<div class="text">

<b>${msg.name}</b>
<small>${new Date(msg.time).toLocaleTimeString()}</small>
<br>

${msg.text}

<div class="reactions" id="reac-${key}"></div>

</div>

`;

document.getElementById("chat").appendChild(div);

document.getElementById("chat").scrollTop=999999;

div.addEventListener("dblclick",()=>addReaction(key,"❤️"));

});

db.ref("messages").on("child_changed",snap=>{

const msg=snap.val();
const key=snap.key;

const reacDiv=document.getElementById(`reac-${key}`);

if(reacDiv){

reacDiv.innerHTML=Object.values(msg.reactions||{})
.map(r=>`<span>${r}</span>`).join(" ");

}

});

}

function addReaction(msgKey,emoji){

if(!currentUser)return;

db.ref(`messages/${msgKey}/reactions/${currentUser.uid}`).set(emoji);

}

document.getElementById("msg")
.addEventListener("keypress",e=>{

if(e.key==="Enter"){

send();

}

});

document.getElementById("send-btn")
.addEventListener("click",send);

window.addEventListener("beforeunload",()=>{

if(currentUser){

db.ref(`presence/${currentUser.uid}`).set({
online:false,
lastSeen:Date.now()
});

}

});

</script>

</body>
</html>
