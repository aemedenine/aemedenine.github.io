<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Chat • Atelier Électronique Médenine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0b0f1a 0%, #0f172a 100%);
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 14px 20px;
      background: rgba(2,6,23,0.96);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(56,189,248,0.12);
      text-align: center;
      font-size: 1.45rem;
      font-weight: 700;
      color: #38bdf8;
      letter-spacing: 0.7px;
      z-index: 30;
      box-shadow: 0 4px 24px rgba(0,0,0,0.45);
    }

    .login-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      text-align: center;
    }

    .login-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 12px;
    }

    .login-desc {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: 50px;
      max-width: 420px;
    }

    .google-signin {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #ffffff;
      color: #1f2937;
      border: none;
      padding: 16px 52px;
      font-size: 1.15rem;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 10px 35px rgba(0,0,0,0.45);
      transition: all 0.4s cubic-bezier(0.22,1,0.36,1);
    }

    .google-signin img { width: 28px; height: 28px; }

    .google-signin:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 50px rgba(56,189,248,0.55);
    }

    #chat-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg-item {
      display: flex;
      gap: 14px;
      max-width: 86%;
      opacity: 0;
      transform: translateY(35px);
      animation: msgFadeIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .msg-item.own { flex-direction: row-reverse; }

    .avatar-container {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      flex-shrink: 0;
      background-size: cover;
      background-position: center;
      box-shadow: 0 5px 18px rgba(56,189,248,0.35);
    }

    .avatar-fallback {
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.25rem;
    }

    .message-bubble {
      padding: 13px 20px;
      border-radius: 24px;
      line-height: 1.5;
      font-size: 1.02rem;
      position: relative;
      word-break: break-word;
    }

    .message-bubble.other {
      background: rgba(30,41,59,0.94);
      backdrop-filter: blur(10px);
      border-bottom-left-radius: 8px;
    }

    .message-bubble.own {
      background: linear-gradient(135deg, #38bdf8 0%, #60a5fa 100%);
      color: #0f172a;
      border-bottom-right-radius: 8px;
    }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
    }

    .sender {
      font-weight: 600;
      color: #38bdf8;
      font-size: 1rem;
    }

    .timestamp {
      font-size: 0.82rem;
      color: rgba(226,232,240,0.58);
    }

    .input-area {
      padding: 16px 20px;
      background: rgba(15,23,42,0.97);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(56,189,248,0.15);
      z-index: 25;
    }

    .input-pill {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(30,41,59,0.92);
      border-radius: 999px;
      padding: 10px 16px;
      box-shadow: inset 0 3px 14px rgba(0,0,0,0.45);
    }

    #input-field {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 1.05rem;
      padding: 10px 0;
    }

    #input-field::placeholder { color: #94a3b8; }

    .tool-btn {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(56,189,248,0.22);
      color: #38bdf8;
      font-size: 1.45rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .tool-btn:hover { background: rgba(56,189,248,0.45); transform: scale(1.14); }

    #send-btn {
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(45deg, #38bdf8, #0ea5e9);
      color: white;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(14,165,233,0.55);
      transition: all 0.4s;
    }

    #send-btn:hover { transform: scale(1.16); box-shadow: 0 14px 45px rgba(14,165,233,0.7); }

    @keyframes msgFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 12px; }

    @media (max-width: 768px) {
      header { font-size: 1.35rem; padding: 12px 16px; }
      .msg-item { max-width: 94%; }
      .message-bubble { padding: 12px 18px; font-size: 0.99rem; }
      .avatar-container { width: 42px; height: 42px; }
      .input-pill { padding: 9px 14px; }
      #input-field { font-size: 1rem; }
      .tool-btn { width: 44px; height: 44px; font-size: 1.35rem; }
      #send-btn { width: 50px; height: 50px; font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <header>Live Chat • Atelier Électronique Médenine</header>

  <div class="login-view" id="loginView">
    <div class="login-title">Salon en direct</div>
    <div class="login-desc">Rejoins la discussion avec l'équipe et les passionnés d'électronique</div>
    <button class="google-signin" onclick="googleSignIn()">
      <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
      Continuer avec Google
    </button>
  </div>

  <div id="chatView" style="display:none;">
    <div id="messages"></div>

    <div class="input-area">
      <div class="input-pill">
        <input id="inputField" placeholder="Message..." autocomplete="off">
        <span class="tool-btn" onclick="toggleEmoji()">😄</span>
        <span class="tool-btn" onclick="document.getElementById('fileInput').click()">📎</span>
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <div id="previewZone" style="display:none;position:absolute;bottom:100px;left:24px;background:rgba(30,41,59,0.92);padding:10px;border-radius:14px;border:2px solid #38bdf8;box-shadow:0 8px 30px rgba(0,0,0,0.6);">
          <img id="previewThumb" style="max-width:110px;border-radius:10px;">
        </div>
      </div>
      <button id="sendBtn">➤</button>
    </div>

    <emoji-picker id="emojiPicker" style="display:none;position:absolute;bottom:110px;right:24px;z-index:100;width:100%;max-width:420px;height:440px;border-radius:24px;box-shadow:0 16px 60px rgba(0,0,0,0.75);"></emoji-picker>
  </div>

  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.29.1/index.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // ================= CONFIG FIREBASE =================
    const firebaseConfig = {
      apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
      authDomain: "atelier-electronique-mednine.firebaseapp.com",
      databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "atelier-electronique-mednine",
      storageBucket: "atelier-electronique-mednine.firebasestorage.app",
      messagingSenderId: "547430908384",
      appId: "1:547430908384:web:4caa4cf3869491bd14eb85"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const chatRef = db.ref('aem_live_chat');

    let currentUser = null;

    // ================= LOGIN GOOGLE =================
    function googleSignIn() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err => {
        console.error("Erreur connexion:", err);
        alert("Problème de connexion. Réessaie bro !");
      });
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('chatView').style.display = 'flex';
        listenToChat();
      } else {
        currentUser = null;
        document.getElementById('loginView').style.display = 'flex';
        document.getElementById('chatView').style.display = 'none';
      }
    });

    // ================= ENVOI MESSAGE =================
    function sendMessage() {
      if (!currentUser) return alert("Connecte-toi d'abord bro!");
      const text = document.getElementById('inputField').value.trim();
      if (!text) return;

      chatRef.push({
        text,
        uid: currentUser.uid,
        name: currentUser.displayName || currentUser.email?.split('@')[0] || 'Anonyme',
        photo: currentUser.photoURL || '',
        timestamp: firebase.database.ServerValue.TIMESTAMP
      });

      document.getElementById('inputField').value = '';
    }

    // ================= ÉCOUTE MESSAGES =================
    function listenToChat() {
      chatRef.orderByChild('timestamp').limitToLast(200).on('child_added', snap => {
        const msg = snap.val();
        const isOwn = msg.uid === currentUser?.uid;

        const item = document.createElement('div');
        item.className = `msg-item ${isOwn ? 'own' : ''}`;

        item.innerHTML = `
          <div class="avatar-container ${!msg.photo ? 'avatar-fallback' : ''}" 
               style="${msg.photo ? `background-image:url(${msg.photo})` : ''}">
            ${!msg.photo ? (msg.name?.charAt(0) || '?') : ''}
          </div>
          <div class="message-bubble ${isOwn ? 'own' : 'other'}">
            <div class="msg-meta">
              <span class="sender">${msg.name || 'Membre'}</span>
              <span class="timestamp">${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
            </div>
            ${msg.text}
          </div>
        `;

        document.getElementById('messages').appendChild(item);
        item.scrollIntoView({ behavior: 'smooth', block: 'end' });
      });
    }

    // ================= EVENTS =================
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('inputField').onkeypress = e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    };

    function toggleEmoji() {
      const picker = document.getElementById('emojiPicker');
      picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
      if (picker.style.display === 'block') document.getElementById('inputField').focus();
    }

    document.getElementById('emojiPicker').addEventListener('emoji-click', e => {
      const input = document.getElementById('inputField');
      const emoji = e.detail.unicode;
      const pos = input.selectionStart || input.value.length;
      input.value = input.value.substring(0, pos) + emoji + input.value.substring(pos);
      input.focus();
      input.setSelectionRange(pos + emoji.length, pos + emoji.length);
      document.getElementById('emojiPicker').style.display = 'none';
    });

    // ================= PREVIEW PHOTO LOCALE =================
    document.getElementById('fileInput').onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('previewThumb').src = ev.target.result;
        document.getElementById('previewZone').style.display = 'block';
        setTimeout(() => document.getElementById('previewZone').style.display = 'none', 10000);
      };
      reader.readAsDataURL(file);
    };
  </script>
</body>
</html>
