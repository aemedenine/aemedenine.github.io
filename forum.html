<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum Live 2026 | Atelier Électronique Médenine</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#020617,#0f172a,#020617);color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{padding:16px;text-align:center;font-size:24px;font-weight:600;background:rgba(2,6,23,0.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid rgba(56,189,248,0.2);}
.login{text-align:center;margin:80px auto;max-width:400px;}
.login button{background:linear-gradient(45deg,#38bdf8,#0ea5e9);border:none;padding:14px 40px;border-radius:50px;color:white;font-weight:600;cursor:pointer;box-shadow:0 4px 15px rgba(14,165,233,0.4);transition:all 0.3s;}
.login button:hover{transform:scale(1.05);}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:rgba(15,23,42,0.4);backdrop-filter:blur(8px);}
.message{display:flex;gap:12px;max-width:80%;background:rgba(30,41,59,0.7);backdrop-filter:blur(12px);padding:12px 16px;border-radius:18px;border:1px solid rgba(56,189,248,0.15);animation:fadeIn 0.4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(45deg,#38bdf8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-weight:bold;color:white;font-size:18px;box-shadow:0 2px 10px rgba(14,165,233,0.5);}
.text{flex:1;}
.text b{color:#38bdf8;font-size:14px;}
.text small{color:#94a3b8;font-size:11px;}
.me{margin-left:auto;background:linear-gradient(45deg,#38bdf8,#0ea5e9);color:#0f172a;border:none;}
.me .text b{color:#0f172a;}
.reactions{margin-top:6px;display:flex;gap:6px;}
.reaction{background:rgba(255,255,255,0.15);padding:4px 8px;border-radius:20px;font-size:14px;cursor:pointer;transition:0.2s;}
.reaction:hover{background:rgba(255,255,255,0.3);}
.typing{text-align:center;color:#38bdf8;font-style:italic;padding:10px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:0.6;}50%{opacity:1;}}
.status-dot{width:10px;height:10px;border-radius:50%;margin-left:6px;display:inline-block;}
.online{background:#22c55e;}
.offline{background:#ef4444;}
.chat-input{display:flex;padding:16px;background:rgba(2,6,23,0.9);backdrop-filter:blur(10px);border-top:1px solid rgba(56,189,248,0.2);}
.chat-input input{flex:1;padding:14px 20px;border:none;border-radius:30px;background:rgba(30,41,59,0.7);color:white;outline:none;font-size:16px;}
.chat-input button{margin-left:12px;padding:14px 28px;border:none;border-radius:30px;background:#38bdf8;color:white;cursor:pointer;font-weight:600;transition:0.3s;}
.chat-input button:hover{background:#0ea5e9;transform:scale(1.05);}
#chat::-webkit-scrollbar{width:6px;}
#chat::-webkit-scrollbar-thumb{background:#38bdf8;border-radius:3px;}
</style>
</head>
<body>
<header>💬 Forum Live 2026 – Atelier Électronique Médenine</header>

<div class="login">
  <button onclick="login()">🔐 Login avec Google</button>
</div>

<div id="chat"></div>

<div class="chat-input">
  <input id="msg" placeholder="Écris un message... 😏🔥" autocomplete="off">
  <button onclick="send()">Envoyer</button>
</div>

<!-- Firebase Compat -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// Config Firebase (mte3ek)
const firebaseConfig = {
  apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
  authDomain: "atelier-electronique-mednine.firebaseapp.com",
  projectId: "atelier-electronique-mednine",
  storageBucket: "atelier-electronique-mednine.firebasestorage.app",
  messagingSenderId: "547430908384",
  appId: "1:547430908384:web:4caa4cf3869491bd14eb85",
  databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let typingTimeout = null;

// Login
function login() {
  auth.signOut().then(() => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => console.error("Login error:", err));
  });
}

// Auth state
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.querySelector(".login").style.display = "none";
    document.querySelector("#chat").style.display = "flex";
    listenMessages();
    setPresence(true); // Online
    console.log("Connecté:", user.displayName);
  } else {
    currentUser = null;
    document.querySelector(".login").style.display = "block";
    setPresence(false);
  }
});

// Presence (online/offline)
function setPresence(online) {
  if (!currentUser) return;
  db.ref(`presence/${currentUser.uid}`).set({
    online: online,
    name: currentUser.displayName || "Anonyme",
    lastSeen: Date.now()
  });
}

// Typing indicator
const msgInput = document.getElementById("msg");
msgInput.addEventListener("input", () => {
  if (!currentUser) return;
  db.ref(`typing/${currentUser.uid}`).set(true);
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    db.ref(`typing/${currentUser.uid}`).remove();
  }, 2000);
});

// Listen typing
function listenTyping() {
  db.ref("typing").on("child_added", snap => {
    if (snap.key !== currentUser?.uid) {
      showTyping(snap.key);
    }
  });
  db.ref("typing").on("child_removed", snap => {
    removeTyping(snap.key);
  });
}

function showTyping(uid) {
  db.ref(`presence/${uid}`).once("value", snap => {
    const name = snap.val()?.name || "Quelqu'un";
    const typingDiv = document.createElement("div");
    typingDiv.id = `typing-${uid}`;
    typingDiv.className = "typing";
    typingDiv.innerHTML = `${name} est en train d'écrire... ✍️`;
    document.getElementById("chat").appendChild(typingDiv);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
  });
}

function removeTyping(uid) {
  const el = document.getElementById(`typing-${uid}`);
  if (el) el.remove();
}

// Send message
function send() {
  if (!currentUser) return alert("Login awla!");
  const text = msgInput.value.trim();
  if (!text) return;

  db.ref("messages").push({
    text,
    uid: currentUser.uid,
    name: currentUser.displayName || "Anonyme",
    photo: currentUser.photoURL || "",
    time: Date.now(),
    reactions: {} // Pour reactions ba3d
  });
  msgInput.value = "";
  db.ref(`typing/${currentUser.uid}`).remove();
}

// Listen messages
function listenMessages() {
  db.ref("messages").orderByChild("time").on("child_added", snap => {
    const msg = snap.val();
    const key = snap.key;
    const div = document.createElement("div");
    div.className = `message ${msg.uid === currentUser?.uid ? "me" : ""}`;
    div.id = `msg-${key}`;
    div.innerHTML = `
      <div class="avatar">${(msg.name || "?").charAt(0)}</div>
      <div class="text">
        <b>${msg.name || "Inconnu"} <span class="status-dot ${msg.uid === currentUser?.uid ? 'online' : ''}"></span></b>
        <small>${new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>
        <br>${msg.text}
        <div class="reactions" id="reac-${key}"></div>
      </div>
    `;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;

    // Add reaction listener (simple click to add ❤️ for now)
    div.addEventListener("dblclick", () => addReaction(key, "❤️"));
  });

  // Listen reactions
  db.ref("messages").on("child_changed", snap => {
    const msg = snap.val();
    const key = snap.key;
    const reacDiv = document.getElementById(`reac-${key}`);
    if (reacDiv) {
      reacDiv.innerHTML = Object.values(msg.reactions || {}).map(r => `<span class="reaction">${r}</span>`).join("");
    }
  });
}

function addReaction(msgKey, emoji) {
  if (!currentUser) return;
  db.ref(`messages/${msgKey}/reactions/${currentUser.uid}`).set(emoji);
}

// Enter to send
msgInput.addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});

// Init
listenTyping();

// Presence disconnect
window.addEventListener("beforeunload", () => {
  if (currentUser) setPresence(false);
});
</script>
</body>
</html>
