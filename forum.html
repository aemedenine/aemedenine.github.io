<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum Live 2026 | Atelier Électronique Médenine</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f1f5f9;
color:#0f172a;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

header{
background:white;
padding:16px;
text-align:center;
font-size:20px;
font-weight:600;
border-bottom:1px solid #e2e8f0;
}

/* LOGIN */

.login{
text-align:center;
margin:auto;
}

.login button{
background:#2563eb;
border:none;
padding:14px 30px;
border-radius:10px;
color:white;
font-weight:500;
cursor:pointer;
transition:0.2s;
}

.login button:hover{
background:#1d4ed8;
}

/* CHAT */

#chat{
flex:1;
display:flex;
flex-direction:column;
}

/* MESSAGES */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

/* MESSAGE */

.message{
display:flex;
gap:10px;
max-width:70%;
background:white;
padding:12px 16px;
border-radius:14px;
border:1px solid #e2e8f0;
}

.message.me{
margin-left:auto;
background:#2563eb;
color:white;
border:none;
}

/* AVATAR */

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#2563eb;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:14px;
}

/* TEXT */

.text{
font-size:14px;
line-height:1.4;
}

.text small{
font-size:11px;
color:#64748b;
margin-left:6px;
}

.message.me small{
color:#cbd5f5;
}

/* INPUT */

.chat-input{
display:flex;
gap:10px;
padding:12px;
background:white;
border-top:1px solid #e2e8f0;
}

.chat-input input{
flex:1;
padding:12px 14px;
border-radius:10px;
border:1px solid #cbd5e1;
outline:none;
}

.chat-input input:focus{
border-color:#2563eb;
}

/* BUTTONS */

.action-btn{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
background:#f1f5f9;
border-radius:8px;
cursor:pointer;
}

.action-btn:hover{
background:#e2e8f0;
}

#send-btn{
background:#2563eb;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}

#send-btn:hover{
background:#1d4ed8;
}

/* IMAGE PREVIEW */

#preview-img{
max-width:60px;
border-radius:8px;
}

/* MOBILE */

@media(max-width:768px){

.message{
max-width:85%;
}

.chat-input{
padding:10px;
}

}
</style>
</head>
<body>
<header>💬 Forum Live – AÉM</header>

<div class="login">
  <button onclick="login()">🔐 Login avec Google</button>
</div>

<div id="chat" style="display:none;">
  <div id="messages"></div>
</div>

<div class="chat-input">
  <input id="msg" placeholder="Écris un message... 😏🔥" autocomplete="off">
  <span class="action-btn emoji-btn" onclick="toggleEmojiPicker()">😊</span>
  <span class="action-btn photo-btn" onclick="document.getElementById('photo-input').click()">📷</span>
  <input type="file" id="photo-input" accept="image/*" style="display:none;">
  <div id="preview-container"><img id="preview-img" src="" alt="Prévisualisation"></div>
  <button id="send-btn">Envoyer</button>
</div>

<emoji-picker id="emoji-picker" skin-tone-emoji="👍"></emoji-picker>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script type="module">
  import 'https://cdn.jsdelivr.net/npm/emoji-picker-element@1.29.1/index.js';
</script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
  authDomain: "atelier-electronique-mednine.firebaseapp.com",
  projectId: "atelier-electronique-mednine",
  storageBucket: "atelier-electronique-mednine.firebasestorage.app",
  messagingSenderId: "547430908384",
  appId: "1:547430908384:web:4caa4cf3869491bd14eb85",
  databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

let currentUser = null;
let isSending = false;
let selectedImage = null;

// Login
function login() {
  auth.signOut().then(() => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => console.error("Login error:", err));
  });
}

// Auth state
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.querySelector(".login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    listenMessages();
  } else {
    currentUser = null;
    document.querySelector(".login").style.display = "block";
    document.getElementById("chat").style.display = "none";
  }
});

// Send message
function send() {
  if (!currentUser || isSending) return;
  isSending = true;

  const text = document.getElementById("msg").value.trim();
  if (!text && !selectedImage) {
    isSending = false;
    return;
  }

  const msgData = {
    text: text || "[Image]",
    uid: currentUser.uid,
    name: currentUser.displayName || "Anonyme",
    time: Date.now()
  };

  db.ref("messages").push(msgData).then(() => {
    document.getElementById("msg").value = "";
    selectedImage = null;
    document.getElementById("preview-container").style.display = "none";
  }).catch(err => {
    console.error("Erreur envoi:", err);
    alert("Erreur: " + err.message);
  }).finally(() => isSending = false);
}

// Listen messages
function listenMessages() {
  db.ref("messages").orderByChild("time").on("child_added", snap => {
    const msg = snap.val();
    const div = document.createElement("div");
    div.className = `message ${msg.uid === currentUser?.uid ? "me" : ""}`;
    div.innerHTML = `
      <div class="avatar">${(msg.name || "?").charAt(0)}</div>
      <div class="text">
        <b>${msg.name || "Inconnu"}</b> <small>${new Date(msg.time).toLocaleTimeString()}</small><br>
        ${msg.text}
      </div>
    `;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
  });
}

// Emoji insertion fix
function toggleEmojiPicker() {
  const picker = document.getElementById("emoji-picker");
  const isOpen = picker.style.display === "block";
  picker.style.display = isOpen ? "none" : "block";

  if (!isOpen) {
    msgInput.focus(); // Force focus when opening
  }
}

document.getElementById("emoji-picker").addEventListener("emoji-click", e => {
  const emoji = e.detail.unicode;
  const input = document.getElementById("msg");

  input.focus(); // Force focus before insert

  const start = input.selectionStart ?? input.value.length;
  const end = input.selectionEnd ?? input.value.length;

  input.value = input.value.substring(0, start) + emoji + input.value.substring(end);

  const newPos = start + emoji.length;
  input.setSelectionRange(newPos, newPos);

  document.getElementById("emoji-picker").style.display = "none"; // Hide after pick

  input.focus(); // Re-focus after
});

// Photo preview
document.getElementById("photo-input").addEventListener("change", e => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById("preview-img").src = ev.target.result;
      document.getElementById("preview-container").style.display = "block";
      selectedImage = true;
    };
    reader.readAsDataURL(file);
  }
});

// Events
document.getElementById("send-btn").addEventListener("click", send);
const msgInput = document.getElementById("msg");
msgInput.addEventListener("keypress", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>
</body>
</html>
