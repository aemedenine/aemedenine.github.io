<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Forum Live • Atelier Électronique Médenine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0f1a 0%, #0f172a 100%);
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 20px;
      background: rgba(2,6,23,0.97);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(56,189,248,0.15);
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #38bdf8;
      letter-spacing: 0.8px;
      z-index: 30;
      box-shadow: 0 4px 25px rgba(0,0,0,0.5);
    }

    .login-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 30px;
      text-align: center;
    }

    .login-title {
      font-size: 2.4rem;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 16px;
    }

    .login-subtitle {
      font-size: 1.15rem;
      color: #94a3b8;
      margin-bottom: 60px;
      max-width: 460px;
    }

    .google-login {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #ffffff;
      color: #111827;
      border: none;
      padding: 18px 56px;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      transition: all 0.4s ease;
    }

    .google-login img { width: 32px; height: 32px; }

    .google-login:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(56,189,248,0.6);
    }

    #chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .message-row {
      display: flex;
      gap: 16px;
      max-width: 88%;
      opacity: 0;
      transform: translateY(40px);
      animation: messageEnter 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .message-row.own { flex-direction: row-reverse; }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      flex-shrink: 0;
      background-size: cover;
      background-position: center;
      box-shadow: 0 6px 20px rgba(56,189,248,0.4);
    }

    .avatar-fallback {
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.3rem;
    }

    .bubble {
      padding: 14px 22px;
      border-radius: 26px;
      line-height: 1.52;
      font-size: 1.05rem;
      word-break: break-word;
    }

    .bubble.other {
      background: rgba(30,41,59,0.95);
      backdrop-filter: blur(12px);
      border-bottom-left-radius: 8px;
    }

    .bubble.own {
      background: linear-gradient(135deg, #38bdf8 0%, #60a5fa 100%);
      color: #0f172a;
      border-bottom-right-radius: 8px;
    }

    .bubble-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .sender-name {
      font-weight: 600;
      color: #38bdf8;
    }

    .msg-time {
      color: rgba(226,232,240,0.6);
    }

    .input-section {
      padding: 18px 24px;
      background: rgba(15,23,42,0.98);
      backdrop-filter: blur(28px);
      border-top: 1px solid rgba(56,189,248,0.16);
      z-index: 20;
    }

    .input-container {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(30,41,59,0.94);
      border-radius: 999px;
      padding: 12px 18px;
      box-shadow: inset 0 4px 16px rgba(0,0,0,0.5);
    }

    #message-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 1.08rem;
      padding: 10px 0;
    }

    #message-input::placeholder { color: #94a3b8; }

    .action-button {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(56,189,248,0.25);
      color: #38bdf8;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .action-button:hover { background: rgba(56,189,248,0.5); transform: scale(1.15); }

    #send-button {
      width: 54px;
      height: 54px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(45deg, #38bdf8, #0ea5e9);
      color: white;
      font-size: 1.65rem;
      cursor: pointer;
      box-shadow: 0 10px 35px rgba(14,165,233,0.6);
      transition: all 0.4s;
    }

    #send-button:hover { transform: scale(1.18); box-shadow: 0 16px 50px rgba(14,165,233,0.8); }

    @keyframes messageEnter {
      to { opacity: 1; transform: translateY(0); }
    }

    #messages::-webkit-scrollbar { width: 7px; }
    #messages::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 14px; }

    @media (max-width: 768px) {
      header { font-size: 1.4rem; padding: 14px; }
      .message-row { max-width: 95%; }
      .bubble { padding: 13px 20px; font-size: 1rem; }
      .avatar { width: 44px; height: 44px; }
      .input-container { padding: 11px 16px; }
      #message-input { font-size: 1.02rem; }
      .action-button { width: 46px; height: 46px; font-size: 1.4rem; }
      #send-button { width: 52px; height: 52px; font-size: 1.55rem; }
    }
  </style>
</head>
<body>

  <header>Forum Live • Atelier Électronique Médenine</header>

  <div class="login-screen" id="loginScreen">
    <div class="login-title">Bienvenue dans le forum live</div>
    <div class="login-subtitle">Connecte-toi pour participer aux discussions en direct avec l'équipe et les membres</div>
    <button class="google-login" onclick="signInWithGoogle()">
      <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
      Se connecter avec Google
    </button>
  </div>

  <div id="chatContainer" style="display:none;">
    <div id="messages"></div>

    <div class="input-section">
      <div class="input-container">
        <input id="msgInput" placeholder="Écris ton message..." autocomplete="off">
        <button class="action-button" onclick="toggleEmojiPicker()">😄</button>
        <button class="action-button" onclick="document.getElementById('photoInput').click()">📎</button>
        <input type="file" id="photoInput" accept="image/*" style="display:none;">
        <div id="previewBox" style="display:none;position:absolute;bottom:100px;left:30px;background:rgba(30,41,59,0.94);padding:12px;border-radius:16px;border:2px solid #38bdf8;box-shadow:0 10px 40px rgba(0,0,0,0.7);">
          <img id="previewImage" style="max-width:120px;border-radius:12px;">
        </div>
      </div>
      <button id="sendButton">➤</button>
    </div>

    <emoji-picker id="emojiPicker" style="display:none;position:absolute;bottom:120px;right:30px;z-index:100;width:100%;max-width:440px;height:460px;border-radius:28px;box-shadow:0 20px 70px rgba(0,0,0,0.8);"></emoji-picker>
  </div>

  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.29.1/index.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // ================= FIREBASE CONFIG =================
    const firebaseConfig = {
      apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
      authDomain: "atelier-electronique-mednine.firebaseapp.com",
      databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "atelier-electronique-mednine",
      storageBucket: "atelier-electronique-mednine.firebasestorage.app",
      messagingSenderId: "547430908384",
      appId: "1:547430908384:web:4caa4cf3869491bd14eb85"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const messagesRef = db.ref('aem_forum_chat');

    let currentUser = null;

    // ================= GOOGLE LOGIN =================
    function signInWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err => {
        console.error(err);
        alert("Erreur connexion. Réessaie bro !");
      });
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('chatContainer').style.display = 'flex';
        loadMessages();
      } else {
        currentUser = null;
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('chatContainer').style.display = 'none';
      }
    });

    // ================= SEND MESSAGE =================
    function sendMsg() {
      if (!currentUser) return alert("Connecte-toi d'abord !");
      const text = document.getElementById('msgInput').value.trim();
      if (!text) return;

      messagesRef.push({
        text,
        uid: currentUser.uid,
        name: currentUser.displayName || currentUser.email?.split('@')[0] || 'Anonyme',
        photo: currentUser.photoURL || '',
        timestamp: firebase.database.ServerValue.TIMESTAMP
      });

      document.getElementById('msgInput').value = '';
    }

    // ================= LOAD MESSAGES =================
    function loadMessages() {
      messagesRef.orderByChild('timestamp').limitToLast(250).on('child_added', snap => {
        const msg = snap.val();
        const isOwn = msg.uid === currentUser?.uid;

        const row = document.createElement('div');
        row.className = `message-row ${isOwn ? 'own' : ''}`;

        row.innerHTML = `
          <div class="avatar ${!msg.photo ? 'avatar-fallback' : ''}" 
               style="${msg.photo ? `background-image:url(${msg.photo})` : ''}">
            ${!msg.photo ? (msg.name?.charAt(0) || '?') : ''}
          </div>
          <div class="bubble ${isOwn ? 'own' : 'other'}">
            <div class="bubble-header">
              <span class="sender-name">${msg.name || 'Membre'}</span>
              <span class="msg-time">${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
            </div>
            ${msg.text}
          </div>
        `;

        document.getElementById('messages').appendChild(row);
        row.scrollIntoView({ behavior: 'smooth', block: 'end' });
      });
    }

    // ================= EVENT LISTENERS =================
    document.getElementById('sendButton').onclick = sendMsg;
    document.getElementById('msgInput').onkeypress = e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
      }
    };

    function toggleEmojiPicker() {
      const picker = document.getElementById('emojiPicker');
      picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
      if (picker.style.display === 'block') document.getElementById('msgInput').focus();
    }

    document.getElementById('emojiPicker').addEventListener('emoji-click', e => {
      const input = document.getElementById('msgInput');
      const emoji = e.detail.unicode;
      const pos = input.selectionStart || input.value.length;
      input.value = input.value.substring(0, pos) + emoji + input.value.substring(pos);
      input.focus();
      input.setSelectionRange(pos + emoji.length, pos + emoji.length);
      document.getElementById('emojiPicker').style.display = 'none';
    });

    // ================= PHOTO PREVIEW LOCAL =================
    document.getElementById('photoInput').onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('previewImage').src = ev.target.result;
        document.getElementById('previewBox').style.display = 'block';
        setTimeout(() => document.getElementById('previewBox').style.display = 'none', 12000);
      };
      reader.readAsDataURL(file);
    };
  </script>
</body>
</html>
