<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcul Puissance | Atelier Électronique Médenine</title>
  <link rel="icon" href="images/favicon.webp">
  <link rel="stylesheet" href="css/style.css">  <!-- ton CSS commun -->

  <style>
    /* Style spécifique page puissance – adapté au style global glassy/futuristic */
    .calc-power {
      padding: 120px 8% 100px;
      max-width: 1100px;
      margin: auto;
    }
    .calc-power h2 {
      font-size: 40px;
      text-align: center;
      margin-bottom: 60px;
      color: #38bdf8;
    }
    .power-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 35px;
    }
    .power-box {
      background: rgba(30,41,59,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(56,189,248,0.18);
      border-radius: 16px;
      padding: 35px 30px;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }
    .power-box:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(56,189,248,0.4);
      border-color: #38bdf8;
    }
    .power-box h3 {
      color: #38bdf8;
      font-size: 24px;
      margin-bottom: 25px;
      text-align: center;
    }
    .power-box label {
      display: block;
      text-align: left;
      margin: 15px 0 8px;
      font-weight: 500;
      color: #cbd5f5;
    }
    .power-box input {
      width: 100%;
      padding: 14px 16px;
      font-size: 17px;
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: white;
      transition: border-color 0.3s;
    }
    .power-box input:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }
    .power-box button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: linear-gradient(90deg, #0ea5e9, #38bdf8);
      background-size: 200% 100%;
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.35s;
      animation: gradientFlow 5s linear infinite;
    }
    .power-box button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(56,189,248,0.5);
    }
    .result {
      margin-top: 25px;
      font-size: 21px;
      font-weight: 600;
      color: #a5b4fc;
      text-align: center;
      min-height: 32px;
    }

    @media (max-width: 768px) {
      .calc-power { padding: 90px 6% 70px; }
      .calc-power h2 { font-size: 32px; }
      .power-grid { gap: 25px; }
    }
  </style>
</head>
<body>

<!-- ================= HEADER (exactement kif index.html) ================= -->

</header>

<!-- Profile Modal -->
<div id="profileModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); align-items:center;justify-content:center;z-index:1000;">
  <div style="background:#1e293b; padding:24px; border-radius:16px; max-width:420px; width:90%; text-align:center;">
    <img id="profileAvatar" src="" width="90" height="90" style="border-radius:50%; margin-bottom:16px; border:3px solid #38bdf8;">

</div>

<!-- Login Popup -->
<div id="login-popup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); flex-direction:column; justify-content:center; align-items:center; z-index:9999;">

    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/google.svg" alt="Google" style="width:24px;height:24px;">
    Se connecter avec Google

<!-- Online Users Mini Box -->
<div id="onlineBox">
  <div class="online-header">Online:</div>
  <div class="online-users-mini" id="onlineMini"></div>

<!-- ================= CALCUL PUISSANCE ================= -->
<section class="calc-power">
  <h2>Calcul Puissance Électrique</h2>
  
  <div class="power-grid">

    <!-- Puissance DC -->
    <div class="power-box">
      <h3>Courant Continu (DC)</h3>
      <label>Tension (U en Volts):</label>
      <input type="number" id="voltageDC" placeholder="Ex: 12" step="any">
      <label>Intensité (I en Ampères):</label>
      <input type="number" id="currentDC" placeholder="Ex: 2" step="any">
      <button onclick="calcDC()">Calculer Puissance</button>
      <div class="result" id="resultDC">Puissance : —</div>
    </div>

    <!-- Puissance AC -->
    <div class="power-box">
      <h3>Courant Alternatif (AC) – Puissance Active</h3>
      <label>Tension (U en Volts):</label>
      <input type="number" id="voltageAC" placeholder="Ex: 230" step="any">
      <label>Intensité (I en Ampères):</label>
      <input type="number" id="currentAC" placeholder="Ex: 5" step="any">
      <label>Facteur de puissance (cos φ) :</label>
      <input type="number" step="0.01" id="cosPhi" placeholder="Ex: 0.85" min="0" max="1">
      <button onclick="calcAC()">Calculer Puissance</button>
      <div class="result" id="resultAC">Puissance active : —</div>
    </div>

  </div>
</section>

<!-- ================= CALCUL PUISSANCE JS ================= -->
<script>
function calcDC() {
  const U = parseFloat(document.getElementById("voltageDC").value);
  const I = parseFloat(document.getElementById("currentDC").value);
  
  if (isNaN(U) || isNaN(I) || U <= 0 || I <= 0) {
    document.getElementById("resultDC").innerText = "Entrez des valeurs positives valides";
    return;
  }
  
  const P = U * I;
  document.getElementById("resultDC").innerText = `Puissance : ${P.toFixed(2)} W`;
}

function calcAC() {
  const U = parseFloat(document.getElementById("voltageAC").value);
  const I = parseFloat(document.getElementById("currentAC").value);
  const cosPhi = parseFloat(document.getElementById("cosPhi").value);
  
  if (isNaN(U) || isNaN(I) || isNaN(cosPhi) || U <= 0 || I <= 0 || cosPhi < 0 || cosPhi > 1) {
    document.getElementById("resultAC").innerText = "Entrez des valeurs valides (cos φ entre 0 et 1)";
    return;
  }
  
  const P = U * I * cosPhi;
  document.getElementById("resultAC").innerText = `Puissance active : ${P.toFixed(2)} W`;
}
</script>

</body>
