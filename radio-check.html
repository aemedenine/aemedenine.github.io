<!-- ================= SCRIPT PAGE CODE TROUVÉ ================= -->
<script>
  // Récupération du précode depuis l'URL
  const params = new URLSearchParams(window.location.search);
  const precode = params.get("precode") || "—";
  document.getElementById("serial").textContent = precode;

  // Envoi via WhatsApp
  document.getElementById("email-form").addEventListener("submit", function(e) {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    
    if (!email || !email.includes("@")) {
      alert("Veuillez entrer une adresse e-mail valide");
      return;
    }

    const message = `Demande Code Radio\nPrécode: ${precode}\nEmail: ${email}\nPrix: 10DT`;
    const url = `https://wa.me/21698192103?text=${encodeURIComponent(message)}`;
    window.location.href = url;
  });
</script>
