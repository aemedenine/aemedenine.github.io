<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Atelier</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #070710; /* theme-color */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: #00f0ff;
      text-align: center;
    }

    #offline-content {
      animation: fadeIn 1s ease-in-out;
    }

    #offline-content img {
      width: 150px;
      height: 150px;
      margin-bottom: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="offline-content">
    <img src="icons/icon-512.png" alt="Atelier Logo">
    <h1>📴 Pas de connexion</h1>
    <p>Vérifiez votre connexion internet et réessayez.</p>
  </div>
</body>
</html>
