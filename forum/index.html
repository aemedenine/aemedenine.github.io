<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Forum & tchat électronique gratuit"/>
<title>Atelier Électronique ⚡</title>

<style>
:root{
  --bg:#070710;
  --card:rgba(20,20,40,0.7);
  --primary:#00ffe0;
  --accent:#ff3c6a;
  --text:#e6faff;
  --gray:#8aa0b3;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',sans-serif;
  background: radial-gradient(circle at top, #0b0b1a, #050509);
  color:var(--text);
  min-height:100vh;
}

/* container */
#container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* HEADER */
header{
  text-align:center;
  padding:50px 0 20px;
}

h1{
  font-size:3rem;
  color:var(--primary);
  text-shadow:0 0 25px rgba(0,255,224,0.6);
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px #00ffe0;}
  to{ text-shadow:0 0 25px #00ffe0;}
}

header p{
  color:var(--gray);
  margin-top:10px;
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
  margin:30px 0;
}

nav a{
  color:var(--primary);
  padding:10px 18px;
  border-radius:8px;
  text-decoration:none;
  transition:.3s;
}

nav a:hover{
  background:rgba(0,255,224,0.1);
  color:#fff;
}

/* CARD */
.card{
  background:var(--card);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:16px;
  padding:25px;
  margin:25px 0;
  box-shadow:0 10px 40px rgba(0,0,0,0.8);
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1}
}

.card h2{
  color:var(--primary);
  margin-bottom:15px;
}

/* FORM */
.form-row{
  display:flex;
  gap:10px;
  margin:15px 0;
  flex-wrap:wrap;
}

.form-row label{
  min-width:120px;
  color:var(--gray);
}

input, select{
  flex:1;
  padding:12px;
  border-radius:8px;
  border:1px solid #333;
  background:#0c0c1a;
  color:white;
  outline:none;
  transition:.3s;
}

input:focus, select:focus{
  border-color:var(--primary);
  box-shadow:0 0 10px rgba(0,255,224,0.3);
}

/* BUTTON */
button.big{
  display:block;
  margin:30px auto;
  padding:16px 60px;
  font-size:1.2rem;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(45deg,#00ffe0,#00c3ff);
  color:black;
  font-weight:bold;
  transition:.3s;
}

button.big:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 10px 30px rgba(0,255,224,0.5);
}

/* ERROR */
.error{
  text-align:center;
  color:var(--accent);
  font-weight:bold;
  margin-top:10px;
}

/* FOOTER */
footer{
  text-align:center;
  margin-top:40px;
  color:var(--gray);
}

/* MOBILE */
@media(max-width:700px){
  h1{font-size:2.2rem}
  .form-row{flex-direction:column}
}
</style>
</head>

<body>

<div id="container">

<header>
  <h1>⚡ Atelier Électronique</h1>
  <p>Réparation • DIY • Forum mondial</p>
</header>

<nav>
  <a href="index.html">Accueil</a>
  <a href="#">Forum</a>
  <a href="projets.html">Projets</a>
  <a href="pannes.html">Pannes</a>
</nav>

<div class="card">
  <h2>Bienvenue 👋</h2>
  <p>Entre dans l’atelier et partage tes projets électroniques ⚡</p>
</div>

<div class="card">
  <h2>Connexion rapide</h2>

  <div id="error" class="error"></div>

  <div class="form-row">
    <label>Pseudo :</label>
    <input type="text" id="nick" placeholder="SMD_Sniper42">
  </div>

  <div class="form-row">
    <label>Niveau :</label>
    <select id="niveau">
      <option value="">Choisir</option>
      <option value="debutant">Débutant</option>
      <option value="moyen">Moyen</option>
      <option value="pro">Pro</option>
    </select>
  </div>

  <div style="text-align:center;margin-top:15px;">
    <label><input type="checkbox" id="cgu"> J'accepte</label>
  </div>

  <button class="big" id="enter-btn">ENTRER ⚡</button>
</div>

<footer>© 2026 Atelier Électronique</footer>

</div>

<!-- FIREBASE MODULE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, signInAnonymously, updateProfile } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getDatabase, ref, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
  authDomain: "atelier-electronique-mednine.firebaseapp.com",
  databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "atelier-electronique-mednine",
  storageBucket: "atelier-electronique-mednine.firebasestorage.app",
  messagingSenderId: "547430908384",
  appId: "1:547430908384:web:4caa4cf3869491bd14eb85"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const btn = document.getElementById("enter-btn");
const errorEl = document.getElementById("error");

btn.onclick = async () => {

  const nick = document.getElementById("nick").value.trim();
  const niveau = document.getElementById("niveau").value;
  const cgu = document.getElementById("cgu").checked;

  if(!nick) return errorEl.textContent="Pseudo obligatoire";
  if(nick.length<3) return errorEl.textContent="Min 3 caractères";
  if(!niveau) return errorEl.textContent="Choisir niveau";
  if(!cgu) return errorEl.textContent="Accepte les règles";

  try{
    let user = auth.currentUser;

    if(!user){
      const cred = await signInAnonymously(auth);
      user = cred.user;
    }

    await set(ref(db,"users/"+user.uid),{
      nick,
      niveau,
      createdAt: serverTimestamp()
    });

    await updateProfile(user,{displayName:nick});

    window.location.href="atelier.html";

  }catch(err){
    console.error(err);
    errorEl.textContent="Erreur: "+err.message;
  }
};

</script>

</body>
</html>
