<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atelier – Discussion en direct ⚡</title>
  <style>
    :root { --bg:#0a0a12; --primary:#00ffea; --card:#111122; --text:#e0f0ff; --gray:#8899aa; --accent:#ff3366; }
    body { font-family: 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); margin:0; padding:0; min-height:100vh; }
    #container { max-width:1200px; margin:0 auto; padding:20px; }
    header { text-align:center; padding:30px 0; }
    h1 { color:var(--primary); }
    #user-info { color:var(--primary); font-weight:bold; margin:10px 0; }
    #chat-area { background:#0d0d1a; border:1px solid #222244; border-radius:10px; padding:20px; min-height:400px; max-height:500px; overflow-y:auto; margin:20px 0; }
    .message { margin:12px 0; padding:10px; border-radius:8px; max-width:80%; word-break:break-word; }
    .message.sent { background:var(--primary); color:black; margin-left:auto; }
    .message.received { background:var(--card); }
    .message img { max-width:220px; border-radius:8px; margin-top:8px; display:block; }
    #input-area { display:flex; gap:10px; flex-wrap:wrap; }
    #message-input { flex:1; padding:12px; border:1px solid #333; border-radius:8px; background:#111; color:white; font-size:1rem; min-width:200px; }
    button { background:var(--primary); color:black; border:none; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:bold; }
    button:hover { background:#00e0cc; }
    #image-btn { background:var(--accent); }
    footer { text-align:center; padding:40px; color:var(--gray); }
  </style>
</head>
<body>
<div id="container">
  <header>
    <h1>Atelier Électronique – En direct ⚡</h1>
    <div id="user-info">Chargement...</div>
  </header>

  <section id="chat-area"></section>

  <div id="input-area">
    <input type="text" id="message-input" placeholder="Tape ton message... (emojis 😎🔧 OK)" />
    <input type="file" id="image-input" accept="image/*" style="display:none;" />
    <button id="image-btn">📷 Photo</button>
    <button id="send-btn">Envoyer ⚡</button>
  </div>

  <footer>Atelier Électronique – Tunis & le monde entier</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
  import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
    authDomain: "atelier-electronique-mednine.firebaseapp.com",
    projectId: "atelier-electronique-mednine",
    storageBucket: "atelier-electronique-mednine.firebasestorage.app",
    messagingSenderId: "547430908384",
    appId: "1:547430908384:web:4caa4cf3869491bd14eb85",
    databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);
  const auth = getAuth(app);

  const params = new URLSearchParams(window.location.search);
  const nick = params.get("nick") || "Anonyme";

  document.getElementById("user-info").innerHTML = `Connecté en tant que <strong>${nick}</strong>`;

  const messagesRef = ref(db, 'messages/atelier-general');
  const chatArea = document.getElementById('chat-area');
  const messageInput = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const imageInput = document.getElementById('image-input');
  const imageBtn = document.getElementById('image-btn');

  let currentUser = null;
  let authReady = false;

  // Auth anonymous
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      authReady = true;
      console.log("Auth OK - UID:", user.uid);
      document.getElementById("user-info").innerHTML += " (connecté)";
    } else {
      signInAnonymously(auth).catch(err => {
        console.error("Sign-in error:", err);
        alert("Connexion échouée: " + err.message);
      });
    }
  });

  // Affichage messages
  onChildAdded(messagesRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message');
    msgDiv.classList.add(data.uid === currentUser?.uid ? 'sent' : 'received');

    msgDiv.innerHTML = `<strong>${data.name || data.nick || 'Anonyme'}</strong> <small>(${new Date(data.time || Date.now()).toLocaleTimeString()})</small><br>${(data.text || '').replace(/\n/g, '<br>')}`;

    if (data.imageUrl) {
      const img = document.createElement('img');
      img.src = data.imageUrl;
      msgDiv.appendChild(img);
    }

    chatArea.appendChild(msgDiv);
    chatArea.scrollTop = chatArea.scrollHeight;
  });

  // Send text
  function sendMessage() {
    const text = messageInput.value.trim();
    if (!text || !authReady || !currentUser) {
      alert("Attends connexion ou tape un message valide");
      return;
    }

    push(messagesRef, {
      text,
      uid: currentUser.uid,
      name: nick,
      time: serverTimestamp()
    })
    .then(() => messageInput.value = '')
    .catch(err => {
      console.error("Push error:", err);
      alert("Erreur envoi: " + err.message);
    });
  }

  sendBtn.addEventListener('click', sendMessage);
  messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

  // Photo upload
  imageBtn.addEventListener('click', () => imageInput.click());
  imageInput.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file || !authReady || !currentUser) return alert("Attends connexion");

    try {
      const path = `chat-images/${Date.now()}_${file.name}`;
      const fileRef = storageRef(storage, path);
      const snap = await uploadBytes(fileRef, file);
      const imageUrl = await getDownloadURL(snap.ref);

      push(messagesRef, {
        text: messageInput.value.trim() || "Photo 📸",
        uid: currentUser.uid,
        name: nick,
        time: serverTimestamp(),
        imageUrl
      });

      messageInput.value = '';
      imageInput.value = '';
    } catch (err) {
      console.error("Upload error:", err);
      alert("Erreur photo: " + err.message);
    }
  });
</script>
</body>
</html>
