<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atelier – Discussion en direct ⚡</title>
<style>
  :root{
  --bg:#070710;
  --card:rgba(20,20,40,0.7);
  --primary:#00ffe0;
  --accent:#ff3c6a;
  --text:#e6faff;
  --gray:#8aa0b3;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',sans-serif;
  background: radial-gradient(circle at top, #0b0b1a, #050509);
  color:var(--text);
  min-height:100vh;
  font-size:15px;
}

/* container */
#container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* HEADER */
header{
  text-align:center;
  padding:40px 0 15px;
}

h1{
  font-size:2.5rem;
  color:var(--primary);
  text-shadow:0 0 25px rgba(0,255,224,0.6);
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px #00ffe0;}
  to{ text-shadow:0 0 25px #00ffe0;}
}

#user-info{
  color:var(--gray);
  margin-top:5px;
  font-size:0.9rem;
}

/* SALONS */
.salons{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap:15px;
  margin:25px 0;
}

.salon-card{
  background:var(--card);
  backdrop-filter: blur(10px);
  border-radius:14px;
  padding:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  transition:.3s;
}

.salon-card:hover{
  transform:translateY(-5px);
}

.salon-card h3{
  color:var(--primary);
  font-size:1.1rem;
  margin-bottom:5px;
}

.salon-card p{
  color:var(--gray);
  font-size:0.9rem;
}

.salon-card small{
  font-size:0.75rem;
  color:#aaa;
}

/* CHAT CARD */
#chat-section{
  background:var(--card);
  backdrop-filter: blur(10px);
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.8);
}

#chat-section h2{
  color:var(--primary);
  margin-bottom:15px;
}

/* MESSAGES */
#messages{
  max-height:50vh;
  overflow-y:auto;
  padding-right:5px;
  margin-bottom:15px;
  font-size:0.95rem;
}

.message{
  margin:8px 0;
  padding:10px 14px;
  border-radius:10px;
  background:rgba(0,255,224,0.06);
  border-left:4px solid var(--primary);
  animation:fadeIn .4s ease;
}

.message strong{
  color:var(--primary);
  font-size:0.95rem;
}

.message img{
  max-width:200px;
  border-radius:8px;
  margin-top:6px;
}

/* INPUT AREA */
.input-area{
  display:flex;
  gap:8px;
  align-items:stretch;
}

#message-input{
  flex:3;

  border-radius:10px;
  border:1px solid #333;
  background:#0c0c1a;
  color:white;
  font-size:0.9rem;
  min-height:20px;
}

/* BUTTONS */
.chat-btn{
  flex: 0.4; /* أصغر شوية */
  padding: 4px 4px;
  font-size: 1.6rem;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:.2s;
  height:40px; /* يولي نفس الارتفاع */
}
 
.chat-btn:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 5px 20px rgba(0,255,224,0.4);
}

#send-btn{
  background:linear-gradient(45deg,#00ffe0,#00c3ff);
  color:black;
  font-weight:bold;
}

.image-btn{
  background:linear-gradient(45deg,#ff3c6a,#ff9500);
}

/* ERROR */
#error{
  color:var(--accent);
  margin-bottom:10px;
  font-weight:bold;
  text-align:center;
}

/* FOOTER */
footer{
  text-align:center;
  margin-top:30px;
  color:var(--gray);
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}

/* MOBILE */
@media(max-width:700px){
  h1{font-size:2rem}

  .input-area{
    flex-direction:column;
  }

  #message-input{
    width:100%;
  }

  .chat-btn{
    width:100%;
  }
}
  </style>
</head>
<body>
<div id="container">
  <header>
    <h1>AÉM – En direct ⚡</h1>
    <div id="user-info">Chargement...</div>
  </header>

  <section class="salons">
    <div class="salon-card"><h3>#atelier-general</h3><p>Bienvenue, intros, entraide</p><small>~35 connectés</small></div>
    <div class="salon-card"><h3>#reparation-pannes</h3><p>Photos cartes, diagnostic</p><small>~120 connectés</small></div>
    <div class="salon-card"><h3>#projets-diy</h3><p>Montre tes montages</p><small>~85 connectés</small></div>
  </section>

  <section id="chat-section">
    <h2>Zone de discussion ⚡</h2>
    <div id="error"></div>
    <div id="messages">
      <div style="text-align:center; color:#666; padding:20px; font-size:0.9rem;">Chargement des messages...</div>
    </div>
    <div class="input-area">
      <textarea id="message-input" placeholder="Message... (emojis + images)"></textarea>
      <button id="image-btn" class="chat-btn image-btn" title="Image">📎</button>
      <input type="file" id="image-upload" accept="image/*" style="display:none;">
     <button id="send-btn" class="chat-btn">⚡</button>
    </div>
  </section>

  <footer>Atelier Électronique Médenine © 2026</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, signInAnonymously, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
  import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
    authDomain: "atelier-electronique-mednine.firebaseapp.com",
    databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "atelier-electronique-mednine",
    storageBucket: "atelier-electronique-mednine.firebasestorage.app",
    messagingSenderId: "547430908384",
    appId: "1:547430908384:web:4caa4cf3869491bd14eb85"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  const userInfo = document.getElementById("user-info");
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("message-input");
  const sendBtn = document.getElementById("send-btn");
  const imageBtn = document.getElementById("image-btn");
  const imageInput = document.getElementById("image-upload");
  const errorEl = document.getElementById("error");
  let currentUser = null;

  const params = new URLSearchParams(window.location.search);
  const urlNick = params.get("nick") || "Anonyme";
  const urlNiveau = params.get("niveau") || "?";

  userInfo.innerHTML = `Connecté en tant que <strong>${urlNick}</strong> (${urlNiveau})`;

  async function ensureLoggedIn() {
    if (auth.currentUser) {
      currentUser = auth.currentUser;
      console.log("Déjà connecté :", currentUser.uid);
      return currentUser;
    }
    try {
      const cred = await signInAnonymously(auth);
      currentUser = cred.user;
      console.log("Connexion anonyme OK :", currentUser.uid);
      if (urlNick !== "Anonyme") {
        await updateProfile(currentUser, { displayName: urlNick });
      }
      return currentUser;
    } catch (err) {
      console.error("Erreur connexion :", err);
      errorEl.textContent = "Connexion impossible : " + err.message;
      throw err;
    }
  }

  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      errorEl.textContent = "";
    } else {
      errorEl.textContent = "Déconnecté – recharge la page";
    }
  });

  imageBtn.onclick = () => imageInput.click();

  imageInput.onchange = async () => {
    const file = imageInput.files[0];
    if (!file || !file.type.startsWith("image/")) {
      errorEl.textContent = "Choisis une image valide";
      return;
    }
    errorEl.textContent = "Upload en cours...";
    try {
      await ensureLoggedIn();
      const fileName = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
      const storRef = storageRef(storage, `chat-images/${fileName}`);
      await uploadBytes(storRef, file);
      const url = await getDownloadURL(storRef);

      const msgRef = push(ref(db, "messages"));
      await set(msgRef, {
        text: inputEl.value.trim() || "📸 Image",
        name: currentUser?.displayName || urlNick,
        niveau: urlNiveau,
        uid: currentUser?.uid,
        time: Date.now(),
        image: url
      });

      inputEl.value = "";
      imageInput.value = "";
      errorEl.textContent = "";
    } catch (err) {
      console.error("Erreur image :", err);
      errorEl.textContent = "Échec image : " + err.message;
    }
  };

  sendBtn.onclick = async () => {
    const text = inputEl.value.trim();
    if (!text) {
      errorEl.textContent = "Écris un message !";
      return;
    }
    try {
      await ensureLoggedIn();
      const msgRef = push(ref(db, "messages"));
      await set(msgRef, {
        text,
        name: currentUser?.displayName || urlNick,
        niveau: urlNiveau,
        uid: currentUser?.uid,
        time: Date.now(),
        image: null
      });
      inputEl.value = "";
      errorEl.textContent = "";
    } catch (err) {
      console.error("Erreur envoi :", err);
      errorEl.textContent = "Erreur envoi : " + err.message;
    }
  };

  inputEl.addEventListener("keypress", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  // ─── Affichage messages ───────────────────────────────────────
  onValue(ref(db, "messages"), snap => {
    console.log("[DEBUG] Messages reçus - exists:", snap.exists(), "count:", snap.size || 0);

    messagesEl.innerHTML = "";

    if (!snap.exists() || snap.size === 0) {
      messagesEl.innerHTML = '<div style="text-align:center; color:#888; padding:40px;">Aucun message pour le moment...</div>';
      return;
    }

    const messages = [];
    snap.forEach(child => {
      messages.push(child.val());
    });

    messages.sort((a, b) => (a.time || 0) - (b.time || 0));

    messages.forEach(msg => {
      const div = document.createElement("div");
      div.className = "message";

      const niveau = msg.niveau && msg.niveau !== "?" ? `(${msg.niveau}) ` : "";
      let safeText = (msg.text || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      safeText = safeText.replace(/(https?:\/\/[^\s<]+)/gi, '<a href="$1" target="_blank">$1</a>');
      safeText = safeText.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, m => `<span class="emoji">${m}</span>`);

      let html = `<strong>${niveau}${msg.name || "Anonyme"} :</strong> ${safeText}`;
      if (msg.image) html += `<br><img src="${msg.image}" alt="image" loading="lazy">`;

      div.innerHTML = html;
      messagesEl.appendChild(div);
    });

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }, err => {
    console.error("ERREUR LISTENER :", err);
    messagesEl.innerHTML = `<div style="color:#ff3c6a; text-align:center; padding:40px;">
      Erreur Firebase : ${err.message}<br>
      (souvent → permission read refusée)
    </div>`;
  });

  // Lancement
  ensureLoggedIn().catch(() => {});
</script>
</body>
</html>
