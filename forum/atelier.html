<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atelier – Discussion en direct ⚡</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body {
      background: linear-gradient(135deg, #020617, #0f172a, #020617);
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 16px;
      text-align: center;
      font-size: 22px;
      background: #020617;
      border-bottom: 1px solid #38bdf8;
    }
    .login {
      text-align: center;
      margin: 80px auto;
    }
    .login button {
      padding: 14px 40px;
      border: none;
      border-radius: 50px;
      background: #38bdf8;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      display: flex;
      gap: 10px;
      max-width: 80%;
      background: #1e293b;
      padding: 10px 14px;
      border-radius: 15px;
      word-break: break-word;
    }
    .me {
      margin-left: auto;
      background: #38bdf8;
      color: #020617;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .avatar-letter {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #64748b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 18px;
      flex-shrink: 0;
    }
    .text b {
      color: #38bdf8;
      font-size: 13px;
    }
    .me .text b {
      color: #020617;
    }
    .chat-input {
      display: flex;
      align-items: center;
      padding: 10px;
      background: #020617;
      gap: 8px;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 999px;
      background: #1e293b;
      color: white;
      font-size: 15px;
    }
    .emoji-btn, .photo-btn {
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
    }
    .chat-input button {
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      background: #38bdf8;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .message img {
      max-width: 220px;
      border-radius: 10px;
      margin-top: 6px;
      display: block;
    }
    #preview-container {
      margin: 8px 0;
      max-width: 220px;
    }
    #preview-img {
      max-width: 100%;
      border-radius: 10px;
      border: 2px solid #38bdf8;
    }
    #emoji-picker {
      position: absolute;
      bottom: 70px;
      right: 20px;
      z-index: 100;
      display: none;
    }
  </style>
  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
</head>
<body>
<div id="container">
  <header>
    <h1>AÉM – En direct ⚡</h1>
    <div id="user-info">Chargement...</div>
  </header>

  <section class="salons">
    <div class="salon-card"><h3>#atelier-general</h3><p>Bienvenue, intros, entraide</p><small>~35 connectés</small></div>
    <div class="salon-card"><h3>#reparation-pannes</h3><p>Photos cartes, diagnostic</p><small>~120 connectés</small></div>
    <div class="salon-card"><h3>#projets-diy</h3><p>Montre tes montages</p><small>~85 connectés</small></div>
  </section>

  <section id="chat-section">
    <h2>Zone de discussion ⚡</h2>
    <div id="error"></div>
    <div id="messages">
      <div style="text-align:center; color:#666; padding:20px; font-size:0.9rem;">Chargement des messages...</div>
    </div>
    <div class="input-area">
      <textarea id="message-input" placeholder="Message... (emojis + images)"></textarea>
      <button id="emoji-btn" class="chat-btn emoji-btn" title="Emojis">😊</button>
      <button id="image-btn" class="chat-btn image-btn" title="Image">📎</button>
      <input type="file" id="image-upload" accept="image/*" style="display:none;">
      <button id="send-btn" class="chat-btn">ENVOYER ⚡</button>
    </div>
    <emoji-picker id="emoji-picker"></emoji-picker>
  </section>

  <footer>Atelier Électronique Médenine © 2026</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, signInAnonymously, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
  import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
    authDomain: "atelier-electronique-mednine.firebaseapp.com",
    databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "atelier-electronique-mednine",
    storageBucket: "atelier-electronique-mednine.firebasestorage.app",
    messagingSenderId: "547430908384",
    appId: "1:547430908384:web:4caa4cf3869491bd14eb85"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  const userInfo = document.getElementById("user-info");
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("message-input");
  const sendBtn = document.getElementById("send-btn");
  const emojiBtn = document.getElementById("emoji-btn");
  const imageBtn = document.getElementById("image-btn");
  const imageInput = document.getElementById("image-upload");
  const errorEl = document.getElementById("error");
  const emojiPicker = document.getElementById("emoji-picker");

  let currentUser = null;

  const params = new URLSearchParams(window.location.search);
  const urlNick = params.get("nick") || "Anonyme";
  const urlNiveau = params.get("niveau") || "?";

  userInfo.innerHTML = `Connecté en tant que <strong>${urlNick}</strong> (${urlNiveau})`;

  async function ensureLoggedIn() {
    if (auth.currentUser) {
      currentUser = auth.currentUser;
      console.log("Déjà connecté :", currentUser.uid);
      return currentUser;
    }
    try {
      const cred = await signInAnonymously(auth);
      currentUser = cred.user;
      console.log("Connexion anonyme OK :", currentUser.uid);
      if (urlNick !== "Anonyme") {
        await updateProfile(currentUser, { displayName: urlNick });
      }
      return currentUser;
    } catch (err) {
      console.error("Erreur connexion :", err);
      errorEl.textContent = "Connexion impossible : " + err.message;
      throw err;
    }
  }

  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      errorEl.textContent = "";
    } else {
      errorEl.textContent = "Déconnecté – recharge la page";
    }
  });

  emojiBtn.onclick = () => {
    emojiPicker.style.display = emojiPicker.style.display === "block" ? "none" : "block";
  };

  emojiPicker.addEventListener("emoji-click", e => {
    const emoji = e.detail.unicode;
    const start = inputEl.selectionStart;
    inputEl.value = inputEl.value.substring(0, start) + emoji + inputEl.value.substring(inputEl.selectionEnd);
    inputEl.selectionStart = inputEl.selectionEnd = start + emoji.length;
    inputEl.focus();
  });

  imageBtn.onclick = () => imageInput.click();

  imageInput.onchange = async () => {
    const file = imageInput.files[0];
    if (!file || !file.type.startsWith("image/")) {
      errorEl.textContent = "Choisis une image valide";
      return;
    }
    errorEl.textContent = "Upload en cours...";
    try {
      await ensureLoggedIn();
      const fileName = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
      const storRef = storageRef(storage, `chat-images/${fileName}`);
      await uploadBytes(storRef, file);
      const url = await getDownloadURL(storRef);

      const msgRef = push(ref(db, "messages"));
      await set(msgRef, {
        text: inputEl.value.trim() || "📸 Image",
        name: currentUser?.displayName || urlNick,
        niveau: urlNiveau,
        uid: currentUser?.uid,
        time: Date.now(),
        image: url
      });

      inputEl.value = "";
      imageInput.value = "";
      errorEl.textContent = "";
    } catch (err) {
      console.error("Erreur image :", err);
      errorEl.textContent = "Échec image : " + err.message;
    }
  };

  sendBtn.onclick = async () => {
    const text = inputEl.value.trim();
    if (!text) {
      errorEl.textContent = "Écris un message !";
      return;
    }
    try {
      await ensureLoggedIn();
      const msgRef = push(ref(db, "messages"));
      await set(msgRef, {
        text,
        name: currentUser?.displayName || urlNick,
        niveau: urlNiveau,
        uid: currentUser?.uid,
        time: Date.now(),
        image: null
      });
      inputEl.value = "";
      errorEl.textContent = "";
    } catch (err) {
      console.error("Erreur envoi :", err);
      errorEl.textContent = "Erreur envoi : " + err.message;
    }
  };

  inputEl.addEventListener("keypress", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  // ─── Affichage messages ───────────────────────────────────────
  onValue(ref(db, "messages"), snap => {
    console.log("[DEBUG] Messages reçus - exists:", snap.exists(), "count:", snap.size || 0);

    messagesEl.innerHTML = "";

    if (!snap.exists() || snap.size === 0) {
      messagesEl.innerHTML = '<div style="text-align:center; color:#888; padding:40px;">Aucun message pour le moment...</div>';
      return;
    }

    const messages = [];
    snap.forEach(child => {
      messages.push(child.val());
    });

    messages.sort((a, b) => (a.time || 0) - (b.time || 0));

    messages.forEach(msg => {
      const div = document.createElement("div");
      div.className = "message";

      const niveau = msg.niveau && msg.niveau !== "?" ? `(${msg.niveau}) ` : "";
      let safeText = (msg.text || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      safeText = safeText.replace(/(https?:\/\/[^\s<]+)/gi, '<a href="$1" target="_blank">$1</a>');
      safeText = safeText.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, m => `<span class="emoji">${m}</span>`);

      let html = `<strong>${niveau}${msg.name || "Anonyme"} :</strong> ${safeText}`;
      if (msg.image) html += `<br><img src="${msg.image}" alt="image" loading="lazy">`;

      div.innerHTML = html;
      messagesEl.appendChild(div);
    });

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }, err => {
    console.error("ERREUR LISTENER :", err);
    messagesEl.innerHTML = `<div style="color:#ff3c6a; text-align:center; padding:40px;">
      Erreur Firebase : ${err.message}<br>
      (souvent → permission read refusée)
    </div>`;
  });

  // Lancement
  ensureLoggedIn().catch(() => {});
</script>
</body>
</html>
