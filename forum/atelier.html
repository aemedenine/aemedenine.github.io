<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atelier – Discussion en direct ⚡</title>
  <style>
    :root {
      --bg: #070710;
      --card: rgba(20,20,40,0.65);
      --primary: #00ffe0;
      --accent: #ff3c6a;
      --text: #e6faff;
      --gray: #8aa0b3;
      --glow: rgba(0,255,224,0.5);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;               /* encore plus petit global */
      line-height: 1.4;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(0,255,224,0.07) 0%, transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(255,60,106,0.05) 0%, transparent 35%);
    }
    #container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 12px;
    }
    header {
      text-align: center;
      padding: 25px 0 15px;
    }
    h1 {
      font-size: 1.95rem;           /* plus petit */
      color: var(--primary);
      text-shadow: 0 0 20px var(--glow);
      margin-bottom: 0.3em;
    }
    #user-info {
      font-size: 0.95rem;
      font-weight: bold;
    }
    .salons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    .salon-card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,255,224,0.1);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .salon-card h3 {
      font-size: 1.1rem;
      margin-bottom: 6px;
    }
    .salon-card p {
      font-size: 0.85rem;
      margin-bottom: 6px;
    }
    .salon-card small {
      font-size: 0.78rem;
    }
    #chat-section {
      background: rgba(15,15,35,0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,255,224,0.1);
      border-radius: 12px;
      padding: 14px;
      margin: 20px 0;
    }
    #chat-section h2 {
      font-size: 1.35rem;
      margin-bottom: 12px;
    }
    #messages {
      max-height: 45vh;
      min-height: 180px;
      overflow-y: auto;
      margin-bottom: 12px;
      padding-right: 4px;
    }
    .message {
      margin: 6px 0;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(0,255,224,0.06);
      border-left: 3px solid var(--primary);
      font-size: 0.92rem;
      line-height: 1.35;
    }
    .message strong {
      font-size: 0.95rem;
    }
   /* Améliorations mobile pour input chat */
.input-area {
  display: flex;
  flex-wrap: wrap;          /* les boutons descendent si pas assez de place */
  gap: 8px;                 /* + d'espace entre éléments */
  align-items: stretch;     /* tout aligné en bas */
  margin-top: 10px;
}

#message-input {
  flex: 1 1 100%;           /* prend toute la largeur dispo */
  min-height: 52px;         /* plus haut de base → plus confortable */
  max-height: 140px;        /* limite la hauteur max pour pas bouffer l'écran */
  font-size: 16px;          /* ≥16px = pas de zoom auto sur iOS */
  padding: 12px 14px;       /* plus de padding intérieur */
  line-height: 1.4;
  border-radius: 12px;
  border: 1.5px solid rgba(0,255,224,0.25);
  background: rgba(10,10,25,0.85);
}

.chat-btn {
  padding: 12px 16px;       /* boutons plus gros → facile à toucher */
  font-size: 1rem;          /* texte plus lisible */
  min-width: 52px;          /* minimum touch target ~48-52px */
  min-height: 52px;         /* hauteur aussi */
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
}

#send-btn {
  background: linear-gradient(45deg, #00ffe0, #00c3ff);
  color: #000;
  font-weight: bold;
  flex: 1;                  /* le bouton ENVOYER prend plus de place */
  max-width: 140px;
}

.emoji-btn, .image-btn {
  flex: 0 0 auto;
}

/* Mobile first – on force les améliorations en dessous de 600px */
@media (max-width: 600px) {
  .input-area {
    flex-direction: column;   /* tout stacké verticalement sur petit écran */
    gap: 10px;
  }

  #message-input {
    min-height: 60px;         /* encore + haut sur mobile */
    font-size: 16px;
  }

  .chat-btn {
    width: 100%;              /* boutons full width sur mobile */
    padding: 14px;
    font-size: 1.05rem;
  }

  #send-btn {
    max-width: none;          /* enlève la limite */
  }

  emoji-picker {
    width: 100% !important;
    left: 0 !important;
    right: auto !important;
    bottom: 70px !important;  /* un peu plus haut pour pas cacher input */
  }
}
  </style>
  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
</head>
<body>
<div id="container">
  <header>
    <h1>AÉM – En direct ⚡</h1>
    <div id="user-info">Chargement...</div>
  </header>

  <section class="salons">
    <div class="salon-card"><h3>#atelier-general</h3><p>Bienvenue, intros, entraide</p><small>~35 connectés</small></div>
    <div class="salon-card"><h3>#reparation-pannes</h3><p>Photos cartes, diagnostic</p><small>~120 connectés</small></div>
    <div class="salon-card"><h3>#projets-diy</h3><p>Montre tes montages</p><small>~85 connectés</small></div>
  </section>

  <section id="chat-section">
    <h2>Zone de discussion ⚡</h2>
    <div id="error"></div>
    <div id="messages">
      <div style="text-align:center; color:#666; padding:20px; font-size:0.9rem;">Chargement...</div>
    </div>

    <div class="input-area">
  <textarea 
    id="message-input" 
    placeholder="Écris ton message... (Enter pour envoyer)" 
    rows="2"></textarea>

  <div style="display:flex; gap:8px; width:100%; justify-content:space-between;">
    <button id="emoji-btn" class="chat-btn emoji-btn" title="Emojis 😊" aria-label="Ouvrir emojis">😊</button>
    <button id="image-btn" class="chat-btn image-btn" title="Ajouter une image 📎" aria-label="Uploader image">📎</button>
    <button id="send-btn" class="chat-btn">ENVOYER ⚡</button>
  </div>

  <input type="file" id="image-upload" accept="image/*" style="display:none;">
  <emoji-picker id="emoji-picker"></emoji-picker>
</div>
  </section>

  <footer>Atelier Électronique Médenine © 2026</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, signInAnonymously, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
  import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
    authDomain: "atelier-electronique-mednine.firebaseapp.com",
    databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "atelier-electronique-mednine",
    storageBucket: "atelier-electronique-mednine.firebasestorage.app",
    messagingSenderId: "547430908384",
    appId: "1:547430908384:web:4caa4cf3869491bd14eb85"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  const userInfo = document.getElementById("user-info");
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("message-input");
  const sendBtn = document.getElementById("send-btn");
  const emojiBtn = document.getElementById("emoji-btn");
  const imageBtn = document.getElementById("image-btn");
  const imageInput = document.getElementById("image-upload");
  const errorEl = document.getElementById("error");
  const emojiPicker = document.getElementById("emoji-picker");

  let currentUser = null;

  const params = new URLSearchParams(window.location.search);
  const urlNick = params.get("nick") || "Anonyme";
  const urlNiveau = params.get("niveau") || "?";

  userInfo.innerHTML = `Connecté en tant que <strong>${urlNick}</strong> (${urlNiveau})`;

  async function ensureLoggedIn() {
    if (auth.currentUser) {
      currentUser = auth.currentUser;
      console.log("Déjà connecté :", currentUser.uid);
      return;
    }
    try {
      const cred = await signInAnonymously(auth);
      currentUser = cred.user;
      console.log("Connexion anonyme réussie :", currentUser.uid);
      if (urlNick !== "Anonyme") {
        await updateProfile(currentUser, { displayName: urlNick });
      }
    } catch (err) {
      console.error("Erreur login anonyme :", err.code, err.message);
      errorEl.textContent = "Connexion impossible : " + (err.message || err.code);
    }
  }

  // Suivi état auth (très utile pour debug)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      console.log("Auth state changed → utilisateur connecté :", user.uid);
      errorEl.textContent = ""; // clear si OK
    } else {
      console.log("Pas d'utilisateur connecté");
      errorEl.textContent = "Pas connecté – recharge la page";
    }
  });

  emojiBtn.onclick = () => {
    emojiPicker.style.display = emojiPicker.style.display === "block" ? "none" : "block";
  };

  emojiPicker.addEventListener("emoji-click", event => {
    const emoji = event.detail.unicode;
    const start = inputEl.selectionStart;
    const end = inputEl.selectionEnd;
    inputEl.value = inputEl.value.substring(0, start) + emoji + inputEl.value.substring(end);
    inputEl.selectionStart = inputEl.selectionEnd = start + emoji.length;
    inputEl.focus();
  });

  imageBtn.onclick = () => imageInput.click();

  imageInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file || !file.type.startsWith("image/")) {
      errorEl.textContent = "Sélectionne une image valide !";
      return;
    }
    errorEl.textContent = "Upload en cours... ⏳";
    try {
      await ensureLoggedIn();
      const fileName = `${Date.now()}_${file.name}`;
      const storRef = storageRef(storage, `chat-images/${fileName}`);
      await uploadBytes(storRef, file);
      const url = await getDownloadURL(storRef);

      const msgRef = push(ref(db, "messages"));
      await set(msgRef, {
        text: inputEl.value.trim() || "📸 Image partagée",
        name: currentUser.displayName || urlNick,
        niveau: urlNiveau,
        uid: currentUser.uid,
        time: Date.now(),
        image: url
      });
      inputEl.value = "";
      errorEl.textContent = "";
      imageInput.value = "";
    } catch (err) {
      console.error("Erreur upload :", err);
      errorEl.textContent = "Erreur upload : " + (err.message || "Vérifie règles Storage");
    }
  };

  sendBtn.onclick = async () => {
    const text = inputEl.value.trim();
    if (!text) return errorEl.textContent = "Écris quelque chose !";
    try {
      await ensureLoggedIn();
      const msgRef = push(ref(db, "messages"));
      await set(msgRef, {
        text,
        name: currentUser.displayName || urlNick,
        niveau: urlNiveau,
        uid: currentUser.uid,
        time: Date.now(),
        image: null
      });
      inputEl.value = "";
      errorEl.textContent = "";
    } catch (err) {
      console.error("Erreur envoi :", err);
      errorEl.textContent = "Erreur envoi : " + (err.message || "Vérifie règles Database");
    }
  };

  // Listener messages avec debug renforcé
  onValue(ref(db, "messages"), (snap) => {
    console.log("[DEBUG] onValue appelé | exists:", snap.exists(), "| size:", snap.size || 0);

    messagesEl.innerHTML = "";

    if (!snap.exists() || snap.size === 0) {
      messagesEl.innerHTML = '<div style="text-align:center; color:#888; padding:30px; font-size:1.1rem;">Aucun message visible... (base vide ou permission read refusée ?)</div>';
      console.log("[DEBUG] Pas de données → vérifie règles read ou si messages écrits");
      return;
    }

    const msgs = [];
    snap.forEach(child => {
      const msg = child.val();
      console.log("[DEBUG] Message reçu :", msg);
      msgs.push(msg);
    });

    msgs.sort((a,b) => (a.time || 0) - (b.time || 0));

    msgs.forEach(msg => {
      const el = document.createElement("div");
      el.className = "message";
      const niveauTag = msg.niveau && msg.niveau !== "?" ? `(${msg.niveau}) ` : "";
      let safeText = (msg.text || "").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      safeText = safeText.replace(/(https?:\/\/[^\s<]+)/gi, '<a href="$1" target="_blank">$1</a>');
      safeText = safeText.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, m => `<span class="emoji">${m}</span>`);
      let content = `<strong>${niveauTag}${msg.name || "Anonyme"} :</strong> ${safeText || ""}`;
      if (msg.image) content += `<br><img src="${msg.image}" alt="image" loading="lazy">`;
      el.innerHTML = content;
      messagesEl.appendChild(el);
    });

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }, (err) => {
    console.error("[ERREUR LISTENER] :", err.code, err.message);
    errorEl.textContent = "Problème grave chat : " + (err.message || "Permission refusée ?");
    messagesEl.innerHTML = `<div style="color:#ff3c6a; text-align:center; padding:30px;">Erreur Firebase : ${err.message || "Permission read refusée"}<br>Vérifie règles Database !</div>`;
  });

  inputEl.addEventListener("keypress", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  // Démarrage
  ensureLoggedIn();
</script>
</body>
</html>
