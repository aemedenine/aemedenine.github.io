<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>اتيليي – شات مباشر ⚡</title>
  <style>
    :root {
      --bg: #05050f;
      --card: rgba(18,18,38,0.7);
      --primary: #00ffcc;
      --accent: #ff3366;
      --text: #f0faff;
      --gray: #88a0b5;
      --glow: rgba(0,255,204,0.45);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overscroll-behavior: none;
      touch-action: manipulation;
    }
    #container {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px;
    }
    header {
      text-align: center;
      padding: 28px 0 16px;
    }
    h1 {
      font-size: clamp(1.8rem, 6vw, 2.4rem);
      color: var(--primary);
      text-shadow: 0 0 20px var(--glow);
      margin-bottom: 0.5em;
      animation: pulse 3s infinite alternate;
    }
    @keyframes pulse {
      from { opacity: 0.92; }
      to   { opacity: 1; }
    }
    #user-info {
      font-size: 1.1rem;
      color: var(--primary);
      text-shadow: 0 0 10px var(--glow);
    }
    #chat-section {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,255,204,0.15);
      border-radius: 16px;
      padding: 16px;
      margin: 16px 0 80px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    #messages {
      max-height: 55vh;
      overflow-y: auto;
      padding-right: 6px;
      margin-bottom: 16px;
      scroll-behavior: smooth;
    }
    .message {
      margin: 12px 0;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(0,255,204,0.07);
      border-right: 4px solid var(--primary); /* rtl */
      line-height: 1.45;
      font-size: 1.05rem;
    }
    .message strong {
      color: var(--primary);
    }
    .message img {
      max-width: 100%;
      border-radius: 10px;
      margin: 8px 0 4px;
      box-shadow: 0 4px 16px #0008;
      display: block;
    }
    .input-zone {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      background: rgba(10,10,25,0.92);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,255,204,0.18);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }
    #message-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid rgba(0,255,204,0.25);
      background: rgba(20,20,40,0.7);
      color: white;
      font-size: 1.05rem;
      outline: none;
    }
    #message-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,255,204,0.3);
    }
    .action-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,255,204,0.15);
      color: var(--primary);
      transition: all 0.2s;
    }
    .action-btn:hover, .action-btn:active {
      background: var(--primary);
      color: #000;
      transform: scale(1.08);
    }
    #send-btn {
      background: linear-gradient(45deg, #00ffcc, #00aaff);
      color: black;
      font-weight: bold;
      font-size: 1rem;
      padding: 0 24px;
      border-radius: 50px;
      width: auto;
      height: 48px;
    }
    #send-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    #error {
      color: var(--accent);
      text-align: center;
      margin: 8px 0;
      font-size: 0.95rem;
    }
    @media (max-width: 500px) {
      .input-zone { padding: 10px 12px; gap: 10px; }
      #message-input { font-size: 1rem; padding: 10px 14px; }
      .action-btn { width: 44px; height: 44px; font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div id="container">
  <header>
    <h1>اتيليي الكترونيك – شات مباشر ⚡</h1>
    <div id="user-info">جاي نحمل...</div>
  </header>

  <section id="chat-section">
    <div id="error"></div>
    <div id="messages"></div>
  </section>
</div>

<div class="input-zone">
  <input type="text" id="message-input" placeholder="صورة + كلمتين / إيموجي فقط ..." />

  <button id="emoji-btn" class="action-btn" title="إيموجي">😄</button>

  <label for="image-upload" class="action-btn" title="صورة">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15L16 10l-5 5-3-3-5 5"/>
    </svg>
  </label>
  <input type="file" id="image-upload" accept="image/*" style="display:none;">

  <button id="send-btn" disabled>ارسل ⚡</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, signInAnonymously, updateProfile } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
    authDomain: "atelier-electronique-mednine.firebaseapp.com",
    databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "atelier-electronique-mednine",
    storageBucket: "atelier-electronique-mednine.firebasestorage.app",
    messagingSenderId: "547430908384",
    appId: "1:547430908384:web:4caa4cf3869491bd14eb85"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const userInfo = document.getElementById("user-info");
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("message-input");
  const sendBtn = document.getElementById("send-btn");
  const errorEl = document.getElementById("error");
  const emojiBtn = document.getElementById("emoji-btn");
  const imageInput = document.getElementById("image-upload");

  let currentUser = null;

  const params = new URLSearchParams(window.location.search);
  const nick = params.get("nick") || "زائر";
  const niveau = params.get("niveau") || "";

  userInfo.innerHTML = `متصل بإسم <strong>${nick}</strong> ${niveau ? `(${niveau})` : ""}`;

  async function login() {
    if (!auth.currentUser) {
      const cred = await signInAnonymously(auth);
      currentUser = cred.user;
      if (nick !== "زائر") await updateProfile(currentUser, { displayName: nick });
    } else {
      currentUser = auth.currentUser;
    }
  }

  function canSend() {
    const hasImage = !!imageInput.files?.[0];
    const hasText  = inputEl.value.trim().length > 0;
    sendBtn.disabled = !hasImage;
    sendBtn.textContent = hasImage ? "ارسل الصورة ⚡" : "ارسل ⚡";
  }

  inputEl.addEventListener("input", canSend);
  imageInput.addEventListener("change", canSend);

  sendBtn.onclick = async () => {
    const file = imageInput.files?.[0];
    if (!file) {
      errorEl.textContent = "لازم صورة يا خويا !";
      return;
    }

    errorEl.textContent = "جاي نحمل الصورة...";
    sendBtn.disabled = true;

    const reader = new FileReader();
    reader.onload = async () => {
      try {
        await login();
        const msgRef = push(ref(db, "messages"));
        await set(msgRef, {
          type: "image",
          image: reader.result,
          text: inputEl.value.trim() || null,
          name: currentUser.displayName || nick,
          niveau,
          uid: currentUser.uid,
          time: Date.now()
        });

        inputEl.value = "";
        imageInput.value = "";
        errorEl.textContent = "";
        canSend();
      } catch (err) {
        errorEl.textContent = "فماكش: " + err.message;
        console.error(err);
      }
    };
    reader.readAsDataURL(file);
  };

  emojiBtn.onclick = () => {
    const emoji = prompt("حط إيموجي هنا", "🔥💡🛠️");
    if (emoji && emoji.trim()) {
      inputEl.value += emoji + " ";
      inputEl.focus();
      canSend();
    }
  };

  // Affichage messages
  onValue(ref(db, "messages"), snap => {
    messagesEl.innerHTML = "";
    const msgs = [];
    snap.forEach(c => msgs.push(c.val()));
    msgs.sort((a,b) => a.time - b.time);

    msgs.forEach(msg => {
      const div = document.createElement("div");
      div.className = "message";
      let html = `<strong>${msg.name}${msg.niveau ? ` (${msg.niveau})` : ""} :</strong> `;

      if (msg.type === "image" && msg.image) {
        html += `<img src="${msg.image}" alt="صورة">`;
        if (msg.text) html += `<br><span style="opacity:0.9">${msg.text}</span>`;
      } else {
        html += msg.text || "";
      }

      div.innerHTML = html;
      messagesEl.appendChild(div);
    });

    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
</script>
</body>
</html>
