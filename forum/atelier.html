<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atelier – Discussion en direct ⚡</title>
  <style>
:root {
  --bg: #070710;
  --card: rgba(20,20,40,0.65);
  --primary: #00ffe0;
  --accent: #ff3c6a;
  --text: #e6faff;
  --gray: #8aa0b3;
  --glow: rgba(0,255,224,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.4;
  background-image: 
    radial-gradient(circle at 15% 50%, rgba(0,255,224,0.07) 0%, transparent 25%),
    radial-gradient(circle at 85% 30%, rgba(255,60,106,0.05) 0%, transparent 35%);
}

#container { max-width: 1000px; margin: 0 auto; padding: 12px; }

header { text-align: center; padding: 25px 0 15px; }
h1 { font-size: 1.95rem; color: var(--primary); text-shadow: 0 0 20px var(--glow); margin-bottom: 0.3em; }
#user-info { font-size: 0.95rem; font-weight: bold; }

.salons { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin: 20px 0; }
.salon-card {
  background: var(--card);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0,255,224,0.1);
  border-radius: 12px;
  padding: 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.salon-card h3 { font-size: 1.1rem; margin-bottom: 6px; }
.salon-card p { font-size: 0.85rem; margin-bottom: 6px; }
.salon-card small { font-size: 0.78rem; }

#chat-section {
  background: rgba(15,15,35,0.7);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0,255,224,0.1);
  border-radius: 12px;
  padding: 14px;
  margin: 20px 0;
}
#chat-section h2 { font-size: 1.35rem; margin-bottom: 12px; }

#messages { max-height: 45vh; min-height: 180px; overflow-y: auto; margin-bottom: 12px; padding-right: 4px; }

.message {
  margin: 6px 0;
  padding: 8px 12px;
  border-radius: 8px;
  background: rgba(0,255,224,0.06);
  border-left: 3px solid var(--primary);
  font-size: 0.92rem;
  line-height: 1.35;
}
.message strong { font-size: 0.95rem; }
.message img { max-width: 220px; max-height: 260px; border-radius: 8px; margin-top: 5px; }
.emoji { font-size: 1.3em; }

.input-area { display: flex; gap: 6px; align-items: flex-end; }
#message-input {
  flex: 1;
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px solid rgba(0,255,224,0.18);
  background: rgba(10,10,25,0.75);
  color: white;
  font-size: 0.94rem;
  min-height: 42px;
  resize: vertical;
}
.chat-btn {
  padding: 9px 14px;
  border-radius: 8px;
  font-weight: bold;
  font-size: 0.88rem;
  min-width: 42px;
  cursor: pointer;
  transition: all 0.2s;
}
.chat-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,255,224,0.3); }

#send-btn { background: linear-gradient(45deg, #00ffe0, #00c3ff); color: black; }
.emoji-btn { background: linear-gradient(45deg, #ffdd57, #ff9500); }
.image-btn { background: linear-gradient(45deg, #ff3c6a, #ff9500); }

#error { font-size: 0.9rem; margin: 6px 0; min-height: 1.2em; color: #ff6b6b; }

footer { padding: 30px 12px 20px; font-size: 0.78rem; text-align: center; }

emoji-picker { bottom: 65px; right: 12px; width: 280px; height: 340px; display: none; }

/* ================= MOBILE ADJUSTMENTS ================= */
@media (max-width: 600px) {
  body { font-size: 13.5px; }
  h1 { font-size: 1.75rem; }
  #messages { max-height: 50vh; }
  emoji-picker { width: 100%; height: 320px; right: 0; left: 0; bottom: 60px; }

  /* === Chat form long textarea + same row buttons === */
  .input-area {
    flex-direction: row;
    gap: 4px;
    align-items: center;
  }
  #message-input {
    flex: 1;
    font-size: 0.92rem;
    min-height: 50px;      /* textarea أطول */
    max-height: 120px;     /* حد أقصى عند الكتابة الطويلة */
    padding: 8px 10px;
    border-radius: 6px;
  }
  .chat-btn {
    padding: 6px 10px;
    font-size: 0.84rem;
    min-width: 40px;
    border-radius: 6px;
  }
  #send-btn { padding: 6px 12px; }
  .emoji-btn, .image-btn { padding: 6px 10px; font-size: 0.84rem; }
}
</style>
  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
</head>
<body>
<div id="container">
  <header>
    <h1>AÉM – En direct ⚡</h1>
    <div id="user-info">Chargement...</div>
  </header>

  <section class="salons">
    <div class="salon-card"><h3>#atelier-general</h3><p>Bienvenue, intros, entraide</p><small>~35 connectés</small></div>
    <div class="salon-card"><h3>#reparation-pannes</h3><p>Photos cartes, diagnostic</p><small>~120 connectés</small></div>
    <div class="salon-card"><h3>#projets-diy</h3><p>Montre tes montages</p><small>~85 connectés</small></div>
  </section>

  <section id="chat-section">
    <h2>Zone de discussion ⚡</h2>
    <div id="error"></div>
    <div id="messages">
      <div style="text-align:center; color:#666; padding:20px; font-size:0.9rem;">Chargement des messages...</div>
    </div>
    <div class="input-area">
      <textarea id="message-input" placeholder="Message... (emojis + images)"></textarea>
      <button id="emoji-btn" class="chat-btn emoji-btn" title="Emojis">😊</button>
      <button id="image-btn" class="chat-btn image-btn" title="Image">📎</button>
      <input type="file" id="image-upload" accept="image/*" style="display:none;">
      <button id="send-btn" class="chat-btn">ENVOYER ⚡</button>
    </div>
    <emoji-picker id="emoji-picker"></emoji-picker>
  </section>

  <footer>Atelier Électronique Médenine © 2026</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, signInAnonymously, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
  import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
    authDomain: "atelier-electronique-mednine.firebaseapp.com",
    databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "atelier-electronique-mednine",
    storageBucket: "atelier-electronique-mednine.firebasestorage.app",
    messagingSenderId: "547430908384",
    appId: "1:547430908384:web:4caa4cf3869491bd14eb85"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  const userInfo = document.getElementById("user-info");
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("message-input");
  const sendBtn = document.getElementById("send-btn");
  const emojiBtn = document.getElementById("emoji-btn");
  const imageBtn = document.getElementById("image-btn");
  const imageInput = document.getElementById("image-upload");
  const errorEl = document.getElementById("error");
  const emojiPicker = document.getElementById("emoji-picker");

  let currentUser = null;

  const params = new URLSearchParams(window.location.search);
  const urlNick = params.get("nick") || "Anonyme";
  const urlNiveau = params.get("niveau") || "?";

  userInfo.innerHTML = `Connecté en tant que <strong>${urlNick}</strong> (${urlNiveau})`;

  async function ensureLoggedIn() {
    if (auth.currentUser) {
      currentUser = auth.currentUser;
      console.log("Déjà connecté :", currentUser.uid);
      return currentUser;
    }
    try {
      const cred = await signInAnonymously(auth);
      currentUser = cred.user;
      console.log("Connexion anonyme OK :", currentUser.uid);
      if (urlNick !== "Anonyme") {
        await updateProfile(currentUser, { displayName: urlNick });
      }
      return currentUser;
    } catch (err) {
      console.error("Erreur connexion :", err);
      errorEl.textContent = "Connexion impossible : " + err.message;
      throw err;
    }
  }

  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      errorEl.textContent = "";
    } else {
      errorEl.textContent = "Déconnecté – recharge la page";
    }
  });

  emojiBtn.onclick = () => {
    emojiPicker.style.display = emojiPicker.style.display === "block" ? "none" : "block";
  };

  emojiPicker.addEventListener("emoji-click", e => {
    const emoji = e.detail.unicode;
    const start = inputEl.selectionStart;
    inputEl.value = inputEl.value.substring(0, start) + emoji + inputEl.value.substring(inputEl.selectionEnd);
    inputEl.selectionStart = inputEl.selectionEnd = start + emoji.length;
    inputEl.focus();
  });

  imageBtn.onclick = () => imageInput.click();

  imageInput.onchange = async () => {
    const file = imageInput.files[0];
    if (!file || !file.type.startsWith("image/")) {
      errorEl.textContent = "Choisis une image valide";
      return;
    }
    errorEl.textContent = "Upload en cours...";
    try {
      await ensureLoggedIn();
      const fileName = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
      const storRef = storageRef(storage, `chat-images/${fileName}`);
      await uploadBytes(storRef, file);
      const url = await getDownloadURL(storRef);

      const msgRef = push(ref(db, "messages"));
      await set(msgRef, {
        text: inputEl.value.trim() || "📸 Image",
        name: currentUser?.displayName || urlNick,
        niveau: urlNiveau,
        uid: currentUser?.uid,
        time: Date.now(),
        image: url
      });

      inputEl.value = "";
      imageInput.value = "";
      errorEl.textContent = "";
    } catch (err) {
      console.error("Erreur image :", err);
      errorEl.textContent = "Échec image : " + err.message;
    }
  };

  sendBtn.onclick = async () => {
    const text = inputEl.value.trim();
    if (!text) {
      errorEl.textContent = "Écris un message !";
      return;
    }
    try {
      await ensureLoggedIn();
      const msgRef = push(ref(db, "messages"));
      await set(msgRef, {
        text,
        name: currentUser?.displayName || urlNick,
        niveau: urlNiveau,
        uid: currentUser?.uid,
        time: Date.now(),
        image: null
      });
      inputEl.value = "";
      errorEl.textContent = "";
    } catch (err) {
      console.error("Erreur envoi :", err);
      errorEl.textContent = "Erreur envoi : " + err.message;
    }
  };

  inputEl.addEventListener("keypress", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  // ─── Affichage messages ───────────────────────────────────────
  onValue(ref(db, "messages"), snap => {
    console.log("[DEBUG] Messages reçus - exists:", snap.exists(), "count:", snap.size || 0);

    messagesEl.innerHTML = "";

    if (!snap.exists() || snap.size === 0) {
      messagesEl.innerHTML = '<div style="text-align:center; color:#888; padding:40px;">Aucun message pour le moment...</div>';
      return;
    }

    const messages = [];
    snap.forEach(child => {
      messages.push(child.val());
    });

    messages.sort((a, b) => (a.time || 0) - (b.time || 0));

    messages.forEach(msg => {
      const div = document.createElement("div");
      div.className = "message";

      const niveau = msg.niveau && msg.niveau !== "?" ? `(${msg.niveau}) ` : "";
      let safeText = (msg.text || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      safeText = safeText.replace(/(https?:\/\/[^\s<]+)/gi, '<a href="$1" target="_blank">$1</a>');
      safeText = safeText.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, m => `<span class="emoji">${m}</span>`);

      let html = `<strong>${niveau}${msg.name || "Anonyme"} :</strong> ${safeText}`;
      if (msg.image) html += `<br><img src="${msg.image}" alt="image" loading="lazy">`;

      div.innerHTML = html;
      messagesEl.appendChild(div);
    });

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }, err => {
    console.error("ERREUR LISTENER :", err);
    messagesEl.innerHTML = `<div style="color:#ff3c6a; text-align:center; padding:40px;">
      Erreur Firebase : ${err.message}<br>
      (souvent → permission read refusée)
    </div>`;
  });

  // Lancement
  ensureLoggedIn().catch(() => {});
</script>
</body>
</html>
