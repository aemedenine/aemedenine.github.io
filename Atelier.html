<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atelier Électronique – Chat 2026 ⚡</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.29.1/index.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#020617,#0f172a,#020617);color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{padding:16px;text-align:center;font-size:22px;background:#020617;border-bottom:1px solid #38bdf8;}
.login{text-align:center;margin:80px auto;}
.login button{padding:14px 40px;border:none;border-radius:50px;background:#38bdf8;color:white;cursor:pointer;}
#chat{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px;}
.message{display:flex;gap:10px;max-width:80%;background:#1e293b;padding:10px;border-radius:15px;}
.me{margin-left:auto;background:#38bdf8;color:#020617;}
.avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;}
.text b{color:#38bdf8;font-size:13px;}
.me .text b{color:#020617;}
.chat-input{display:flex;padding:10px;background:#020617;}
.chat-input input{flex:1;padding:10px;border:none;border-radius:20px;background:#1e293b;color:white;}
.chat-input button{margin-left:10px;padding:10px 20px;border:none;border-radius:20px;background:#38bdf8;color:white;}
.message img{max-width:200px;border-radius:10px;margin-top:5px;}
</style>
</head>

<body>

<header>💬 Chat AÉM 2026</header>

<div class="login">
<button onclick="login()">🔐 Login Google</button>
</div>

<div id="chat" style="display:none;"></div>

<div class="chat-input">
<input id="msg" placeholder="Message..." autocomplete="off">
<span class="emoji-btn" onclick="toggleEmojiPicker()">😊</span>
<span class="photo-btn" onclick="document.getElementById('photo-input').click()">📷</span>
<input type="file" id="photo-input" accept="image/*" style="display:none;">
<div id="preview-container" style="display:none;"><img id="preview-img" src="" alt="Prévisualisation"></div>
<button onclick="send()">Envoyer</button>
</div>

<emoji-picker id="emoji-picker" skin-tone-emoji="👍"></emoji-picker>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
authDomain: "atelier-electronique-mednine.firebaseapp.com",
databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "atelier-electronique-mednine"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser=null;
let selectedImage=null;

// LOGIN
function login(){
const provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
}

// PRESENCE
function setPresence(){
const ref=db.ref("onlineUsers/"+currentUser.uid);

ref.set({
name:currentUser.displayName,
photo:currentUser.photoURL,
online:true,
lastSeen:Date.now()
});

ref.onDisconnect().set({
name:currentUser.displayName,
photo:currentUser.photoURL,
online:false,
lastSeen:Date.now()
});
}

// SEND
function send(){
if(!currentUser)return;

const text=document.getElementById("msg").value.trim();
if(!text && !selectedImage)return;

db.ref("messages").push({
text:text,
uid:currentUser.uid,
name:currentUser.displayName,
photoURL:currentUser.photoURL,
time:Date.now(),
image:selectedImage||""
});

document.getElementById("msg").value="";
selectedImage=null;
}

// LISTEN
function listenMessages(){
db.ref("messages").limitToLast(50).on("child_added",snap=>{
const msg=snap.val();
const div=document.createElement("div");
div.className="message "+(msg.uid===currentUser.uid?"me":"");

const avatar=msg.photoURL
? `<img class="avatar" src="${msg.photoURL}">`
: `<div class="avatar">${msg.name[0]}</div>`;

div.innerHTML=`
${avatar}
<div class="text">
<b>${msg.name}</b><br>
${msg.text}
${msg.image?`<br><img src="${msg.image}">`:""}
</div>
`;

document.getElementById("chat").appendChild(div);
scroll();
});
}

function scroll(){
const c=document.getElementById("chat");
c.scrollTop=c.scrollHeight;
}

// EMOJI PICKER
function toggleEmojiPicker() {
  const picker = document.getElementById("emoji-picker");
  picker.style.display = picker.style.display === "block" ? "none" : "block";
}

document.getElementById("emoji-picker").addEventListener("emoji-click", e => {
  const emoji = e.detail.unicode;
  const input = document.getElementById("msg");
  const pos = input.selectionStart;
  input.value = input.value.slice(0, pos) + emoji + input.value.slice(pos);
  input.focus();
  input.selectionStart = input.selectionEnd = pos + emoji.length;
  toggleEmojiPicker();
});

// PHOTO UPLOAD & PREVIEW
document.getElementById("photo-input").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file || !file.type.startsWith("image/")) {
    alert("Choisis une image valide bro!");
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById("preview-img").src = ev.target.result;
    document.getElementById("preview-container").style.display = "flex";
    selectedImage = ev.target.result;
  };
  reader.readAsDataURL(file);
});
</script>

</body>
</html>
