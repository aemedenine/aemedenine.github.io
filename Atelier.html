<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Forum Live | Atelier Électronique Médenine</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body {
      background: linear-gradient(135deg, #020617, #0f172a, #020617);
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      overscroll-behavior: none;
    }
    header {
      padding: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      background: rgba(2,6,23,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(56,189,248,0.3);
    }
    .login {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login button {
      background: linear-gradient(45deg, #38bdf8, #0ea5e9);
      border: none;
      padding: 16px 50px;
      border-radius: 50px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(14,165,233,0.5);
      transition: all 0.3s;
    }
    .login button:hover { transform: scale(1.05); }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(15,23,42,0.3);
      backdrop-filter: blur(6px);
    }
    .message {
      display: flex;
      gap: 10px;
      max-width: 90%;
      background: rgba(30,41,59,0.8);
      padding: 10px 14px;
      border-radius: 16px;
      border: 1px solid rgba(56,189,248,0.2);
      animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .me { margin-left: auto; background: linear-gradient(45deg, #38bdf8, #0ea5e9); color: #0f172a; }
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(45deg, #38bdf8, #0ea5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
      font-size: 16px;
      flex-shrink: 0;
    }
    .text { flex: 1; }
    .text b { color: #38bdf8; font-size: 13px; }
    .me .text b { color: #0f172a; }
    .text small { color: #94a3b8; font-size: 10px; }
    .message img { max-width: 200px; border-radius: 10px; margin-top: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    .chat-input {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: rgba(2,6,23,0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(56,189,248,0.3);
      position: sticky;
      bottom: 0;
      z-index: 10;
      gap: 8px;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 999px;
      background: rgba(30,41,59,0.8);
      color: white;
      font-size: 15px;
    }
    .photo-btn { font-size: 24px; cursor: pointer; padding: 8px; color: #94a3b8; }
    .chat-input button {
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      background: #38bdf8;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    #preview-container {
      display: none;
      align-items: center;
      max-width: 80px;
      margin-left: 6px;
    }
    #preview-img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #38bdf8;
    }
    .typing {
      text-align: center;
      color: #38bdf8;
      font-style: italic;
      padding: 8px;
      font-size: 13px;
    }
    
    @media (max-width: 768px) {
      header { font-size: 18px; padding: 10px; }
      #chat { padding: 10px; gap: 8px; }
      .message { max-width: 95%; padding: 9px 12px; }
      .avatar { width: 34px; height: 34px; font-size: 15px; }
      .chat-input { padding: 8px; gap: 6px; }
      .chat-input input { font-size: 14px; padding: 10px 14px; }
      .chat-input button { padding: 10px 20px; font-size: 14px; }
      .photo-btn { font-size: 22px; }
      .message img { max-width: 180px; }
    }
  </style>
</head>
<body>

<header>💬 Forum Live – AÉM</header>

<div class="login" id="loginScreen">
  <button onclick="loginWithGoogle()">🔐 Login avec Google</button>
</div>

<div id="chat" style="display:none;"></div>

<div class="chat-input" id="inputArea" style="display:none;">
  <span class="photo-btn" onclick="document.getElementById('photo-input').click()">📷</span>
  <input type="file" id="photo-input" accept="image/*" style="display:none;" capture="environment">
  <input id="msg" placeholder="Message... (emoji via clavier téléphone 😊)" autocomplete="off">
  <button id="btnSend">Envoyer</button>
</div>

<div id="preview-container">
  <img id="preview-img" src="" alt="Prévisualisation">
</div>

<script type="module">
  // Firebase imports (compat mode)
  import 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js';
  import 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js';
  import 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
    authDomain: "atelier-electronique-mednine.firebaseapp.com",
    databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "atelier-electronique-mednine",
    storageBucket: "atelier-electronique-mednine.firebasestorage.app",
    messagingSenderId: "547430908384",
    appId: "1:547430908384:web:4caa4cf3869491bd14eb85"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  let currentUser = null;
  let selectedImage = null;
  let typingTimeout = null;

  // Auth state
  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("chat").style.display = "flex";
      document.getElementById("inputArea").style.display = "flex";
      setPresence(true);
      listenMessages();
      listenTyping();
    } else {
      currentUser = null;
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("chat").style.display = "none";
      document.getElementById("inputArea").style.display = "none";
      setPresence(false);
    }
  });

  function loginWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => {
      alert("Erreur connexion : " + err.message);
    });
  }

  function setPresence(online) {
    if (!currentUser) return;
    db.ref(`presence/${currentUser.uid}`).set({
      online,
      name: currentUser.displayName || "Anonyme",
      lastSeen: Date.now()
    });
  }

  // Compression image
  function compressImage(file, callback) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        const MAX = 800;
        if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL('image/jpeg', 0.68));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // Photo selection
  document.getElementById("photo-input").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file || !file.type.startsWith("image/")) {
      alert("Sélectionne une image valide !");
      return;
    }
    compressImage(file, dataUrl => {
      selectedImage = dataUrl;
      document.getElementById("preview-img").src = dataUrl;
      document.getElementById("preview-container").style.display = "flex";
    });
  });

  // Fonction send
  function send() {
    if (!currentUser) {
      alert("Connecte-toi d'abord !");
      return;
    }
    const text = document.getElementById("msg").value.trim();
    if (!text && !selectedImage) return;

    const data = {
      text: text || "",
      uid: currentUser.uid,
      name: currentUser.displayName || "Anonyme",
      photoURL: currentUser.photoURL || "",
      time: Date.now(),
      image: selectedImage || ""
    };

    db.ref("messages").push(data).then(() => {
      document.getElementById("msg").value = "";
      selectedImage = null;
      document.getElementById("preview-container").style.display = "none";
      db.ref(`typing/${currentUser.uid}`).remove();
    }).catch(err => {
      alert("Erreur envoi : " + err.message);
    });
  }

  // Attacher le bouton
  document.getElementById("btnSend").addEventListener("click", send);

  // Envoyer avec Enter
  document.getElementById("msg").addEventListener("keypress", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // Typing indicator
  document.getElementById("msg").addEventListener("input", () => {
    if (!currentUser) return;
    db.ref(`typing/${currentUser.uid}`).set(true);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      db.ref(`typing/${currentUser.uid}`).remove();
    }, 3000);
  });

  function listenTyping() {
    db.ref("typing").on("child_added", snap => {
      if (snap.key !== currentUser?.uid) {
        db.ref(`presence/${snap.key}`).once("value", snapUser => {
          const name = snapUser.val()?.name || "Quelqu'un";
          const div = document.createElement("div");
          div.id = `typing-${snap.key}`;
          div.className = "typing";
          div.textContent = `${name} est en train d'écrire... ✍️`;
          document.getElementById("chat").appendChild(div);
          scrollToBottom();
        });
      }
    });
    db.ref("typing").on("child_removed", snap => {
      const el = document.getElementById(`typing-${snap.key}`);
      if (el) el.remove();
    });
  }

  // Messages
  function listenMessages() {
    db.ref("messages").orderByChild("time").limitToLast(100).on("child_added", snap => {
      const msg = snap.val();
      const div = document.createElement("div");
      div.className = `message ${msg.uid === currentUser?.uid ? "me" : ""}`;
      
      const avatarHtml = msg.photoURL 
        ? `<img class="avatar" src="${msg.photoURL}" alt="">`
        : `<div class="avatar">${(msg.name || "?")[0].toUpperCase()}</div>`;
      
      div.innerHTML = `
        ${avatarHtml}
        <div class="text">
          <b>${msg.name || "Anonyme"}</b>
          <small>${new Date(msg.time).toLocaleTimeString('fr-TN', {hour: '2-digit', minute:'2-digit'})}</small><br>
          ${msg.text ? msg.text.replace(/\n/g, '<br>') : ""}
          ${msg.image ? `<br><img src="${msg.image}" alt="Image">` : ""}
        </div>
      `;
      document.getElementById("chat").appendChild(div);
      scrollToBottom();
    });
  }

  function scrollToBottom() {
    const chat = document.getElementById("chat");
    requestAnimationFrame(() => {
      chat.scrollTop = chat.scrollHeight;
    });
  }

  // Cleanup
  window.addEventListener("beforeunload", () => {
    if (currentUser) setPresence(false);
  });
</script>
</body>
</html>
