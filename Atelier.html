<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atelier Électronique – Salon Chat ⚡</title>

  <!-- Firebase SDKs (version 9+ compat pour simplicité) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

  <style>
    :root {
      --bg: #0a0a12;
      --card: #111122;
      --primary: #00ffea;
      --accent: #ff3366;
      --text: #e0f0ff;
      --gray: #8899aa;
      --msg-mine: #004d4d;
      --msg-other: #222244;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header { background: #0d0d1f; padding: 12px 20px; border-bottom: 1px solid #222244; text-align: center; }
    h1 { color: var(--primary); font-size: 1.8rem; text-shadow: 0 0 10px var(--primary); }
    #users { color: var(--gray); font-size: 0.9rem; margin-top: 4px; }
    #chat-area {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .message.mine   { align-self: flex-end; background: var(--msg-mine);   border-bottom-right-radius: 3px; }
    .message.other  { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 3px; }
    .msg-nick { font-weight: bold; color: var(--primary); margin-bottom: 4px; display: block; }
    .msg-time { font-size: 0.75rem; color: #555577; margin-top: 4px; text-align: right; }
    img.chat-image { max-width: 240px; border-radius: 8px; margin-top: 6px; display: block; }
    #input-area { background: #0d0d1f; padding: 12px 20px; border-top: 1px solid #222244; display: flex; gap: 10px; flex-wrap: wrap; }
    #message-input { flex: 1; padding: 12px 16px; border: 1px solid #333355; border-radius: 8px; background: #0f0f1e; color: white; font-size: 1rem; min-width: 200px; }
    #file-btn, #send-btn {
      background: var(--primary);
      color: black;
      border: none;
      padding: 0 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    #file-btn:hover, #send-btn:hover { background: #00e0cc; }
    #typing { color: var(--gray); font-style: italic; font-size: 0.9rem; padding: 0 20px 8px; }
    #file-input { display: none; }
  </style>
</head>
<body>
<header>
  <h1>Atelier Chat ⚡ #atelier-general</h1>
  <div id="users">Connecté en tant que : <span id="my-nick">...</span></div>
</header>

<div id="chat-area"></div>
<div id="typing"></div>

<div id="input-area">
  <input type="text" id="message-input" placeholder="Tape ton message ici... (emojis supportés 😎🔧)" autocomplete="off" />
  <label for="file-input">
    <button id="file-btn" type="button">📎 Photo</button>
  </label>
  <input type="file" id="file-input" accept="image/*" />
  <button id="send-btn">Envoyer</button>
</div>

<script>
<script>
// ────────────────────────────────────────────────
//  CONFIGURATION FIREBASE (mets tes vraies clés)
// ────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
  authDomain: "atelier-electronique-mednine.firebaseapp.com",
  projectId: "atelier-electronique-mednine",
  storageBucket: "atelier-electronique-mednine.firebasestorage.app",
  messagingSenderId: "547430908384",
  appId: "1:547430908384:web:4caa4cf3869491bd14eb85",
  databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

let currentUser = null;
let typingTimeout = null;
let selectedFile = null;

// ────────────────────────────────────────────────
//  LOGIN GOOGLE
// ────────────────────────────────────────────────
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .catch(err => {
      console.error("Erreur login :", err);
      alert("Problème connexion : " + err.message);
    });
}

// ────────────────────────────────────────────────
//  État d'authentification
// ────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.querySelector(".login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    listenTyping();
    setPresence(true);
    console.log("Connecté →", user.displayName, user.uid);
  } else {
    currentUser = null;
    document.querySelector(".login").style.display = "block";
    document.getElementById("chat").style.display = "none";
    setPresence(false);
  }
});

// ────────────────────────────────────────────────
//  Présence (online / lastSeen)
// ────────────────────────────────────────────────
function setPresence(online) {
  if (!currentUser) return;
  db.ref(`presence/${currentUser.uid}`).update({
    online: online,
    name: currentUser.displayName || currentUser.email.split('@')[0],
    lastSeen: firebase.database.ServerValue.TIMESTAMP
  }).catch(err => console.error("Erreur presence :", err));
}

// ────────────────────────────────────────────────
//  Typing indicator
// ────────────────────────────────────────────────
const msgInput = document.getElementById("msg");

msgInput.addEventListener("input", () => {
  if (!currentUser) return;
  db.ref(`typing/${currentUser.uid}`).set(true);
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    db.ref(`typing/${currentUser.uid}`).remove();
  }, 2500);
});

function listenTyping() {
  db.ref("typing").on("child_added", snap => {
    if (snap.key !== currentUser?.uid) showTyping(snap.key);
  });

  db.ref("typing").on("child_removed", snap => {
    removeTyping(snap.key);
  });
}

function showTyping(uid) {
  db.ref(`presence/${uid}`).once("value", snap => {
    const name = snap.val()?.name || "Quelqu'un";
    const div = document.createElement("div");
    div.id = `typing-${uid}`;
    div.className = "typing";
    div.textContent = `${name} écrit... ✍️`;
    document.getElementById("chat").appendChild(div);
    scrollToBottom();
  }).catch(err => console.error("Erreur presence typing:", err));
}

function removeTyping(uid) {
  document.getElementById(`typing-${uid}`)?.remove();
}

function scrollToBottom() {
  const chat = document.getElementById("chat");
  setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 100);
}

// ────────────────────────────────────────────────
//  Emoji Picker
// ────────────────────────────────────────────────
function toggleEmojiPicker() {
  const picker = document.getElementById("emoji-picker");
  picker.style.display = picker.style.display === "block" ? "none" : "block";
}

document.getElementById("emoji-picker").addEventListener("emoji-click", e => {
  const emoji = e.detail.unicode;
  const input = document.getElementById("msg");
  const pos = input.selectionStart;
  input.value = input.value.slice(0, pos) + emoji + input.value.slice(pos);
  input.focus();
  input.selectionStart = input.selectionEnd = pos + emoji.length;
  toggleEmojiPicker();
});

// ────────────────────────────────────────────────
//  Photo preview + upload
// ────────────────────────────────────────────────
document.getElementById("photo-input").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file || !file.type.startsWith("image/")) {
    alert("Seulement des images bro !");
    return;
  }
  if (file.size > 4 * 1024 * 1024) {
    alert("Image trop lourde (max 4 Mo)");
    return;
  }

  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById("preview-img").src = ev.target.result;
    document.getElementById("preview-container").style.display = "flex";
    selectedFile = file;
  };
  reader.readAsDataURL(file);
});

// ────────────────────────────────────────────────
//  ENVOI MESSAGE (texte + photo optionnelle)
// ────────────────────────────────────────────────
async function send() {
  if (!currentUser) {
    alert("Connecte-toi d'abord bro !");
    return;
  }

  const text = msgInput.value.trim();
  if (!text && !selectedFile) return;

  let imageUrl = null;

  // Upload photo si présente
  if (selectedFile) {
    try {
      const fileName = `${Date.now()}_${selectedFile.name.replace(/\s+/g, '_')}`;
      const storageRef = storage.ref(`chat/${fileName}`);
      const snapshot = await storageRef.put(selectedFile);
      imageUrl = await snapshot.ref.getDownloadURL();
      console.log("Photo uploadée :", imageUrl);
    } catch (err) {
      console.error("Erreur upload photo :", err);
      alert("Problème envoi photo : " + err.message);
      return;
    }
  }

  const msgData = {
    text: text || "📸 Photo partagée",
    uid: currentUser.uid,
    name: currentUser.displayName || currentUser.email.split('@')[0],
    photoURL: currentUser.photoURL || "",
    imageUrl: imageUrl,
    time: firebase.database.ServerValue.TIMESTAMP,
    reactions: {}
  };

  try {
    await db.ref("messages").push(msgData);
    console.log("Message envoyé !");

    msgInput.value = "";
    selectedFile = null;
    document.getElementById("preview-container").style.display = "none";
    document.getElementById("preview-img").src = "";
    db.ref(`typing/${currentUser.uid}`).remove?.();
    scrollToBottom();
  } catch (err) {
    console.error("Erreur envoi message :", err);
    alert("Erreur : " + err.message);
  }
}

// ────────────────────────────────────────────────
//  ÉCOUTE DES MESSAGES + AFFICHAGE
// ────────────────────────────────────────────────
function listenMessages() {
  db.ref("messages")
    .orderByChild("time")
    .on("child_added", snap => {
      const msg = snap.val();
      const key = snap.key;

      const div = document.createElement("div");
      div.className = `message ${msg.uid === currentUser?.uid ? "me" : ""}`;
      div.id = `msg-${key}`;

      let html = `
        <div class="avatar">${(msg.name || "?").charAt(0).toUpperCase()}</div>
        <div class="text">
          <b>${msg.name || "Inconnu"}</b>
          <small>${new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</small><br>
          ${msg.text ? msg.text.replace(/\n/g, '<br>') : ''}
      `;

      if (msg.imageUrl) {
        html += `<br><img src="${msg.imageUrl}" alt="Photo" loading="lazy">`;
      }

      html += `
          <div class="reactions" id="reac-${key}"></div>
        </div>
      `;

      div.innerHTML = html;
      document.getElementById("chat").appendChild(div);
      scrollToBottom();

      // Double-clic → ❤️
      div.addEventListener("dblclick", () => addReaction(key, "❤️"));
    });

  // Mise à jour réactions en live
  db.ref("messages").on("child_changed", snap => {
    const msg = snap.val();
    const key = snap.key;
    const reacDiv = document.getElementById(`reac-${key}`);
    if (reacDiv) {
      reacDiv.innerHTML = Object.values(msg.reactions || {})
        .map(r => `<span class="reaction">${r}</span>`)
        .join("");
    }
  });
}

function addReaction(msgKey, emoji) {
  if (!currentUser) return;
  db.ref(`messages/${msgKey}/reactions/${currentUser.uid}`).set(emoji)
    .catch(err => console.error("Erreur réaction :", err));
}

// ────────────────────────────────────────────────
//  ENVOI AVEC ENTRÉE (sans shift)
// ────────────────────────────────────────────────
msgInput.addEventListener("keypress", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// ────────────────────────────────────────────────
//  DÉMARRAGE + CLEANUP
// ────────────────────────────────────────────────
listenMessages();

window.addEventListener("beforeunload", () => {
  if (currentUser) setPresence(false);
});
</script>
</body>
</html>
