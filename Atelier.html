<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atelier Électronique – Salon Chat ⚡</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.29.1/index.js" type="module"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body {
      background: linear-gradient(135deg, #020617, #0f172a, #020617);
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 16px;
      text-align: center;
      font-size: 22px;
      background: #020617;
      border-bottom: 1px solid #38bdf8;
    }
    .login {
      text-align: center;
      margin: 80px auto;
    }
    .login button {
      padding: 14px 40px;
      border: none;
      border-radius: 50px;
      background: #38bdf8;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      display: flex;
      gap: 10px;
      max-width: 80%;
      background: #1e293b;
      padding: 10px 14px;
      border-radius: 15px;
      word-break: break-word;
    }
    .me {
      margin-left: auto;
      background: #38bdf8;
      color: #020617;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .avatar-letter {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #64748b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 18px;
      flex-shrink: 0;
    }
    .text b {
      color: #38bdf8;
      font-size: 13px;
    }
    .me .text b {
      color: #020617;
    }
    .chat-input {
      display: flex;
      align-items: center;
      padding: 10px;
      background: #020617;
      gap: 8px;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 999px;
      background: #1e293b;
      color: white;
      font-size: 15px;
    }
    .emoji-btn, .photo-btn {
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
    }
    .chat-input button {
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      background: #38bdf8;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .message img {
      max-width: 220px;
      border-radius: 10px;
      margin-top: 6px;
      display: block;
    }
    #preview-container {
      margin: 8px 0;
      max-width: 220px;
    }
    #preview-img {
      max-width: 100%;
      border-radius: 10px;
      border: 2px solid #38bdf8;
    }
    #emoji-picker {
      position: absolute;
      bottom: 70px;
      right: 20px;
      z-index: 100;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Atelier Chat ⚡ #atelier-general</h1>
</header>

<div class="login" id="login-screen">
  <button onclick="login()">🔐 Login avec Google</button>
</div>

<div id="chat" style="display:none;"></div>

<div class="chat-input" id="chat-input" style="display:none;">
  <span class="emoji-btn" onclick="toggleEmojiPicker()">😊</span>
  <span class="photo-btn" onclick="document.getElementById('photo-input').click()">📷</span>
  <input type="file" id="photo-input" accept="image/*" style="display:none;">
  <input id="msg" placeholder="Message..." autocomplete="off">
  <button onclick="send()">Envoyer</button>
</div>

<div id="preview-container" style="display:none; padding:0 16px 8px;">
  <img id="preview-img" src="" alt="Prévisualisation">
</div>

<emoji-picker id="emoji-picker" skin-tone-emoji="👍"></emoji-picker>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getDatabase, ref, push, onChildAdded, onDisconnect, set, limitToLast } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
    authDomain: "atelier-electronique-mednine.firebaseapp.com",
    databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "atelier-electronique-mednine"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let currentUser = null;
  let selectedImage = null;

  // Auth state
  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("chat").style.display = "flex";
      document.getElementById("chat-input").style.display = "flex";
      setPresence();
      listenMessages();
    } else {
      currentUser = null;
      document.getElementById("login-screen").style.display = "block";
      document.getElementById("chat").style.display = "none";
      document.getElementById("chat-input").style.display = "none";
    }
  });

  function login() {
    const provider = new GoogleAuthProvider();
    signInWithPopup(auth, provider).catch(err => {
      console.error("Login error:", err);
      alert("Problème de connexion : " + err.message);
    });
  }

  function setPresence() {
    if (!currentUser) return;
    const refPresence = ref(db, "onlineUsers/" + currentUser.uid);
    set(refPresence, {
      name: currentUser.displayName || "Anonyme",
      photo: currentUser.photoURL || "",
      online: true,
      lastSeen: Date.now()
    });
    onDisconnect(refPresence).set({
      name: currentUser.displayName || "Anonyme",
      photo: currentUser.photoURL || "",
      online: false,
      lastSeen: Date.now()
    });
  }

  function send() {
    if (!currentUser) return;
    const text = document.getElementById("msg").value.trim();
    if (!text && !selectedImage) return;

    push(ref(db, "messages"), {
      text: text || "",
      uid: currentUser.uid,
      name: currentUser.displayName || "Anonyme",
      photoURL: currentUser.photoURL || "",
      time: Date.now(),
      image: selectedImage || ""
    });

    document.getElementById("msg").value = "";
    selectedImage = null;
    document.getElementById("preview-container").style.display = "none";
    document.getElementById("preview-img").src = "";
  }

  function listenMessages() {
    onChildAdded(limitToLast(ref(db, "messages"), 50), snap => {
      const msg = snap.val();
      const div = document.createElement("div");
      div.className = `message ${msg.uid === currentUser?.uid ? "me" : ""}`;

      const avatar = msg.photoURL
        ? `<img class="avatar" src="${msg.photoURL}" alt="${msg.name}">`
        : `<div class="avatar-letter">${(msg.name?.[0] || "?").toUpperCase()}</div>`;

      div.innerHTML = `
        ${avatar}
        <div class="text">
          <b>${msg.name || "Anonyme"}</b><br>
          ${msg.text ? msg.text.replace(/\n/g, "<br>") : ""}
          ${msg.image ? `<br><img src="${msg.image}" alt="Image">` : ""}
        </div>
      `;

      document.getElementById("chat").appendChild(div);
      scrollToBottom();
    });
  }

  function scrollToBottom() {
    const chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;
  }

  function toggleEmojiPicker() {
    const picker = document.getElementById("emoji-picker");
    picker.style.display = picker.style.display === "block" ? "none" : "block";
  }

  document.getElementById("emoji-picker").addEventListener("emoji-click", e => {
    const emoji = e.detail.unicode;
    const input = document.getElementById("msg");
    const pos = input.selectionStart;
    input.value = input.value.slice(0, pos) + emoji + input.value.slice(pos);
    input.focus();
    input.selectionStart = input.selectionEnd = pos + emoji.length;
  });

  // Photo preview
  document.getElementById("photo-input").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file || !file.type.startsWith("image/")) {
      alert("Choisis une vraie image stp !");
      return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      selectedImage = ev.target.result;
      document.getElementById("preview-img").src = selectedImage;
      document.getElementById("preview-container").style.display = "block";
    };
    reader.readAsDataURL(file);
  });

</script>
</body>
</html>
