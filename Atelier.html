<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Atelier Électronique – Salon Chat ⚡</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body {
      background: linear-gradient(135deg, #020617, #0f172a, #020617);
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      overscroll-behavior: none;
    }
    header {
      padding: 16px;
      text-align: center;
      font-size: 22px;
      background: #020617;
      border-bottom: 1px solid #38bdf8;
      z-index: 10;
    }
    .login {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login button {
      padding: 14px 40px;
      border: none;
      border-radius: 50px;
      background: #38bdf8;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      display: flex;
      gap: 10px;
      max-width: 80%;
      background: #1e293b;
      padding: 10px 14px;
      border-radius: 15px;
      word-break: break-word;
    }
    .me {
      margin-left: auto;
      background: #38bdf8;
      color: #020617;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .avatar-letter {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #64748b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 18px;
      flex-shrink: 0;
    }
    .text b {
      color: #38bdf8;
      font-size: 13px;
    }
    .me .text b {
      color: #020617;
    }
    .chat-input {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: #020617;
      gap: 8px;
      position: sticky;
      bottom: 0;
      z-index: 10;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 999px;
      background: #1e293b;
      color: white;
      font-size: 15px;
    }
    .photo-btn {
      font-size: 26px;
      cursor: pointer;
      padding: 8px;
      color: #94a3b8;
    }
    .chat-input button {
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      background: #38bdf8;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .message img {
      max-width: 220px;
      border-radius: 10px;
      margin-top: 6px;
      display: block;
    }
    #preview-container {
      padding: 0 16px 8px;
      max-width: 220px;
      align-self: flex-end;
    }
    #preview-img {
      max-width: 100%;
      border-radius: 10px;
      border: 2px solid #38bdf8;
    }
    input:focus { outline: none; }
  </style>
</head>
<body>

<header>
  <h1>Atelier Chat ⚡ #atelier-general</h1>
</header>

<div class="login" id="login-screen">
  <button onclick="login()">🔐 Login avec Google</button>
</div>

<div id="chat" style="display:none;"></div>

<div class="chat-input" id="chat-input" style="display:none;">
  <span class="photo-btn" onclick="document.getElementById('photo-input').click()">📷</span>
  <input type="file" id="photo-input" accept="image/*" style="display:none;" capture="environment">
  <input id="msg" placeholder="Message... (emoji via clavier téléphone 😊)" autocomplete="off">
  <button onclick="send()">Envoyer</button>
</div>

<div id="preview-container" style="display:none;">
  <img id="preview-img" src="" alt="Prévisualisation">
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getDatabase, ref, push, onChildAdded, onDisconnect, set, query, limitToLast } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
    authDomain: "atelier-electronique-mednine.firebaseapp.com",
    databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "atelier-electronique-mednine"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let currentUser = null;
  let selectedImage = null;

  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("chat").style.display = "flex";
      document.getElementById("chat-input").style.display = "flex";
      setPresence();
      listenMessages();
    } else {
      currentUser = null;
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("chat").style.display = "none";
      document.getElementById("chat-input").style.display = "none";
    }
  });

  function login() {
    const provider = new GoogleAuthProvider();
    signInWithPopup(auth, provider).catch(err => {
      console.error(err);
      alert("Erreur login : " + err.message);
    });
  }

  function setPresence() {
    if (!currentUser) return;
    const presenceRef = ref(db, "onlineUsers/" + currentUser.uid);
    set(presenceRef, {
      name: currentUser.displayName || "Anonyme",
      photo: currentUser.photoURL || "",
      online: true,
      lastSeen: Date.now()
    });
    onDisconnect(presenceRef).set({
      name: currentUser.displayName || "Anonyme",
      photo: currentUser.photoURL || "",
      online: false,
      lastSeen: Date.now()
    });
  }

  function compressImage(file, callback) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 800;
        let width = img.width;
        let height = img.height;
        if (width > MAX_WIDTH) {
          height = Math.round(height * (MAX_WIDTH / width));
          width = MAX_WIDTH;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        callback(canvas.toDataURL('image/jpeg', 0.68)); // ~68% qualité = bon équilibre
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function send() {
    if (!currentUser) return alert("Connecte-toi d'abord !");
    const text = document.getElementById("msg").value.trim();
    if (!text && !selectedImage) return;

    push(ref(db, "messages"), {
      text: text || "",
      uid: currentUser.uid,
      name: currentUser.displayName || "Anonyme",
      photoURL: currentUser.photoURL || "",
      time: Date.now(),
      image: selectedImage || ""
    }).then(() => {
      document.getElementById("msg").value = "";
      selectedImage = null;
      document.getElementById("preview-container").style.display = "none";
      document.getElementById("preview-img").src = "";
    }).catch(err => {
      console.error(err);
      alert("Erreur envoi : " + err.message);
    });
  }

  function listenMessages() {
    const messagesQuery = query(ref(db, "messages"), limitToLast(50));
    onChildAdded(messagesQuery, snap => {
      const msg = snap.val();
      const div = document.createElement("div");
      div.className = `message ${msg.uid === currentUser?.uid ? "me" : ""}`;

      const avatar = msg.photoURL
        ? `<img class="avatar" src="${msg.photoURL}" referrerpolicy="no-referrer">`
        : `<div class="avatar-letter">${(msg.name?.[0] || "?").toUpperCase()}</div>`;

      div.innerHTML = `
        ${avatar}
        <div class="text">
          <b>${msg.name || "Anonyme"}</b><br>
          ${msg.text ? msg.text.replace(/\n/g, "<br>") : ""}
          ${msg.image ? `<br><img src="${msg.image}" alt="Photo">` : ""}
        </div>
      `;

      document.getElementById("chat").appendChild(div);
      scrollToBottom();
    });
  }

  function scrollToBottom() {
    const chat = document.getElementById("chat");
    requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
  }

  // Photo handling
  document.getElementById("photo-input").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file || !file.type.startsWith("image/")) {
      alert("Choisis une image valide !");
      return;
    }

    compressImage(file, (compressed) => {
      selectedImage = compressed;
      document.getElementById("preview-img").src = compressed;
      document.getElementById("preview-container").style.display = "block";
      scrollToBottom();
    });
  });

  // Focus input sur mobile quand on touche le chat
  document.getElementById("chat").addEventListener("click", () => {
    if (currentUser) document.getElementById("msg").focus();
  });
</script>
</body>
</html>
