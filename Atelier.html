<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atelier Électronique – Chat 2026 ⚡</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#020617,#0f172a,#020617);color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{padding:16px;text-align:center;font-size:22px;background:#020617;border-bottom:1px solid #38bdf8;}
.login{text-align:center;margin:80px auto;}
.login button{padding:14px 40px;border:none;border-radius:50px;background:#38bdf8;color:white;cursor:pointer;}
#chat{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px;}
.message{display:flex;gap:10px;max-width:80%;background:#1e293b;padding:10px;border-radius:15px;}
.me{margin-left:auto;background:#38bdf8;color:#020617;}
.avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;}
.text b{color:#38bdf8;font-size:13px;}
.me .text b{color:#020617;}
.chat-input{display:flex;padding:10px;background:#020617;}
.chat-input input{flex:1;padding:10px;border:none;border-radius:20px;background:#1e293b;color:white;}
.chat-input button{margin-left:10px;padding:10px 20px;border:none;border-radius:20px;background:#38bdf8;color:white;}
.message img{max-width:200px;border-radius:10px;margin-top:5px;}
</style>
</head>

<body>

<header>💬 Chat AÉM 2026</header>

<div class="login">
<button onclick="login()">🔐 Login Google</button>
</div>

<div id="chat" style="display:none;"></div>

<div class="chat-input">
<input id="msg" placeholder="Message..." autocomplete="off">
<button onclick="send()">Envoyer</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyCtbEWdm7CAC25ROslGlVeLOvfxdi2exVo",
authDomain: "atelier-electronique-mednine.firebaseapp.com",
databaseURL: "https://atelier-electronique-mednine-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "atelier-electronique-mednine"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser=null;
let selectedImage=null;
let lastSend=0;

// LOGIN
function login(){
const provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
}

// AUTH
auth.onAuthStateChanged(user=>{
if(user){
currentUser=user;
document.querySelector(".login").style.display="none";
document.getElementById("chat").style.display="flex";
setPresence();
listenMessages();
}
});

// PRESENCE (FIX)
function setPresence(){
const ref=db.ref("onlineUsers/"+currentUser.uid);

ref.set({
name:currentUser.displayName,
photo:currentUser.photoURL,
online:true,
lastSeen:Date.now()
});

ref.onDisconnect().set({
name:currentUser.displayName,
photo:currentUser.photoURL,
online:false,
lastSeen:Date.now()
});
}

// SEND (ANTI SPAM + IMAGE)
function send(){
if(!currentUser)return;

const now=Date.now();
if(now-lastSend<1000){
alert("Slow down 😅");
return;
}
lastSend=now;

const text=document.getElementById("msg").value.trim();
if(!text && !selectedImage)return;

db.ref("messages").push({
text:text,
uid:currentUser.uid,
name:currentUser.displayName,
photoURL:currentUser.photoURL,
time:Date.now(),
image:selectedImage||""
});

document.getElementById("msg").value="";
selectedImage=null;
}

// LISTEN
function listenMessages(){
db.ref("messages").limitToLast(50).on("child_added",snap=>{
const msg=snap.val();

const div=document.createElement("div");
div.className="message "+(msg.uid===currentUser.uid?"me":"");

const avatar=msg.photoURL
? `<img class="avatar" src="${msg.photoURL}">`
: `<div class="avatar">${msg.name[0]}</div>`;

div.innerHTML=`
${avatar}
<div class="text">
<b>${msg.name}</b><br>
${msg.text}
${msg.image?`<br><img src="${msg.image}">`:""}
</div>
`;

document.getElementById("chat").appendChild(div);
scroll();
});
}

function scroll(){
const c=document.getElementById("chat");
c.scrollTop=c.scrollHeight;
}

// ENTER SEND
document.getElementById("msg").addEventListener("keypress",e=>{
if(e.key==="Enter"){
e.preventDefault();
send();
}
});
</script>

</body>
</html>
